<html lang="id">
<head>

    <style>
        /* TATADADA Premium CSS Tokens v5.6 */
        :root {
            --header-bg: #ffffff;
            --editor-bg: #ffffff;
            --preview-bg: #f1f5f9; /* Vibrant depth gutter */
            --card-bg: #ffffff;
            --footer-bg: #ffffff;

        html.dark {
            --header-bg: #161b22;
            --editor-bg: #0d1117;
            --preview-bg: #010409;

        body {

        }

        /* Semantic Classes Mapper */
        .bg-header { background-color: var(--header-bg); }
        .bg-footer { background-color: var(--footer-bg); }
        .bg-preview { background-color: var(--preview-bg); }
        .bg-editor { background-color: var(--editor-bg); }
        .bg-card { background-color: var(--card-bg); }

        /* Kustomisasi Scrollbar Premium */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* Line Numbers & Editor Spec (v5.6) */
        .editor-wrapper {
            display: flex;
            position: relative;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }
        .line-numbers {
            padding: 1.5rem 0.5rem;
            text-align: right;
            color: var(--text-dim);

            border-right: 1px solid var(--border-color);

        }
        .code-editor {
            flex: 1;
            padding: 1.5rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;

            overflow: auto;
            resize: none;

        /* State Management */
        #resultArea { display: none; }

<body class="h-screen flex flex-col">

    <!-- MAIN WORKSPACE (Side-to-Side Premium Layout) -->
    <main id="workspace" class="flex-1 flex overflow-hidden">
        
        <!-- Panel Utama (Kiri): Editor -->
        <div id="left-pane" class="flex-[6] bg-editor relative overflow-hidden flex flex-col border-r border-theme">

            <!-- Area Editor dengan Gutter Nomor Baris (v5.6) -->

                <div id="inputLines" class="line-numbers">1</div>
                <textarea id="inputHtml" class="code-editor" spellcheck="false" placeholder="<!-- Masukkan Kode HTML Mentah Anda Di Sini -->&#10;<div class='app'>&#10;  <h1>Rahasia Aplikasi</h1>&#10;</div>"></textarea>

        </div>

        <!-- Resizer/Gutter (Premium Depth) -->

            <div class="h-8 w-1 bg-[var(--border-color)] rounded-full group-hover:bg-blue-500 transition-all"></div>
        </div>

        <!-- Panel Sidebar (Kanan): Controls & Results -->
        <div id="right-pane" class="flex-[4] bg-preview p-5 flex flex-col gap-5 overflow-y-auto">
            
            <!-- Card 1: Configuration -->
            <div class="bg-card rounded-xl shadow-sm border border-theme p-5 flex flex-col gap-4 shrink-0">
                <div class="flex items-center gap-2 mb-1">
                    <i data-lucide="settings-2" class="w-4 h-4 text-blue-500"></i>
                    <h3 class="font-bold text-xs uppercase tracking-wider" data-i18n="lblConfig">Konfigurasi</h3>
                </div>
                
                <div class="flex flex-col gap-3">
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-sm font-medium text-main" data-i18n="lblCompress">Super Compress</span>
                        <input type="checkbox" id="optCompress" class="sr-only peer" checked>
                        <div class="w-9 h-5 bg-slate-300 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500 shadow-sm"></div>
                    </label>
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-sm font-medium text-main" data-i18n="lblAntiDebug">Anti-Debugging</span>
                        <input type="checkbox" id="optAntiDebug" class="sr-only peer" checked>
                        <div class="w-9 h-5 bg-slate-300 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500 shadow-sm"></div>
                    </label>
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-sm font-medium text-main" data-i18n="lblPoly">Obfuscasi Polimorfik</span>

                        <div class="w-9 h-5 bg-slate-300 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500 shadow-sm"></div>
                    </label>
                </div>

                <button onclick="generateProtection()" class="w-full mt-2 flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-3 rounded-xl transition-all shadow-md focus:ring-4 focus:ring-emerald-500/20 active:scale-[0.98]">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                    <span data-i18n="btnEncrypt">Enkripsi HTML</span>
                </button>
            </div>

            <!-- Card 2: Result Area -->
            <div id="resultPlaceholder" class="flex-1 flex flex-col items-center justify-center p-8 border-2 border-dashed border-theme rounded-2xl text-dim opacity-50 bg-card/50">
                <i data-lucide="lock" class="w-12 h-12 mb-3"></i>
                <p class="text-xs text-center font-medium" data-i18n="lblWaiting">Siap memproses kode Anda...</p>
            </div>

            <div id="resultArea" class="flex-1 flex flex-col bg-editor rounded-2xl shadow-md border border-theme overflow-hidden min-h-[300px]">
                <div class="p-4 border-b border-theme flex items-center justify-between bg-card z-10 shadow-sm shrink-0">
                    <span class="text-xs font-bold uppercase tracking-widest text-emerald-500" data-i18n="lblOutput">Output Protected</span>
                    <button onclick="copyResult()" class="p-2 bg-emerald-500/10 text-emerald-600 hover:bg-emerald-500/20 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-emerald-500/30">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
                
                <!-- Area Output dengan Gutter Nomor Baris (v5.6) -->
                <div class="editor-wrapper">
                    <div id="outputLines" class="line-numbers">1</div>
                    <textarea id="outputHtml" readonly class="code-editor" spellcheck="false" onclick="this.select()"></textarea>
                </div>
                
                <div class="p-3 bg-red-500/5 border-t border-theme flex items-center gap-2 shrink-0 z-10">
                    <i data-lucide="zap" class="w-3 h-3 text-red-500"></i>
                    <span class="text-[10px] font-bold text-red-600 uppercase tracking-wider">100% Executable Web Payload</span>
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER (Wajib h-8) -->
    <footer class="h-8 flex items-center justify-between px-6 border-t border-theme bg-footer text-[10px] text-dim shrink-0 z-50">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)] animate-pulse"></span>
            <span data-i18n="status" class="font-medium">Engine Ready</span>
        </div>
        <div class="opacity-50 tracking-widest uppercase">Encryption Layer Active</div>
        <button onclick="openModal()" class="hover:text-main font-bold underline underline-offset-4 transition-colors">
            Terms of Use
        </button>
    </footer>

    <!-- MODAL TERMS OF USE / DISCLAIMER (Strict Mode v5.6) -->
    <div id="termsModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-[100]">
        <div class="bg-card border border-theme rounded-3xl p-8 max-w-lg w-full mx-4 shadow-2xl">
            <h2 class="text-xl font-extrabold text-main mb-4 border-b border-theme pb-3" data-i18n="modalTitle">Terms of Use / Disclaimer</h2>
            <div class="text-sm text-dim leading-relaxed mb-8 max-h-[60vh] overflow-y-auto pr-2">
                <!-- Smart Context Clause -->
                <p class="mb-4 font-medium text-main" id="termsContext"></p>
                <!-- Legal Strict Clause -->
                <p id="termsLegal"></p>
            </div>
            <button onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95" data-i18n="btnClose">Mengerti</button>
        </div>
    </div>

    <!-- SCRIPT (UI, Line Numbers & Logic Asli) -->
    <script>
        lucide.createIcons();

        /* --- THEME & LANG --- */
        function updateTheme(isDark) {
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        updateTheme(localStorage.getItem('theme') === 'dark');
        document.getElementById('themeToggle').onclick = () => updateTheme(!document.documentElement.classList.contains('dark'));

        const translations = {
            id: {
                helpText: "Masukkan kode HTML di panel kiri, atur opsi di panel kanan, lalu klik 'Enkripsi HTML'.",
                lblConfig: "Konfigurasi Proteksi",
                lblCompress: "Super Compress",
                lblAntiDebug: "Anti-Debugging",
                lblPoly: "Obfuscasi Polimorfik",
                btnEncrypt: "Enkripsi HTML",
                lblWaiting: "Siap memproses kode Anda...",
                lblOutput: "Output Terlindungi",
                btnCopy: "Salin Hasil",
                status: "Engine Ready",
                modalTitle: "Terms of Use / Disclaimer",
                termsContext: "AcakIcik beroperasi sepenuhnya secara lokal di browser (client-side) menggunakan engine JavaScript dan tidak mengirimkan data source code Anda ke server eksternal mana pun.",
                termsLegal: "Tidak ada paksaan dalam menggunakan aplikasi ini. Aplikasi ini disediakan 'as-is' (sebagaimana adanya) dan akurasi hasil tidak dijamin. Pembuatan aplikasi ini dibantu oleh AI tools. Aplikasi ini menggunakan Google Analytics untuk mengumpulkan data penggunaan anonim guna pengembangan fitur, tanpa merekam identitas pribadi. Pembuat dibebaskan dari segala bentuk konsekuensi, kerugian, atau tuntutan apapun yang timbul dari penggunaan aplikasi ini. Penggunaan aplikasi berarti Anda menyetujui ketentuan ini sepenuhnya.",
                btnClose: "Mengerti",
                alertInput: "Masukkan kode HTML terlebih dahulu!",
                alertCopy: "Tersalin! Simpan sebagai file .html baru."
            },
            en: {
                helpText: "Insert HTML code in the left pane, set options in the right pane, then click 'Encrypt HTML'.",
                lblConfig: "Protection Config",
                lblCompress: "Super Compress",
                lblAntiDebug: "Anti-Debugging",
                lblPoly: "Polymorphic Obfuscation",
                btnEncrypt: "Encrypt HTML",
                lblWaiting: "Ready to process your code...",
                lblOutput: "Protected Output",
                btnCopy: "Copy Result",
                status: "Engine Ready",
                modalTitle: "Terms of Use / Disclaimer",
                termsContext: "AcakIcik operates entirely locally in the browser (client-side) using a JavaScript engine and does not send your source code data to any external server.",
                termsLegal: "There is no coercion to use this app. This app is provided 'as-is' and the accuracy of results is not guaranteed. The development of this app was assisted by AI tools. This app uses Google Analytics to collect anonymous usage data for feature improvement, without recording personal identity. The creator is absolved from any consequences, damages, or claims arising from the use of this app. Use of this app constitutes full agreement to these terms.",
                btnClose: "Understood",
                alertInput: "Please insert HTML code first!",
                alertCopy: "Copied! Save as a new .html file."
            }
        };

        function updateLanguage(lang) {
            localStorage.setItem('lang', lang);
            document.getElementById('langFlag').textContent = lang === 'id' ? '🇮🇩' : '🇬🇧';
            document.getElementById('langLabel').textContent = lang.toUpperCase();
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(translations[lang][key]) el.textContent = translations[lang][key];
            });
            document.getElementById('termsContext').textContent = translations[lang].termsContext;
            document.getElementById('termsLegal').textContent = translations[lang].termsLegal;
        }
        updateLanguage(localStorage.getItem('lang') || 'id');
        document.getElementById('langToggle').onclick = () => updateLanguage(localStorage.getItem('lang') === 'id' ? 'en' : 'id');

        /* --- MODAL --- */
        const modal = document.getElementById('termsModal');
        const openModal = () => { modal.classList.remove('hidden'); modal.classList.add('flex'); };
        const closeModal = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };

        /* --- LINE NUMBERS & EDITOR SYNC (Vanilla JS) --- */
        function updateLineNumbers(textareaId, linesId) {
            const textarea = document.getElementById(textareaId);
            const linesEle = document.getElementById(linesId);
            const linesCount = textarea.value.split('\n').length || 1;
            let linesHtml = '';
            for (let i = 1; i <= linesCount; i++) {
                linesHtml += i + '<br>';
            }
            linesEle.innerHTML = linesHtml;
        }

        function syncEditor(textareaId, linesId) {
            const textarea = document.getElementById(textareaId);
            const linesEle = document.getElementById(linesId);
            
            textarea.addEventListener('scroll', () => {
                linesEle.scrollTop = textarea.scrollTop;
            });
            
            textarea.addEventListener('input', () => {
                updateLineNumbers(textareaId, linesId);
            });
        }

        // Initialize Line Numbers Sync
        syncEditor('inputHtml', 'inputLines');
        syncEditor('outputHtml', 'outputLines');
        // Set Initial numbers
        updateLineNumbers('inputHtml', 'inputLines');

        /* --- RESIZER (SIDE-TO-SIDE) --- */
        const resizer = document.getElementById('resizer');
        const leftPane = document.getElementById('left-pane');
        const workspace = document.getElementById('workspace');
        let isResizing = false;

        resizer.onmousedown = (e) => { isResizing = true; document.body.style.cursor = 'col-resize'; };
        document.onmousemove = (e) => {
            if (!isResizing) return;
            const rect = workspace.getBoundingClientRect();
            let newWidth = ((e.clientX - rect.left) / rect.width) * 100;
            if (newWidth > 25 && newWidth < 75) leftPane.style.flex = `${newWidth / 10}`;
        };
        document.onmouseup = () => { isResizing = false; document.body.style.cursor = 'default'; };

        /* --- LOGIC INTI APLIKASI (AREA SAKRAL) --- */
        function randomVar(length = 6) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            let res = '';
            for (let i = 0; i < length; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        function generateProtection() {
            let source = document.getElementById('inputHtml').value;
            if (!source.trim()) return alert(translations[localStorage.getItem('lang') || 'id'].alertInput);

            const isCompress = document.getElementById('optCompress').checked;
            const isAntiDebug = document.getElementById('optAntiDebug').checked;
            const isPoly = document.getElementById('optPolymorphic').checked;

            if (isCompress) {
                source = source.replace(/<!--[\s\S]*?-->/g, "").replace(/>\s+</g, "><").replace(/\n/g, "").replace(/\s{2,}/g, " ").trim();
            }

            const encoded = btoa(encodeURIComponent(source));
            let chunked = '';
            for (let i = 0; i < encoded.length; i += 20) chunked += `'${encoded.slice(i, i + 20)}'+`;
            chunked = chunked.slice(0, -1);

            const vP = isPoly ? randomVar() : 'p';
            const vD = isPoly ? randomVar() : 'd';
            const vA = isPoly ? randomVar() : 'ad';

            const antiDebug = isAntiDebug ? `const ${vA}=function(){let t=new Date().getTime();debugger;if(new Date().getTime()-t>100){document.body.innerHTML='🛡️ Debugger Detected';return true}};setInterval(${vA},1000);if(window.outerWidth-window.innerWidth>160||window.outerHeight-window.innerHeight>160){document.body.innerHTML='🛡️ DevTools Detected';throw 0;}` : '';

            const final = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><script>(function(){${antiDebug}try{const ${vP}=${chunked};document.write(decodeURIComponent(atob(${vP})));document.close()}catch(e){}})();<\/script></body></html>`;

            const outputElem = document.getElementById('outputHtml');
            outputElem.value = final;
            
            // Switch UI state
            document.getElementById('resultPlaceholder').style.display = 'none';
            document.getElementById('resultArea').classList.add('active');

            // Force Line numbers update for output
            updateLineNumbers('outputHtml', 'outputLines');
        }

        function copyResult() {
            const el = document.getElementById('outputHtml');
            el.select();
            document.execCommand('copy');
            alert(translations[localStorage.getItem('lang') || 'id'].alertCopy);
        }
    </script>
</body>
</html>
