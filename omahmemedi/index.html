<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmahMemedi 3D - TATADADA Framework</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    /* TATADADA Framework CSS Variables */
    :root {
      --header-bg: #ffffff;
      --border-color: #e2e8f0;
      --text-main: #0f172a;
      --text-dim: #64748b;
      --theme-accent: #b91c1c; 
    }
    html.dark {
      --header-bg: #161b22;
      --border-color: #30363d;
      --text-main: #e6edf3;
      --text-dim: #8b949e;
      --theme-accent: #dc2626;
    }
    body { 
      background-color: #000; 
      color: var(--text-main); 
      font-family: 'Inter', sans-serif; 
      overflow: hidden; 
      margin: 0;
      user-select: none; 
      -webkit-user-select: none;
    }

    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
    .font-data { font-family: 'JetBrains Mono', monospace; }

    /* Overlay Efek CRT & Jump Scare */
    .crt-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }
    #jump-scare-overlay {
      position: absolute;
      inset: 0;
      background-color: transparent;
      background-size: cover;
      background-position: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      filter: contrast(200%) grayscale(50%) sepia(50%) hue-rotate(-50deg);
    }
    .blood-text {
      color: #880000;
      text-shadow: 2px 2px 0px #000, 0 0 10px #ff0000;
    }

    /* Animasi Grafik EKG (Detak Jantung) */
    @keyframes heartbeat {
      0% { transform: scale(1); opacity: 0.8; }
      14% { transform: scale(1.3); opacity: 1; }
      28% { transform: scale(1); opacity: 0.8; }
      42% { transform: scale(1.3); opacity: 1; }
      70% { transform: scale(1); opacity: 0.8; }
    }
    .animate-heartbeat { animation: heartbeat 1.5s infinite; }
    .animate-heartbeat-fast { animation: heartbeat 0.3s infinite; }
  </style>
</head>
<body class="h-screen w-screen flex flex-col relative" oncontextmenu="return false;">

  <!-- Efek Visual -->
  <div class="crt-overlay"></div>
  <div id="jump-scare-overlay"></div>

  <!-- HUD In-Game -->
  <div id="ui-layer" class="absolute inset-0 pointer-events-none z-20 flex flex-col justify-between p-6 box-border opacity-0 transition-opacity duration-500">
    <div class="flex justify-between items-start w-full">
      <!-- Grafik Detak Jantung EKG -->
      <div id="stamina-bar" class="flex items-center gap-3 bg-black/60 backdrop-blur-md px-4 py-2 border border-[#222] rounded-lg shadow-xl transition-colors duration-300">
        <i data-lucide="activity" id="heart-icon" class="w-6 h-6 text-green-500 animate-heartbeat"></i>
        <span id="heart-text" class="text-green-500 text-sm font-bold font-data tracking-widest uppercase">Tenang</span>
      </div>
      
      <!-- Tombol Menyerah & Misi Status -->
      <div class="flex flex-col items-end gap-3 pointer-events-auto">
        <button id="btn-surrender" class="flex items-center gap-2 bg-black/60 hover:bg-[#3a0a0a] backdrop-blur-md px-4 py-2 border border-[#333] hover:border-red-600 rounded-lg shadow-xl transition-colors duration-300 text-gray-500 hover:text-red-500 font-data text-xs tracking-widest uppercase cursor-pointer group" title="Tekan ESC untuk memunculkan kursor lalu klik">
          <i data-lucide="flag" class="w-4 h-4 group-hover:animate-bounce"></i>
          <span>Menyerah (ESC)</span>
        </button>
        <div id="mission-status" class="text-red-500 text-sm font-bold font-data bg-black/60 backdrop-blur-md p-3 border border-red-900 rounded shadow-md hidden animate-pulse uppercase tracking-widest pointer-events-none">
          Jalan Keluar Ditemukan!
        </div>
      </div>
    </div>
    <div class="flex justify-center mb-4">
      <div class="w-1.5 h-1.5 bg-white/40 rounded-full"></div> <!-- Titik Crosshair Tengah -->
    </div>
  </div>

  <!-- MENU UTAMA (OVERLAY PENUH) -->
  <div id="main-menu" class="absolute inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm transition-opacity duration-700">
    <div class="flex flex-col items-center gap-8 w-full max-w-sm px-6">
      
      <div class="text-center">
        <i data-lucide="ghost" class="w-12 h-12 text-[#880000] mx-auto mb-4 opacity-80"></i>
        <h1 class="text-5xl font-bold blood-text mb-2 tracking-widest uppercase font-serif">Omah Memedi</h1>
        <p class="text-gray-500 text-xs italic font-data tracking-widest">W,A,S,D untuk berjalan. Mouse untuk melihat.</p>
      </div>
      
      <div class="w-full space-y-4">
        <div class="relative">
          <i data-lucide="sliders" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
          <select id="level-select" class="w-full bg-[#111] border border-[#333] text-gray-300 text-sm font-data rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-red-800 transition-colors appearance-none cursor-pointer">
            <!-- Akan diisi Javascript -->
          </select>
        </div>
        
        <button id="btn-start" class="w-full bg-[#1a0505] hover:bg-[#3a0a0a] border border-[#4a0a0a] text-red-500 hover:text-red-400 font-bold font-data py-3.5 rounded-lg shadow-lg transition-all active:scale-[0.98] uppercase tracking-widest flex items-center justify-center gap-2">
          <i data-lucide="door-open" class="w-5 h-5"></i>
          Masuk Pekarangan
        </button>
      </div>

    </div>
  </div>

  <!-- CONTAINER 3D ENGINE -->
  <div id="container-3d" class="absolute inset-0 w-full h-full outline-none z-0 bg-black cursor-crosshair"></div>

  <script>
    lucide.createIcons();

    // DOM Elements
    const mainMenu = document.getElementById('main-menu');
    const uiLayer3D = document.getElementById('ui-layer');
    const btnStart = document.getElementById('btn-start');
    const btnSurrender = document.getElementById('btn-surrender');
    const levelSelect = document.getElementById('level-select');
    const container3dElem = document.getElementById('container-3d');
    
    // Heartbeat UI Elements
    const heartIcon = document.getElementById('heart-icon');
    const heartText = document.getElementById('heart-text');
    const staminaBar = document.getElementById('stamina-bar');

    // --- SPECTRUM DIFFICULTY ENGINE ---
    let currentLevel = 1;
    let currentSize = 5;
    let levelConfig = {};

    function updateLevelConfig(lvl) {
      const ratio = (lvl - 1) / 29; 
      
      levelConfig = {
        gridSize: Math.floor(5 + ratio * 30), 
        fogDensity: 0.005 + ratio * 0.045,    
        lightIntensity: 6.0 - ratio * 4.5,    
        lightDistance: 250 - ratio * 190,     
        ambientIntensity: 0.8 - ratio * 0.75, 
        scareChance: lvl <= 3 ? 0 : Math.min(1.0, 0.05 + ((lvl - 4) / 26) * 0.95), 
        flickerChance: 0.001 + ratio * 0.079, 
        windBaseFreq: 400 - ratio * 250,      
        screamVolume: 1.5 + ratio * 2.5       
      };
      currentSize = levelConfig.gridSize;
    }

    const buildLevelOptions = () => {
      for(let i=1; i<=30; i++) {
        let desc = i<=3 ? "Jalan-jalan" : i<=10 ? "Merinding" : i<=20 ? "Jantung Berdebar" : i<=26 ? "Mencekam" : "Trauma Psikis";
        const opt = document.createElement('option');
        opt.value = i;
        opt.innerText = `Level ${i} - ${desc}`;
        levelSelect.appendChild(opt);
      }
    };
    buildLevelOptions(); 

    // --- AUDIO ENGINE ---
    let audioCtx;
    let heartbeatInterval;
    let windOscillator;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playHeartbeat(rate = 1000) {
      if (!audioCtx) return;
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      const beat = () => {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(40, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(2.0, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      };
      heartbeatInterval = setInterval(() => { beat(); setTimeout(beat, rate * 0.3); }, rate);
    }

    function stopHeartbeat() {
      if (heartbeatInterval) clearInterval(heartbeatInterval);
    }

    function startEerieWind() {
      if (!audioCtx) return;
      const bufferSize = audioCtx.sampleRate * 2; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buffer; noise.loop = true;
      const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
      const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.05; 
      const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 400;
      lfo.connect(lfoGain); lfoGain.connect(filter.frequency);
      filter.frequency.setValueAtTime(levelConfig.windBaseFreq, audioCtx.currentTime);
      lfo.start();
      const gain = audioCtx.createGain(); gain.gain.value = 0.2;
      noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      noise.start(); windOscillator = noise;
    }

    function makeDistortionCurve(amount) {
      let k = amount, n_samples = 44100, curve = new Float32Array(n_samples), deg = Math.PI / 180, i = 0, x;
      for ( ; i < n_samples; ++i ) { x = i * 2 / n_samples - 1; curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) ); }
      return curve;
    }

    function playScream() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type = 'sawtooth'; osc2.type = 'square';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(2500, audioCtx.currentTime + 0.1); osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.9);
      osc2.frequency.setValueAtTime(900, audioCtx.currentTime); osc2.frequency.exponentialRampToValueAtTime(2600, audioCtx.currentTime + 0.1); osc2.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.9);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(levelConfig.screamVolume, audioCtx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.9);
      const distortion = audioCtx.createWaveShaper();
      distortion.curve = makeDistortionCurve(400); distortion.oversample = '4x';
      osc.connect(distortion); osc2.connect(distortion); distortion.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc2.start(); osc.stop(audioCtx.currentTime + 0.9); osc2.stop(audioCtx.currentTime + 0.9);
    }

    function playGateSlam() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
      gain.gain.setValueAtTime(4.0, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.5);

      const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
      osc2.type = 'square'; osc2.frequency.setValueAtTime(400, audioCtx.currentTime); osc2.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1.0);
      gain2.gain.setValueAtTime(1.5, audioCtx.currentTime); gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
      const dist = audioCtx.createWaveShaper();
      dist.curve = makeDistortionCurve(400); dist.oversample = '4x';
      osc2.connect(dist); dist.connect(gain2); gain2.connect(audioCtx.destination);
      osc2.start(); osc2.stop(audioCtx.currentTime + 1.0);
    }

    function playDoorCreak() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.5);
      gain.gain.setValueAtTime(1.5, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 1.5);
    }

    function playFootstep() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type = 'triangle'; osc.frequency.setValueAtTime(80, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    // --- PROCEDURAL TEXTURES ---
    function createRottenWoodTexture() {
      const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1c130d'; ctx.fillRect(0, 0, 512, 512);
      for(let i=0; i<1500; i++) { ctx.fillStyle = `rgba(0,0,0, ${Math.random() * 0.6})`; ctx.fillRect(Math.random() * 512, 0, 1 + Math.random() * 4, 512); }
      for(let i=0; i<80; i++) {
        ctx.beginPath(); ctx.arc(Math.random() * 512, Math.random() * 512, 10 + Math.random() * 50, 0, Math.PI*2);
        ctx.fillStyle = Math.random() > 0.7 ? 'rgba(15, 20, 15, 0.6)' : 'rgba(10, 10, 10, 0.7)';
        ctx.filter = 'blur(6px)'; ctx.fill(); ctx.filter = 'none';
      }
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      for(let y=0; y<512; y+= 128) ctx.fillRect(0, y - 3, 512, 6);
      const texture = new THREE.CanvasTexture(canvas); texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping; return texture;
    }

    function createCreakyFloorTexture() {
      const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#110d0a'; ctx.fillRect(0, 0, 512, 512);
      for(let x=0; x<512; x+=32) {
        ctx.fillStyle = `rgba(30, 20, 15, ${0.4 + Math.random()*0.5})`; ctx.fillRect(x, 0, 30, 512);
        ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(x+30, 0, 2, 512); 
      }
      for(let i=0; i<40; i++) {
        ctx.beginPath(); ctx.arc(Math.random()*512, Math.random()*512, 10 + Math.random()*40, 0, Math.PI*2);
        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(60, 5, 5, 0.6)' : 'rgba(5, 5, 5, 0.8)';
        ctx.filter = 'blur(5px)'; ctx.fill(); ctx.filter = 'none';
      }
      const texture = new THREE.CanvasTexture(canvas); texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping; return texture;
    }

    function createCeilingTexture() {
      const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#111111'; ctx.fillRect(0,0,512,512); 
      for(let i=0; i<50; i++) {
         ctx.beginPath(); ctx.arc(Math.random()*512, Math.random()*512, 20+Math.random()*60, 0, Math.PI*2);
         ctx.fillStyle = 'rgba(10, 15, 10, 0.7)'; ctx.filter = 'blur(12px)'; ctx.fill(); ctx.filter = 'none';
      }
      ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 3;
      for(let i=0; i<15; i++) {
          ctx.beginPath(); let cx=Math.random()*512, cy=Math.random()*512; ctx.moveTo(cx, cy);
          for(let j=0; j<8; j++) { cx += (Math.random()-0.5)*60; cy += (Math.random()-0.5)*60; ctx.lineTo(cx, cy); }
          ctx.stroke();
      }
      const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
    }

    function createDirtTexture() {
      const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0f0c08'; ctx.fillRect(0, 0, 512, 512);
      for(let i=0; i<20000; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.6)' : 'rgba(25,18,10,0.5)';
        ctx.fillRect(Math.random()*512, Math.random()*512, Math.random()*4, Math.random()*4);
      }
      ctx.strokeStyle = 'rgba(30, 40, 20, 0.5)';
      for(let i=0; i<2000; i++) {
        ctx.beginPath();
        let x = Math.random()*512; let y = Math.random()*512;
        ctx.moveTo(x, y); ctx.lineTo(x + (Math.random()-0.5)*10, y - 5 - Math.random()*10);
        ctx.stroke();
      }
      const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; 
      tex.repeat.set(10, 10); 
      return tex;
    }

    function createPaintingTexture() {
      const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 384; const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#111'; ctx.fillRect(0,0,256,384);
      
      const type = Math.floor(Math.random() * 4);
      if (type === 0) {
         ctx.fillStyle = '#500';
         for(let i=0;i<8;i++) { ctx.beginPath(); ctx.arc(Math.random()*256, Math.random()*384, 15+Math.random()*20, 0, Math.PI*2); ctx.fill(); }
         ctx.fillRect(80, 100, 4, 150); ctx.fillRect(150, 150, 3, 120);
      } else if (type === 1) { 
         ctx.fillStyle = '#555'; ctx.beginPath(); ctx.ellipse(128, 150, 40, 60, 0, 0, Math.PI*2); ctx.fill();
         ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(110, 140, 10, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(146, 140, 10, 0, Math.PI*2); ctx.fill();
         ctx.fillRect(110, 180, 36, 5);
      } else if (type === 2) { 
         ctx.fillStyle = '#050505'; ctx.fillRect(90, 120, 76, 264);
         ctx.beginPath(); ctx.arc(128, 90, 25, 0, Math.PI*2); ctx.fill();
      } else { 
         ctx.strokeStyle = '#300'; ctx.lineWidth = 5;
         for(let i=0; i<10; i++) {
           ctx.beginPath(); ctx.moveTo(Math.random()*256, Math.random()*384);
           ctx.quadraticCurveTo(Math.random()*256, Math.random()*384, Math.random()*256, Math.random()*384); ctx.stroke();
         }
      }
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      for(let i=0;i<2000;i++) ctx.fillRect(Math.random()*256, Math.random()*384, 2, 2);
      return new THREE.CanvasTexture(canvas);
    }

    function createFogTexture() {
      const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128; const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0, 'rgba(200, 200, 200, 0.15)'); grad.addColorStop(1, 'rgba(200, 200, 200, 0)');
      ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
      return new THREE.CanvasTexture(canvas);
    }

    function createCobwebTexture() {
      const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
      ctx.strokeStyle = 'rgba(220, 220, 220, 0.5)'; ctx.lineWidth = 1.5;
      for(let i=0; i<=6; i++) {
         ctx.beginPath(); ctx.moveTo(0,0); let angle = (i/6) * (Math.PI/2); ctx.lineTo(Math.cos(angle)*250, Math.sin(angle)*250); ctx.stroke();
      }
      for(let r=30; r<250; r+=30) {
         ctx.beginPath(); ctx.moveTo(r, 0);
         for(let i=1; i<=6; i++) {
            let angle = (i/6) * (Math.PI/2); let droopAngle = ((i-0.5)/6) * (Math.PI/2);
            ctx.quadraticCurveTo(Math.cos(droopAngle)*(r-5), Math.sin(droopAngle)*(r-5), Math.cos(angle)*r, Math.sin(angle)*r);
         }
         ctx.stroke();
      }
      return new THREE.CanvasTexture(canvas);
    }

    function createScaryFaceDataURL(width = 512, height = 512) {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        const cx = width / 2;
        const cy = height / 2;

        function rand(min = 0, max = 1) { return Math.random() * (max - min) + min; }
        function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

        function fractalNoise(x, y, octaves = 4, persistence = 0.5) {
            let total = 0, frequency = 1, amplitude = 1, maxVal = 0;
            for (let i = 0; i < octaves; i++) {
                total += (Math.sin(x * frequency * 12.9898 + y * frequency * 78.233) * 43758.5453 - Math.floor(Math.sin(x * frequency * 12.9898 + y * frequency * 78.233) * 43758.5453)) * amplitude;
                maxVal += amplitude; amplitude *= persistence; frequency *= 2;
            }
            return total / maxVal;
        }

        const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, width * 0.8);
        bgGrad.addColorStop(0, '#1a0a0a'); bgGrad.addColorStop(0.4, '#0d0505'); bgGrad.addColorStop(1, '#000000');
        ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, width, height);

        for (let i = 0; i < 80; i++) {
            const fx = rand(0, width); const fy = rand(0, height); const fr = rand(20, 120);
            const fogGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr);
            const alpha = rand(0.01, 0.06);
            fogGrad.addColorStop(0, `rgba(40, 5, 5, ${alpha})`); fogGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = fogGrad; ctx.fillRect(fx - fr, fy - fr, fr * 2, fr * 2);
        }

        function drawDistortedFaceSilhouette() {
            ctx.save();
            const faceGrad = ctx.createLinearGradient(cx - 100, cy - 150, cx + 80, cy + 200);
            faceGrad.addColorStop(0, '#2a1515'); faceGrad.addColorStop(0.3, '#1a0808'); faceGrad.addColorStop(0.6, '#0f0404'); faceGrad.addColorStop(1, '#050101');

            ctx.beginPath();
            const headPoints = [
                { x: cx,         y: cy - 180 }, { x: cx + 55,    y: cy - 160 }, { x: cx + 95,    y: cy - 100 }, { x: cx + 110,   y: cy - 30 },
                { x: cx + 105,   y: cy + 30 }, { x: cx + 85,    y: cy + 80 }, { x: cx + 60,    y: cy + 130 }, { x: cx + 20,    y: cy + 170 },
                { x: cx - 30,    y: cy + 180 }, { x: cx - 70,    y: cy + 150 }, { x: cx - 95,    y: cy + 100 }, { x: cx - 115,   y: cy + 40 },
                { x: cx - 105,   y: cy - 20 }, { x: cx - 90,    y: cy - 80 }, { x: cx - 60,    y: cy - 140 }, { x: cx - 25,    y: cy - 175 }
            ];

            ctx.moveTo(headPoints[0].x, headPoints[0].y);
            for (let i = 0; i < headPoints.length; i++) {
                const curr = headPoints[i]; const next = headPoints[(i + 1) % headPoints.length]; const prev = headPoints[(i - 1 + headPoints.length) % headPoints.length];
                const cp1x = prev.x + (curr.x - prev.x) * 0.5 + rand(-25, 25); const cp1y = prev.y + (curr.y - prev.y) * 0.5 + rand(-20, 20);
                const cp2x = curr.x + (next.x - curr.x) * 0.5 + rand(-20, 30); const cp2y = curr.y + (next.y - curr.y) * 0.5 + rand(-15, 25);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, next.x, next.y);
            }

            ctx.closePath(); ctx.fillStyle = faceGrad; ctx.fill();
            ctx.globalAlpha = 0.3; ctx.fillStyle = '#000'; ctx.translate(rand(-5, 10), rand(-8, 5)); ctx.fill(); ctx.translate(0, 0); ctx.globalAlpha = 1;
            applyFaceNoise(); ctx.restore();
        }

        function applyFaceNoise() {
            const imageData = ctx.getImageData(0, 0, width, height); const data = imageData.data;
            for (let y = 0; y < height; y += 2) {
                for (let x = 0; x < width; x += 2) {
                    const idx = (y * width + x) * 4;
                    if (data[idx] > 5) {
                        const noise = fractalNoise(x * 0.05, y * 0.05, 3, 0.6);
                        const grain = (Math.random() - 0.5) * 15;
                        const factor = noise * 0.4 + grain * 0.02;
                        data[idx]     = Math.max(0, Math.min(255, data[idx]     + factor * 30));
                        data[idx + 1] = Math.max(0, Math.min(255, data[idx + 1] + factor * 5));
                        data[idx + 2] = Math.max(0, Math.min(255, data[idx + 2] + factor * 8));
                        data[idx] += randInt(-8, 8); data[idx + 1] += randInt(-3, 3); data[idx + 2] += randInt(-3, 3);
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function drawEyes() {
            const leftEye = { x: cx - 55 + rand(-10, 10), y: cy - 40 + rand(-15, 10), sizeX: rand(25, 40), sizeY: rand(10, 20), rotation: rand(-0.3, -0.1) };
            const rightEye = { x: cx + 50 + rand(-10, 10), y: cy - 50 + rand(-10, 15), sizeX: rand(20, 35), sizeY: rand(8, 18), rotation: rand(0.05, 0.3) };
            drawEye(leftEye, true); drawEye(rightEye, false); drawEyeGlow(leftEye); drawEyeGlow(rightEye);
        }

        function drawEye(eye, isLeft) {
            ctx.save(); ctx.translate(eye.x, eye.y); ctx.rotate(eye.rotation);
            ctx.beginPath(); ctx.moveTo(-eye.sizeX, 0);
            ctx.bezierCurveTo(-eye.sizeX * 0.5, -eye.sizeY * 2.5 + rand(-5, 5), eye.sizeX * 0.3, -eye.sizeY * 3 + rand(-8, 8), eye.sizeX, 0);
            ctx.bezierCurveTo(eye.sizeX * 0.5, eye.sizeY * 1.5 + rand(-5, 5), -eye.sizeX * 0.3, eye.sizeY * 1.8 + rand(-5, 10), -eye.sizeX, 0);
            ctx.closePath();

            const eyeGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, eye.sizeX);
            eyeGrad.addColorStop(0, '#000000'); eyeGrad.addColorStop(0.7, '#0a0000'); eyeGrad.addColorStop(1, '#1a0505');
            ctx.fillStyle = eyeGrad; ctx.fill();

            const pX = rand(-5, 8); const pY = rand(-3, 3); const prX = rand(3, 7); const prY = rand(5, 12);
            ctx.beginPath(); ctx.ellipse(pX, pY, prX, prY, 0, 0, Math.PI * 2); ctx.fillStyle = isLeft ? '#8b0000' : '#6b0000'; ctx.fill();
            ctx.beginPath(); ctx.arc(pX + rand(1, 3), pY - rand(1, 4), rand(1, 2), 0, Math.PI * 2); ctx.fillStyle = 'rgba(200, 150, 150, 0.3)'; ctx.fill();

            ctx.strokeStyle = 'rgba(60, 10, 10, 0.4)'; ctx.lineWidth = 0.5;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath(); const angle = rand(0, Math.PI * 2); const startR = eye.sizeX * 0.6; const endR = eye.sizeX * rand(1.2, 1.8);
                ctx.moveTo(Math.cos(angle) * startR, Math.sin(angle) * startR * 0.5);
                const cpx = Math.cos(angle) * (startR + endR) * 0.5 + rand(-10, 10); const cpy = Math.sin(angle) * (startR + endR) * 0.25 + rand(-10, 10);
                ctx.quadraticCurveTo(cpx, cpy, Math.cos(angle) * endR, Math.sin(angle) * endR * 0.5); ctx.stroke();
            }
            ctx.restore();
        }

        function drawEyeGlow(eye) {
            ctx.save(); const glowGrad = ctx.createRadialGradient(eye.x, eye.y, 0, eye.x, eye.y, 60);
            glowGrad.addColorStop(0, 'rgba(139, 0, 0, 0.15)'); glowGrad.addColorStop(0.5, 'rgba(80, 0, 0, 0.05)'); glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glowGrad; ctx.beginPath(); ctx.arc(eye.x, eye.y, 60, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }

        function drawMouth() {
            ctx.save(); const mY = cy + 60 + rand(-10, 20); const mW = rand(60, 90); const mH = rand(25, 50); const mTilt = rand(-0.15, 0.15);
            ctx.translate(cx, mY); ctx.rotate(mTilt); ctx.beginPath(); ctx.moveTo(-mW, rand(-5, 5));

            for (let i = 1; i <= 7; i++) {
                const t = i / 7; const px = -mW + mW * 2 * t; const py = -mH * 0.3 * Math.sin(t * Math.PI) + rand(-8, 8);
                ctx.bezierCurveTo(-mW + mW * 2 * (t - 1/14) + rand(-10, 10), -mH * 0.5 + rand(-10, 10), -mW + mW * 2 * (t - 1/28) + rand(-5, 5), -mH * 0.2 + rand(-5, 5), px, py);
            }
            for (let i = 1; i <= 5; i++) {
                const t = i / 5; const px = mW - mW * 2 * t; const py = mH * 0.4 * Math.sin(t * Math.PI) + rand(-10, 15);
                ctx.bezierCurveTo(mW - mW * 2 * (t - 0.1) + rand(-10, 10), mH * 0.6 + rand(-5, 10), mW - mW * 2 * (t - 0.05) + rand(-5, 5), mH * 0.3 + rand(-5, 5), px, py);
            }
            ctx.closePath();

            const mouthGrad = ctx.createRadialGradient(0, 0, 0, 0, mH * 0.3, mW);
            mouthGrad.addColorStop(0, '#000000'); mouthGrad.addColorStop(0.6, '#0a0000'); mouthGrad.addColorStop(1, '#1a0505');
            ctx.fillStyle = mouthGrad; ctx.fill();

            drawTeeth(-mW + 10, mW - 10, -mH * 0.2, rand(8, 18));
            ctx.strokeStyle = 'rgba(100, 0, 0, 0.5)'; ctx.lineWidth = rand(1, 3); const dripCount = randInt(2, 5);
            for (let i = 0; i < dripCount; i++) {
                ctx.beginPath(); const startX = cx + rand(-60, 60); let cY = mY + rand(0, mH * 0.5); let cX = startX; ctx.moveTo(cX, cY);
                const dLen = rand(15, 60); const segs = randInt(3, 6);
                for (let j = 0; j < segs; j++) {
                    const nY = cY + dLen / segs; const nX = cX + rand(-8, 8);
                    ctx.quadraticCurveTo(cX + rand(-15, 15), (cY + nY) / 2, nX, nY); cX = nX; cY = nY;
                }
                ctx.globalAlpha = rand(0.3, 0.6); ctx.stroke(); ctx.globalAlpha = 1;
            }
            ctx.restore();
        }

        function drawTeeth(startX, endX, baseY, maxToothHeight) {
            const toothCount = randInt(6, 12); const spacing = (endX - startX) / toothCount;
            for (let i = 0; i < toothCount; i++) {
                const tx = startX + spacing * i + rand(-3, 3); const th = rand(maxToothHeight * 0.4, maxToothHeight);
                const tw = rand(spacing * 0.3, spacing * 0.8); const tilt = rand(-0.3, 0.3);
                ctx.save(); ctx.translate(tx + tw / 2, baseY); ctx.rotate(tilt);
                ctx.beginPath(); ctx.moveTo(-tw / 2, 0); ctx.lineTo(-tw / 2 + rand(-2, 2), th);
                ctx.quadraticCurveTo(rand(-tw / 4, tw / 4), th + rand(2, 5), tw / 2 + rand(-2, 2), th); ctx.lineTo(tw / 2, 0); ctx.closePath();
                const toothGrad = ctx.createLinearGradient(0, 0, 0, th);
                toothGrad.addColorStop(0, '#d8c8b0'); toothGrad.addColorStop(0.5, '#b0a090'); toothGrad.addColorStop(1, '#807060');
                ctx.fillStyle = toothGrad; ctx.fill();
                if (Math.random() > 0.5) {
                    ctx.fillStyle = `rgba(120, 0, 0, ${rand(0.2, 0.6)})`; ctx.fillRect(rand(-tw/3, tw/3), rand(th * 0.3, th * 0.8), rand(1, 3), rand(2, 6));
                }
                ctx.restore();
            }
        }

        function drawNose() {
            ctx.save(); const noseY = cy + 10 + rand(-10, 15); ctx.strokeStyle = 'rgba(30, 5, 5, 0.5)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.ellipse(cx - rand(5, 12), noseY, rand(4, 8), rand(3, 6), rand(-0.3, 0.3), 0, Math.PI * 2); ctx.fillStyle = '#050101'; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(cx + rand(5, 12), noseY + rand(-3, 3), rand(4, 7), rand(3, 5), rand(-0.2, 0.2), 0, Math.PI * 2); ctx.fillStyle = '#050101'; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + rand(-5, 5), cy - 40); ctx.quadraticCurveTo(cx + rand(-10, 10), noseY - 10, cx - rand(5, 10), noseY);
            ctx.strokeStyle = 'rgba(40, 10, 10, 0.3)'; ctx.lineWidth = 1; ctx.stroke(); ctx.restore();
        }

        function drawScratches() {
            ctx.save(); const scratchCount = randInt(20, 50);
            for (let i = 0; i < scratchCount; i++) {
                ctx.beginPath(); const startX = rand(cx - 120, cx + 120); const startY = rand(cy - 180, cy + 180); ctx.moveTo(startX, startY);
                const segments = randInt(2, 5); let currentX = startX; let currentY = startY;
                for (let j = 0; j < segments; j++) {
                    const nextX = currentX + rand(-30, 30); const nextY = currentY + rand(-20, 20);
                    ctx.quadraticCurveTo((currentX + nextX) / 2 + rand(-20, 20), (currentY + nextY) / 2 + rand(-15, 15), nextX, nextY);
                    currentX = nextX; currentY = nextY;
                }
                ctx.strokeStyle = `rgba(${randInt(60, 120)}, ${randInt(5, 20)}, ${randInt(5, 20)}, ${rand(0.1, 0.4)})`; ctx.lineWidth = rand(0.5, 2); ctx.stroke();
            }
            ctx.restore();
        }

        function drawWrinkles() {
            ctx.save(); ctx.strokeStyle = 'rgba(25, 5, 5, 0.3)'; ctx.lineWidth = 0.5;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath(); const y = cy - 120 + rand(-10, 10) + i * 15; ctx.moveTo(cx - 50 + rand(-10, 10), y);
                for (let j = 0; j < 4; j++) {
                    const x = cx - 30 + j * 20 + rand(-5, 5); ctx.quadraticCurveTo(x - 5, y + rand(-3, 3), x, y + rand(-2, 2));
                }
                ctx.stroke();
            }
            for (let side = -1; side <= 1; side += 2) {
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath(); const baseX = cx + side * 70 + rand(-10, 10); const baseY = cy + 50 + rand(-10, 10); ctx.moveTo(baseX, baseY);
                    ctx.quadraticCurveTo(baseX + side * rand(5, 15), baseY + rand(-10, 10), baseX + side * rand(10, 25), baseY + rand(-5, 5)); ctx.stroke();
                }
            }
            ctx.restore();
        }

        drawDistortedFaceSilhouette();
        drawNose();
        drawEyes();
        drawMouth();
        drawWrinkles();
        drawScratches();

        const imageData = ctx.getImageData(0, 0, width, height); const data = imageData.data;
        for (let y = height - 1; y > 3; y--) {
            for (let x = 0; x < width; x += 2) {
                const srcIdx = ((y - 3) * width + x) * 4; const destIdx = (y * width + x) * 4;
                for (let c = 0; c < 4; c++) { data[destIdx + c] = data[destIdx + c] * 0.9 + data[srcIdx + c] * 0.1; }
            }
        }
        ctx.putImageData(imageData, 0, 0);

        const vignetteGrad = ctx.createRadialGradient(cx, cy, width * 0.25, cx, cy, width * 0.7);
        vignetteGrad.addColorStop(0, 'rgba(0, 0, 0, 0)'); vignetteGrad.addColorStop(0.7, 'rgba(0, 0, 0, 0.3)'); vignetteGrad.addColorStop(1, 'rgba(0, 0, 0, 0.8)');
        ctx.fillStyle = vignetteGrad; ctx.fillRect(0, 0, width, height);

        for (let i = 0; i < 100; i++) {
            ctx.beginPath(); ctx.arc(rand(0, width), rand(0, height), rand(0.5, 2), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${randInt(40, 80)}, ${randInt(10, 30)}, ${randInt(10, 30)}, ${rand(0.1, 0.3)})`; ctx.fill();
        }

        return canvas.toDataURL('image/png');
    }

    // --- MAZE GENERATOR ---
    function generateMaze(size) {
      let grid = [];
      for (let r = 0; r < size; r++) {
        let row = [];
        for (let c = 0; c < size; c++) { row.push({ r, c, visited: false, walls: { top: true, right: true, bottom: true, left: true }, isDeadEnd: false, hasJumpScare: false }); }
        grid.push(row);
      }

      let current = grid[0][0]; current.visited = true; let stack = [current];
      const getUnvisitedNeighbors = (cell) => {
        let neighbors = []; let { r, c } = cell;
        if (r > 0 && !grid[r - 1][c].visited) neighbors.push({ cell: grid[r - 1][c], dir: 'top' });
        if (c < size - 1 && !grid[r][c + 1].visited) neighbors.push({ cell: grid[r][c + 1], dir: 'right' });
        if (r < size - 1 && !grid[r + 1][c].visited) neighbors.push({ cell: grid[r + 1][c], dir: 'bottom' });
        if (c > 0 && !grid[r][c - 1].visited) neighbors.push({ cell: grid[r][c - 1], dir: 'left' });
        return neighbors;
      };

      while (stack.length > 0) {
        current = stack[stack.length - 1]; let neighbors = getUnvisitedNeighbors(current);
        if (neighbors.length > 0) {
          let nextNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)]; let nextCell = nextNeighbor.cell; let dir = nextNeighbor.dir;
          if (dir === 'top') { current.walls.top = false; nextCell.walls.bottom = false; } else if (dir === 'right') { current.walls.right = false; nextCell.walls.left = false; }
          else if (dir === 'bottom') { current.walls.bottom = false; nextCell.walls.top = false; } else if (dir === 'left') { current.walls.left = false; nextCell.walls.right = false; }
          nextCell.visited = true; stack.push(nextCell);
        } else { stack.pop(); }
      }
      grid[0][0].walls.top = false; grid[size - 1][size - 1].walls.bottom = false;

      let deadEnds = [];
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (r === 0 && c === 0) continue; if (r === size-1 && c === size-1) continue;
          let wallCount = 0;
          if (grid[r][c].walls.top) wallCount++; if (grid[r][c].walls.bottom) wallCount++;
          if (grid[r][c].walls.left) wallCount++; if (grid[r][c].walls.right) wallCount++;
          if (wallCount >= 3) { grid[r][c].isDeadEnd = true; deadEnds.push(grid[r][c]); }
        }
      }

      let scareCount = Math.floor(deadEnds.length * levelConfig.scareChance); 
      deadEnds.sort(() => 0.5 - Math.random());
      for(let i=0; i<scareCount; i++) deadEnds[i].hasJumpScare = true;

      return grid;
    }

    function createDeadTree(x, z) {
      const treeGroup = new THREE.Group();
      const woodMat = new THREE.MeshStandardMaterial({ color: 0x110a05, roughness: 1.0 });

      const trunkHeight = 10 + Math.random() * 12;
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 1.2, trunkHeight, 5), woodMat);
      trunk.position.y = trunkHeight / 2;
      trunk.rotation.x = (Math.random() - 0.5) * 0.1;
      trunk.castShadow = true; trunk.receiveShadow = true;
      treeGroup.add(trunk);

      for (let i = 0; i < 2 + Math.random() * 3; i++) {
          const bLength = 4 + Math.random() * 6;
          const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.4, bLength, 4), woodMat);
          branch.position.y = trunkHeight * (0.3 + Math.random() * 0.6);
          branch.rotation.z = (Math.random() - 0.5) * Math.PI * 0.8;
          branch.rotation.x = (Math.random() - 0.5) * Math.PI * 0.8;
          branch.position.x += Math.sin(branch.rotation.z) * bLength/3;
          branch.castShadow = true;
          treeGroup.add(branch);
      }
      treeGroup.position.set(x, 0, z);
      return treeGroup;
    }

    function createTombstone(x, z) {
      const geo = new THREE.BoxGeometry(2, 3, 0.5);
      const topGeo = new THREE.CylinderGeometry(1, 1, 0.5, 16);

      topGeo.translate(0, 1.5, 0);
      
      const mat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
      const mesh = new THREE.Mesh(geo, mat);
      const topMesh = new THREE.Mesh(topGeo, mat);
      mesh.add(topMesh);
      
      mesh.position.set(x, 1.0, z); 
      mesh.rotation.y = (Math.random() - 0.5) * 0.5;
      mesh.rotation.x = (Math.random() - 0.5) * 0.2; 
      mesh.castShadow = true; mesh.receiveShadow = true;
      return mesh;
    }

    function init3D() {

      flashlight = new THREE.SpotLight(0xffeedd, levelConfig.lightIntensity, levelConfig.lightDistance, Math.PI / 3.5, 0.8, 1); 
      flashlight.position.set(0, 0, 0);
      flashlight.target.position.set(0, 0, -1);
      flashlight.castShadow = true;
      flashlight.shadow.mapSize.width = 1024;
      flashlight.shadow.mapSize.height = 1024;
      flashlight.shadow.camera.near = 0.5;
      flashlight.shadow.camera.far = 100;
      flashlight.shadow.bias = -0.001; 
      camera.add(flashlight); camera.add(flashlight.target);

      const ambient = new THREE.AmbientLight(0x443333, levelConfig.ambientIntensity); scene.add(ambient);

      renderer = new THREE.WebGLRenderer({ antialias: false }); 
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true; 
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container3dElem.appendChild(renderer.domElement);

      const wallTex = createRottenWoodTexture(); 
      const floorTex = createCreakyFloorTexture(); 
      const ceilTex = createCeilingTexture();
      const dirtTex = createDirtTexture();
      
      const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.9 });
      const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.9 });
      const ceilMat = new THREE.MeshStandardMaterial({ map: ceilTex, roughness: 1.0 });
      const dirtMat = new THREE.MeshStandardMaterial({ map: dirtTex, roughness: 1.0 });

      const fogGeo1 = new THREE.BufferGeometry(); const fogGeo2 = new THREE.BufferGeometry();
      const fogCount = currentSize * currentSize * 25; 
      const fogPos1 = new Float32Array(fogCount * 3); const fogPos2 = new Float32Array(fogCount * 3);
      
      const mazeCenter = (currentSize * PHYS.cellSize) / 2;
      const fogSpread = currentSize * PHYS.cellSize * 1.5;

      for(let i=0; i<fogCount; i++) {
         fogPos1[i*3] = (Math.random() - 0.5) * fogSpread; 
         fogPos1[i*3+1] = Math.random() * 2.0; 
         fogPos1[i*3+2] = (Math.random() - 0.5) * fogSpread;

         fogPos2[i*3] = (Math.random() - 0.5) * fogSpread; 
         fogPos2[i*3+1] = Math.random() * 2.0; 
         fogPos2[i*3+2] = (Math.random() - 0.5) * fogSpread;
      }
      fogGeo1.setAttribute('position', new THREE.BufferAttribute(fogPos1, 3));
      fogGeo2.setAttribute('position', new THREE.BufferAttribute(fogPos2, 3));

      const fogMat = new THREE.PointsMaterial({
         map: createFogTexture(), size: 18.0, transparent: true, depthWrite: false, opacity: 0.3 + (currentLevel/30)*0.5, blending: THREE.AdditiveBlending
      });
      fogGroup1 = new THREE.Points(fogGeo1, fogMat); fogGroup1.position.set(mazeCenter, 0, mazeCenter); scene.add(fogGroup1);
      fogGroup2 = new THREE.Points(fogGeo2, fogMat); fogGroup2.position.set(mazeCenter, 0, mazeCenter); scene.add(fogGroup2);

      const inGeo = new THREE.PlaneGeometry(currentSize * PHYS.cellSize, currentSize * PHYS.cellSize);
      inGeo.rotateX(-Math.PI / 2);
      const floorMesh = new THREE.Mesh(inGeo, floorMat);
      floorMesh.position.set((currentSize*PHYS.cellSize)/2 - PHYS.cellSize/2, 0.01, (currentSize*PHYS.cellSize)/2 - PHYS.cellSize/2); 
      floorMesh.receiveShadow = true;
      scene.add(floorMesh);

      const ceilMesh = new THREE.Mesh(inGeo, ceilMat);
      ceilMesh.position.set((currentSize*PHYS.cellSize)/2 - PHYS.cellSize/2, PHYS.wallHeight, (currentSize*PHYS.cellSize)/2 - PHYS.cellSize/2);
      ceilMesh.rotation.x = Math.PI; 
      ceilMesh.receiveShadow = true;
      scene.add(ceilMesh);

      const yardGeo = new THREE.PlaneGeometry(currentSize * PHYS.cellSize * 4, currentSize * PHYS.cellSize * 4);
      yardGeo.rotateX(-Math.PI / 2);
      const yardMesh = new THREE.Mesh(yardGeo, dirtMat);
      yardMesh.position.set((currentSize*PHYS.cellSize)/2, 0, (currentSize*PHYS.cellSize)/2);
      yardMesh.receiveShadow = true;
      scene.add(yardMesh);

      const safeMinX = -PHYS.cellSize;
      const safeMaxX = currentSize * PHYS.cellSize;
      const safeMinZ = -PHYS.cellSize;
      const safeMaxZ = currentSize * PHYS.cellSize;

      for(let i=0; i<80; i++) {
        let tx = (currentSize*PHYS.cellSize)/2 + (Math.random() - 0.5) * (currentSize * PHYS.cellSize * 3.5);
        let tz = (currentSize*PHYS.cellSize)/2 + (Math.random() - 0.5) * (currentSize * PHYS.cellSize * 3.5);
        
        if (tx > safeMinX && tx < safeMaxX && tz > safeMinZ && tz < safeMaxZ) continue;
        
        scene.add(createDeadTree(tx, tz));
        if (Math.random() > 0.5) scene.add(createTombstone(tx + (Math.random()*4-2), tz + (Math.random()*4-2)));
      }

      const ghostTex = new THREE.TextureLoader().load(createScaryFaceDataURL());
      const ghostMat = new THREE.MeshBasicMaterial({ map: ghostTex, transparent: true, side: THREE.DoubleSide });
      ghostMesh = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), ghostMat);
      ghostMesh.visible = false; scene.add(ghostMesh);

      physicalWalls = [];
      const pillarGeo = new THREE.BoxGeometry(PHYS.wallThick + 0.2, PHYS.wallHeight + 0.2, PHYS.wallThick + 0.2);
      const hWallGeo = new THREE.BoxGeometry(PHYS.cellSize, PHYS.wallHeight, PHYS.wallThick);
      const vWallGeo = new THREE.BoxGeometry(PHYS.wallThick, PHYS.wallHeight, PHYS.cellSize);
      
      const exitMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });
      const exitGeo = new THREE.BoxGeometry(PHYS.cellSize, PHYS.wallHeight, 1);

      function createExitDoor(wx, wz) {
        const hinge = new THREE.Group();
        hinge.position.set(wx - PHYS.cellSize/2, PHYS.wallHeight/2, wz);
        
        const doorMat = new THREE.MeshStandardMaterial({ color: 0x2e1b0d, roughness: 0.8 });
        const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(PHYS.cellSize, PHYS.wallHeight, 1.2), doorMat);
        doorMesh.position.set(PHYS.cellSize/2, 0, 0); 
        doorMesh.castShadow = true; doorMesh.receiveShadow = true;
        
        const knob = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: 0x555555, metalness: 0.9}));
        knob.position.set(PHYS.cellSize - 1.5, 0, 0.7);
        
        const exitLight = new THREE.PointLight(0x5588ff, 4.0, 40);
        exitLight.position.set(PHYS.cellSize/2, 0, 10);
        
        hinge.add(doorMesh); hinge.add(knob); hinge.add(exitLight);
        scene.add(hinge);
        return hinge;
      }

      const addWallDecor = (wx, wz, isVertical) => {
        const isMirror = Math.random() > 0.6;
        let decorMesh;
        
        if (isMirror) {
           const frame = new THREE.Mesh(new THREE.BoxGeometry(3, 4.5, 0.3), new THREE.MeshStandardMaterial({color: 0x110800, roughness: 1.0}));
           const mirror = new THREE.Mesh(new THREE.PlaneGeometry(2.6, 4.1), new THREE.MeshStandardMaterial({color: 0x222222, metalness: 1.0, roughness: 0.1}));
           mirror.position.z = 0.16; frame.add(mirror);
           if(Math.random() > 0.5) {
              const faintFace = new THREE.Mesh(new THREE.PlaneGeometry(2.6, 4.1), new THREE.MeshBasicMaterial({map: ghostTex, transparent: true, opacity: 0.1, depthWrite: false}));
              faintFace.position.z = 0.17; frame.add(faintFace);
           }
           decorMesh = frame;
        } else {
           const frame = new THREE.Mesh(new THREE.BoxGeometry(3.5, 5, 0.2), new THREE.MeshStandardMaterial({color: 0x1a0d00, roughness: 1.0}));
           const painting = new THREE.Mesh(new THREE.PlaneGeometry(3.1, 4.6), new THREE.MeshStandardMaterial({map: createPaintingTexture(), roughness: 0.8}));
           painting.position.z = 0.11; frame.add(painting);
           decorMesh = frame;
        }

        const side = Math.random() > 0.5 ? 1 : -1;
        const height = PHYS.wallHeight * 0.45 + (Math.random()-0.5)*2; 

        if (isVertical) {
            decorMesh.position.set(wx + side * (PHYS.wallThick/2 + 0.15), height, wz + (Math.random()-0.5)*PHYS.cellSize*0.5);
            decorMesh.rotation.y = side === 1 ? Math.PI/2 : -Math.PI/2;
        } else {
            decorMesh.position.set(wx + (Math.random()-0.5)*PHYS.cellSize*0.5, height, wz + side * (PHYS.wallThick/2 + 0.15));
            decorMesh.rotation.y = side === 1 ? 0 : Math.PI;
        }
        decorMesh.castShadow = true; scene.add(decorMesh);
      };

      for (let r = 0; r <= currentSize; r++) {
        for (let c = 0; c <= currentSize; c++) {
           let pMesh = new THREE.Mesh(pillarGeo, wallMat);
           pMesh.position.set(c * PHYS.cellSize - PHYS.cellSize/2, PHYS.wallHeight/2, r * PHYS.cellSize - PHYS.cellSize/2);
           pMesh.castShadow = true; pMesh.receiveShadow = true;
           scene.add(pMesh);
        }
      }

      const addWall = (wx, wz, isVertical) => {
        let mesh = new THREE.Mesh(isVertical ? vWallGeo : hWallGeo, wallMat);
        mesh.position.set(wx, PHYS.wallHeight/2, wz); 
        mesh.castShadow = true; mesh.receiveShadow = true;
        scene.add(mesh);
        let w = isVertical ? PHYS.wallThick : PHYS.cellSize; let d = isVertical ? PHYS.cellSize : PHYS.wallThick;
        physicalWalls.push({ minX: wx - w/2, maxX: wx + w/2, minZ: wz - d/2, maxZ: wz + d/2 });
      };

      for (let r = 0; r < currentSize; r++) {
        for (let c = 0; c < currentSize; c++) {
          let x = c * PHYS.cellSize; let z = r * PHYS.cellSize; let cell = mazeGrid[r][c];

          if (cell.walls.top && !(r===0 && c===0)) {
            addWall(x, z - PHYS.cellSize/2, false);
            if(Math.random() < 0.15) addWallDecor(x, z - PHYS.cellSize/2, false);
          }
          if (cell.walls.left) {
            addWall(x - PHYS.cellSize/2, z, true);
            if(Math.random() < 0.15) addWallDecor(x - PHYS.cellSize/2, z, true);
          }
          if (r === currentSize - 1) {
            if (cell.walls.bottom && c !== currentSize - 1) {
              addWall(x, z + PHYS.cellSize/2, false);
              if(Math.random() < 0.15) addWallDecor(x, z + PHYS.cellSize/2, false);
            }
            else if (c === currentSize - 1) {
              exitDoorHinge = createExitDoor(x, z + PHYS.cellSize/2);
            }
          }
          if (c === currentSize - 1 && cell.walls.right) {
            addWall(x + PHYS.cellSize/2, z, true);
            if(Math.random() < 0.15) addWallDecor(x + PHYS.cellSize/2, z, true);
          }

          let isVertPath = !cell.walls.top && !cell.walls.bottom;
          let isHorzPath = !cell.walls.left && !cell.walls.right;

          if (isVertPath && cell.walls.left && cell.walls.right && r !== 0 && r !== currentSize - 1) {
            if (Math.random() < 0.4) {
              let chokeThick = 4 + Math.random() * 5.0; 
              let side = Math.random() > 0.5 ? 1 : -1;
              let cx = x + side * (PHYS.cellSize/2 - chokeThick/2);
              let cMesh = new THREE.Mesh(new THREE.BoxGeometry(chokeThick, PHYS.wallHeight, PHYS.cellSize), wallMat);
              cMesh.position.set(cx, PHYS.wallHeight/2, z);
              cMesh.castShadow = true; cMesh.receiveShadow = true; scene.add(cMesh);
              physicalWalls.push({ minX: cx - chokeThick/2, maxX: cx + chokeThick/2, minZ: z - PHYS.cellSize/2, maxZ: z + PHYS.cellSize/2 });
            }
          } else if (isHorzPath && cell.walls.top && cell.walls.bottom && c !== 0 && c !== currentSize - 1) {
            if (Math.random() < 0.4) {
              let chokeThick = 4 + Math.random() * 5.0;
              let side = Math.random() > 0.5 ? 1 : -1;
              let cz = z + side * (PHYS.cellSize/2 - chokeThick/2);
              let cMesh = new THREE.Mesh(new THREE.BoxGeometry(PHYS.cellSize, PHYS.wallHeight, chokeThick), wallMat);
              cMesh.position.set(x, PHYS.wallHeight/2, cz);
              cMesh.castShadow = true; cMesh.receiveShadow = true; scene.add(cMesh);
              physicalWalls.push({ minX: x - PHYS.cellSize/2, maxX: x + PHYS.cellSize/2, minZ: cz - chokeThick/2, maxZ: cz + chokeThick/2 });
            }
          }
        }
      }
      
      const gateGroup = new THREE.Group();
      const ironMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.9 });
      for(let i=0; i<7; i++) {
        let bar = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, PHYS.wallHeight), ironMat);
        bar.position.set(-PHYS.cellSize/2 + 1.5 + i*2, PHYS.wallHeight/2, 0);
        bar.castShadow = true; gateGroup.add(bar);
      }
      let hBar1 = new THREE.Mesh(new THREE.BoxGeometry(PHYS.cellSize, 0.4, 0.4), ironMat);
      hBar1.position.set(0, PHYS.wallHeight * 0.3, 0); hBar1.castShadow = true; gateGroup.add(hBar1);
      let hBar2 = new THREE.Mesh(new THREE.BoxGeometry(PHYS.cellSize, 0.4, 0.4), ironMat);
      hBar2.position.set(0, PHYS.wallHeight * 0.7, 0); hBar2.castShadow = true; gateGroup.add(hBar2);
      
      gateGroup.position.set(0, PHYS.wallHeight + 2, -PHYS.cellSize/2); 
      scene.add(gateGroup);
      ironGate = gateGroup;
      isGateClosed = false;

      camera.position.set(0, PHYS.playerHeight, -PHYS.cellSize * 1.5); 
      yaw = Math.PI; pitch = 0;
    }

    const clock = new THREE.Clock();
    let walkBob = 0; let stepTimer = 0; let currentGridCell = { r: 0, c: 0 };

    function checkCollision(oldX, oldZ, dx, dz) {
      let newX = oldX + dx; let newZ = oldZ + dz; let pr = PHYS.playerRadius;
      let boxX = { minX: newX - pr, maxX: newX + pr, minZ: oldZ - pr, maxZ: oldZ + pr };
      for(let w of physicalWalls) {
        if(boxX.minX < w.maxX && boxX.maxX > w.minX && boxX.minZ < w.maxZ && boxX.maxZ > w.minZ) {
          if(dx > 0) newX = w.minX - pr - 0.01; else if(dx < 0) newX = w.maxX + pr + 0.01;
        }
      }
      let boxZ = { minX: oldX - pr, maxX: oldX + pr, minZ: newZ - pr, maxZ: newZ + pr };
      for(let w of physicalWalls) {
        if(boxZ.minX < w.maxX && boxZ.maxX > w.minX && boxZ.minZ < w.maxZ && boxZ.maxZ > w.minZ) {
          if(dz > 0) newZ = w.minZ - pr - 0.01; else if(dz < 0) newZ = w.maxZ + pr + 0.01;
        }
      }
      
      const boundMinX = -PHYS.cellSize * 4; 
      const boundMinZ = -PHYS.cellSize * 4;
      const boundMax = currentSize * PHYS.cellSize + PHYS.cellSize * 4;
      if (newX < boundMinX + pr) newX = boundMinX + pr; if (newX > boundMax - pr) newX = boundMax - pr;
      if (newZ < boundMinZ + pr) newZ = boundMinZ + pr;
      return { x: newX, z: newZ };
    }

    function animate() {
      if (!isGameRunning) return;
      animationId = requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.1);

      if (fogGroup1 && fogGroup2) {
        fogGroup1.rotation.y -= 0.05 * dt;
        fogGroup2.rotation.y += 0.03 * dt;
        fogGroup1.position.y = Math.sin(clock.elapsedTime * 0.5) * 0.2;
        fogGroup2.position.y = Math.cos(clock.elapsedTime * 0.4) * 0.2;
      }

      if (!isGateClosed && camera.position.z > -PHYS.cellSize/4) {
        isGateClosed = true;
        playGateSlam();
        setHeartbeatUI(true); 
        setTimeout(() => setHeartbeatUI(false), 3500);
        
        let gateDrop = setInterval(() => {
          ironGate.position.y -= 1.2; 
          if (ironGate.position.y <= 0) {
            ironGate.position.y = 0;
            clearInterval(gateDrop);
            cameraShake = 2.5; 
            physicalWalls.push({ 
              minX: -PHYS.cellSize/2, maxX: PHYS.cellSize/2, 
              minZ: -PHYS.cellSize/2 - 0.5, maxZ: -PHYS.cellSize/2 + 0.5 
            });
          }
        }, 16);
      }

      if (isGhostAttacking) {
        ghostAttackTimer += dt;
        const dir = new THREE.Vector3().subVectors(camera.position, ghostMesh.position).normalize();
        ghostMesh.position.add(dir.multiplyScalar(25 * dt)); 
        ghostMesh.scale.setScalar(1 + ghostAttackTimer * 2); 
        if (ghostAttackTimer > 0.6) { 
          ghostMesh.visible = false; isGhostAttacking = false;
          scareOverlay.style.opacity = 1; 
          setTimeout(() => scareOverlay.style.opacity = 0, 150);
        }
      }

      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); forward.y = 0; forward.normalize();
      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion); right.y = 0; right.normalize();

      let dirX = 0; let dirZ = 0;
      if (!isGhostAttacking) {
        if (keys.w) { dirX += forward.x; dirZ += forward.z; } if (keys.s) { dirX -= forward.x; dirZ -= forward.z; }
        if (keys.a) { dirX -= right.x; dirZ -= right.z; } if (keys.d) { dirX += right.x; dirZ += right.z; }
      }

      let moveSpeed = PHYS.speed; 
      if (dirX !== 0 || dirZ !== 0) {
        let length = Math.sqrt(dirX*dirX + dirZ*dirZ); dirX /= length; dirZ /= length;
        let dx = dirX * moveSpeed * dt; let dz = dirZ * moveSpeed * dt;
        const newPos = checkCollision(camera.position.x, camera.position.z, dx, dz);
        camera.position.x = newPos.x; camera.position.z = newPos.z;

        walkBob += dt * 8; camera.position.y = PHYS.playerHeight + Math.sin(walkBob) * 0.4;
        stepTimer += dt;
        if (stepTimer > 0.6) { playFootstep(); stepTimer = 0; }
      } else {
        camera.position.y += (PHYS.playerHeight - camera.position.y) * 10 * dt;
      }

      if (!hasWon && camera.position.z > (currentSize - 0.5) * PHYS.cellSize && camera.position.x > (currentSize - 1.5) * PHYS.cellSize) {
        hasWon = true;
        document.getElementById('mission-status').classList.remove('hidden');
        document.exitPointerLock();
        setTimeout(() => { location.reload(); }, 4000);
      }

      if (exitDoorHinge) {
        const distToExit = camera.position.distanceTo(exitDoorHinge.position);
        if (distToExit < PHYS.cellSize * 1.8 && !isExitDoorOpening) {
          isExitDoorOpening = true;
          playDoorCreak();
        }
        if (isExitDoorOpening && exitDoorHinge.rotation.y < Math.PI / 2) {
          exitDoorHinge.rotation.y += 1.5 * dt; 
        }
      }

      let gridR = Math.round(camera.position.z / PHYS.cellSize); let gridC = Math.round(camera.position.x / PHYS.cellSize);
      if (gridR >= 0 && gridR < currentSize && gridC >= 0 && gridC < currentSize) {
        if (gridR !== currentGridCell.r || gridC !== currentGridCell.c) {
          currentGridCell = { r: gridR, c: gridC };
          let cell = mazeGrid[gridR][gridC];
          if (cell.hasJumpScare) { doJumpScare(); cell.hasJumpScare = false; }
        }
      }

      if (Math.random() < levelConfig.flickerChance) {
        flashlight.intensity = 0.5 + Math.random() * (levelConfig.lightIntensity * 0.5);
      } else {
        flashlight.intensity += (levelConfig.lightIntensity - flashlight.intensity) * 0.1;
      }

      let finalPitch = pitch; let finalYaw = yaw;
      if (cameraShake > 0) {
        finalPitch += (Math.random() - 0.5) * cameraShake * 0.2; finalYaw += (Math.random() - 0.5) * cameraShake * 0.2;
        cameraShake -= dt * 2; if (cameraShake < 0) cameraShake = 0;
      }
      camera.rotation.set(finalPitch, finalYaw, 0, 'YXZ');

      renderer.render(scene, camera);
    }

    btnStart.addEventListener('click', () => {
      initAudio();
      currentLevel = parseInt(levelSelect.value);
      updateLevelConfig(currentLevel);
      mazeGrid = generateMaze(currentSize);
      
      mainMenu.classList.add('opacity-0', 'pointer-events-none');
      uiLayer3D.classList.remove('opacity-0');
      
      init3D();
      container3dElem.requestPointerLock();
      isGameRunning = true; hasWon = false;
      
      let baseHeartbeat = 1000 - ((currentLevel-1)/29) * 400; 
      playHeartbeat(baseHeartbeat); 
      setHeartbeatUI(false);
      startEerieWind();
      
      clock.start(); animate();
    });

    btnSurrender.addEventListener('click', () => {
      isGameRunning = false;
      cancelAnimationFrame(animationId);
      
      document.exitPointerLock();
      stopHeartbeat();
      
      if (windOscillator) {
        try { windOscillator.stop(); } catch(e) {}
      }
      
      uiLayer3D.classList.add('opacity-0');
      
      setTimeout(() => {
        container3dElem.innerHTML = '';
        mainMenu.classList.remove('opacity-0', 'pointer-events-none');
        
        scene = null; 
        camera = null; 
        renderer = null; 
        physicalWalls = [];
        isGhostAttacking = false;
        isGateClosed = false;
        exitDoorHinge = null;
        isExitDoorOpening = false;
      }, 500);
    });

  </script>
</body>
</html>
