<!DOCTYPE html>
<html lang="id" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATADADA PORTAL</title>
    <!-- Framework & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* 2. CSS TOKENS & DARK MODE */
        :root {
            --header-bg: #ffffff;
            --editor-bg: #ffffff;
            --preview-bg: #f2f2f7; 
            --footer-bg: #ffffff;
            --border-color: #e5e5ea;
            --text-main: #000000;
            --text-dim: #8e8e93;
        }
        html.dark {
            --header-bg: #1c1c1e;
            --editor-bg: #1c1c1e;
            --preview-bg: #000000;
            --footer-bg: #1c1c1e;
            --border-color: #38383a;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            color-scheme: dark;
        }
        body { 
            background-color: var(--preview-bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; 
        }

        /* Utility Classes */
        .border-theme { border-color: var(--border-color); }
        .bg-header { background-color: var(--header-bg); }
        .bg-preview { background-color: var(--preview-bg); }
        .bg-footer { background-color: var(--footer-bg); }
        .text-dim { color: var(--text-dim); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
        html.dark ::-webkit-scrollbar-thumb { background: #3a3a3c; }

        /* Branding Gradient */
        .brand-gradient {
            background: linear-gradient(135deg, #007aff, #5856d6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Alphabet Bar */
        .alpha-btn.active {
            background-color: #007aff;
            color: white;
            border-color: #007aff;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        /* Premium Mesh Gradients (iOS 17 Aesthetic) */
        .mesh-0 { background-color: #ff2d55; background-image: radial-gradient(at 80% 100%, #c135ff 0%, transparent 70%), radial-gradient(at 0% 0%, #ff9500 0%, transparent 70%); --shadow-color: rgba(255, 45, 85, 0.4); }
        .mesh-1 { background-color: #007aff; background-image: radial-gradient(at 80% 100%, #5856d6 0%, transparent 70%), radial-gradient(at 0% 0%, #32ade6 0%, transparent 70%); --shadow-color: rgba(0, 122, 255, 0.4); }
        .mesh-2 { background-color: #af52de; background-image: radial-gradient(at 80% 100%, #ff2d55 0%, transparent 70%), radial-gradient(at 0% 0%, #5856d6 0%, transparent 70%); --shadow-color: rgba(175, 82, 222, 0.4); }
        .mesh-3 { background-color: #34c759; background-image: radial-gradient(at 80% 100%, #007aff 0%, transparent 70%), radial-gradient(at 0% 0%, #ffcc00 0%, transparent 70%); --shadow-color: rgba(52, 199, 89, 0.4); }
        .mesh-4 { background-color: #ff9500; background-image: radial-gradient(at 80% 100%, #ff2d55 0%, transparent 70%), radial-gradient(at 0% 0%, #ffcc00 0%, transparent 70%); --shadow-color: rgba(255, 149, 0, 0.4); }
        .mesh-5 { background-color: #2c2c2e; background-image: radial-gradient(at 80% 100%, #1c1c1e 0%, transparent 70%), radial-gradient(at 0% 0%, #8e8e93 0%, transparent 70%); --shadow-color: rgba(44, 44, 46, 0.4); }
        .mesh-6 { background-color: #ff375f; background-image: radial-gradient(at 80% 100%, #ff9500 0%, transparent 70%), radial-gradient(at 0% 0%, #ffcc00 0%, transparent 70%); --shadow-color: rgba(255, 55, 95, 0.4); }
        .mesh-7 { background-color: #32ade6; background-image: radial-gradient(at 80% 100%, #007aff 0%, transparent 70%), radial-gradient(at 0% 0%, #34c759 0%, transparent 70%); --shadow-color: rgba(50, 173, 230, 0.4); }
        .mesh-8 { background-color: #ffcc00; background-image: radial-gradient(at 80% 100%, #ff9500 0%, transparent 70%), radial-gradient(at 0% 0%, #34c759 0%, transparent 70%); --shadow-color: rgba(255, 204, 0, 0.4); }
        .mesh-9 { background-color: #5856d6; background-image: radial-gradient(at 80% 100%, #af52de 0%, transparent 70%), radial-gradient(at 0% 0%, #007aff 0%, transparent 70%); --shadow-color: rgba(88, 86, 214, 0.4); }

        /* iOS Aesthetic */
        .ios-card {
            transition: all 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            background: transparent;
        }
        .ios-card:hover {
            transform: scale(1.02);
        }
        .ios-card:active {
            transform: scale(0.95);
            opacity: 0.7;
        }

        /* Ultra Premium iOS Icon Shape (Squircle) */
        .icon-squircle {
            border-radius: 22.5%; 
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* Inner glow + colored drop shadow for depth */
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.6), 
                inset 0 -2px 5px rgba(0, 0, 0, 0.15), 
                0 15px 25px -5px var(--shadow-color, rgba(0,0,0,0.1)),
                0 8px 10px -6px var(--shadow-color, rgba(0,0,0,0.1));
            transition: all 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        }
        
        .icon-squircle::before {
            /* Secondary glassy shine */
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(120% 100% at 50% 0%, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }

        .icon-squircle::after {
            /* Bevel border overlay */
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,0.1) 100%);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }

        /* Icon Drop Shadow */
        .icon-squircle svg {
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.35));
            position: relative;
            z-index: 10;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 3.A HEADER -->
    <header class="h-14 flex items-center justify-between px-6 border-b border-theme bg-header shrink-0 relative z-50">
        <div class="flex items-center gap-4">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <h1 class="text-xl font-extrabold brand-gradient tracking-tight italic">TATADADA</h1>
                    <span class="text-[9px] font-mono text-dim italic mt-1 px-1.5 py-0.5 bg-preview border border-theme rounded" id="build-time">...</span>
                </div>
                <a href="https://danial.my.id" target="_blank" class="font-bold tracking-[0.25em] text-[8px] text-dim hover:text-blue-500 transition-colors">
                    AHMADDANIAL
                </a>
            </div>
            
            <div class="relative help-trigger">
                <button class="p-1 text-dim hover:text-main transition-colors">
                    <i data-lucide="info" class="w-4 h-4"></i>
                </button>
                <div class="help-tooltip hidden absolute left-0 top-full mt-2 w-64 p-4 bg-header border border-theme rounded-2xl shadow-2xl text-[12px] leading-relaxed z-[100]">
                    <p id="help-text">Memuat panduan...</p>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div class="relative hidden lg:block">
                <i data-lucide="search" class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-dim"></i>
                <input type="text" id="searchInput" 
                    class="pl-9 pr-4 py-1.5 bg-preview border border-theme rounded-full text-xs focus:outline-none focus:ring-1 focus:ring-blue-500 w-64 transition-all"
                    placeholder="Cari...">
            </div>

            <div class="h-4 w-[1px] bg-theme mx-1"></div>

            <button onclick="toggleLanguage()" class="px-2 py-1 text-dim hover:text-main transition-colors text-[10px] font-bold" id="lang-toggle">ID</button>
            <button onclick="toggleDarkMode()" class="p-2 text-dim hover:text-main transition-colors">
                <i data-lucide="sun" id="theme-icon-light" class="w-4 h-4 hidden"></i>
                <i data-lucide="moon" id="theme-icon-dark" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <!-- 3.B MAIN WORKSPACE -->
    <main class="flex-1 relative overflow-hidden bg-preview flex flex-col">
        
        <!-- Alphabet Filter Bar -->
        <div class="px-6 py-3 border-b border-theme bg-header/60 backdrop-blur-xl flex items-center gap-2 overflow-x-auto no-scrollbar shrink-0">
            <button onclick="filterByLetter('ALL')" id="btn-ALL" class="alpha-btn active px-4 py-1.5 text-[11px] font-bold border border-theme rounded-full transition-all">ALL</button>
            <div id="alphabet-container" class="flex gap-1.5"></div>
            <button onclick="filterByLetter('#')" id="btn-#" class="alpha-btn px-4 py-1.5 text-[11px] font-bold border border-theme rounded-full transition-all">#</button>
        </div>

        <div class="flex-1 overflow-y-auto p-8 lg:p-12">
            <div class="max-w-7xl mx-auto">
                <!-- Status Loader -->
                <div id="statusMessage" class="mb-12 flex justify-center hidden">
                    <div class="inline-flex items-center px-5 py-2.5 rounded-full bg-blue-500 text-white text-xs font-bold shadow-xl shadow-blue-500/30">
                        <i data-lucide="loader" class="w-3.5 h-3.5 mr-2 animate-spin"></i>
                        <span id="loading-text">Syncing...</span>
                    </div>
                </div>

                <!-- Grid Apps -->
                <div id="appGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-6 gap-y-10">
                    <!-- Cards injected here -->
                </div>

                <!-- Error States -->
                <div id="errorMessage" class="hidden py-32 text-center">
                    <i data-lucide="cloud-off" class="w-16 h-16 text-red-500 mx-auto mb-4"></i>
                    <h2 class="text-xl font-bold" id="error-title">Terjadi Kesalahan</h2>
                    <p class="text-dim text-sm mt-2" id="errorDetail"></p>
                </div>

                <div id="emptyState" class="hidden py-32 text-center">
                    <i data-lucide="ghost" class="w-16 h-16 text-dim mx-auto mb-4"></i>
                    <h2 class="text-xl font-bold text-dim" id="empty-title">Tidak Ditemukan</h2>
                </div>
            </div>
        </div>
    </main>

    <!-- 3.C FOOTER -->
    <footer class="h-8 flex items-center justify-between px-6 border-t border-theme bg-footer text-[10px] text-dim shrink-0">
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1.5 font-bold">
                <span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.8)]"></span>
                <span id="system-status">ONLINE</span>
            </div>
            <span class="opacity-20">/</span>
            <span id="app-count" class="font-medium tracking-wide">0 APPS FOUND</span>
        </div>
        
        <div class="flex items-center gap-4">
            <span class="font-bold opacity-40 uppercase tracking-tighter" id="portal-version">Tatadada Engine v2.8</span>
            <button onclick="toggleModal(true)" class="hover:text-blue-500 font-bold transition-colors cursor-pointer">TERMS</button>
        </div>
    </footer>

    <!-- 3.D MODAL -->
    <div id="termsModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-md hidden">
        <div class="bg-header border border-theme rounded-[40px] shadow-2xl max-w-sm w-full overflow-hidden transition-all scale-95 opacity-0" id="modalContainer">
            <div class="p-10 text-center">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-6 shadow-lg shadow-blue-500/40">
                    <i data-lucide="shield-check" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-extrabold mb-4 text-main">Legal Notice</h3>
                <div class="text-[13px] leading-relaxed text-dim text-center space-y-4" id="terms-content"></div>
            </div>
            <div class="p-6 border-t border-theme bg-preview/30">
                <button onclick="toggleModal(false)" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-2xl transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                    UNDERSTOOD
                </button>
            </div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'ibnuyahya';
        const REPO_NAME = 'tatadada';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
        const REPO_INFO_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;
        const BASE_PAGES_URL = `https://${REPO_OWNER}.github.io/${REPO_NAME}/`;

        let allApps = [];
        let currentLetter = 'ALL';
        let currentSearch = '';
        let currentLang = localStorage.getItem('tatadada_lang') || 'ID';
        
        const i18n = {
            ID: {
                help: "Portal pusat aplikasi Tatadada. Setiap ikon dihasilkan secara unik berdasarkan nama folder. Klik untuk meluncurkan.",
                loading: "Sinkronisasi...",
                search: "Cari aplikasi...",
                error: "Gagal memuat",
                empty: "Tidak ditemukan",
                apps: "APLIKASI",
                status: "AKTIF",
                build: "Update",
                terms: "Tidak ada paksaan dalam menggunakan aplikasi ini. Aplikasi ini disediakan 'as-is'. Pembuatan aplikasi dibantu oleh AI tools (Gemini dan Qwen). Pembuat dibebaskan dari segala bentuk konsekuensi, kerugian, atau tuntutan apapun atas penggunaan aplikasi ini."
            },
            EN: {
                help: "Tatadada central portal. Each icon is uniquely generated based on the folder name. Click to launch.",
                loading: "Syncing data...",
                search: "Search apps...",
                error: "Load failed",
                empty: "No apps found",
                apps: "APPS",
                status: "ONLINE",
                build: "Build",
                terms: "There is no coercion to use this app. This app is provided 'as-is'. The development of this app was assisted by AI tools (Gemini and Qwen). The creator is absolved from any consequences, damages, or claims arising from the use of this app."
            }
        };

        // DETERMINISTIC HASHING (GRAVATAR STYLE)
        function getHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        const premiumGradients = [
            'mesh-0', 'mesh-1', 'mesh-2', 'mesh-3', 
            'mesh-4', 'mesh-5', 'mesh-6', 'mesh-7',
            'mesh-8', 'mesh-9'
        ];

        const premiumIcons = [
            'rocket', 'zap', 'box', 'layout', 'palette', 'cpu', 'database', 
            'globe', 'image', 'layers', 'package', 'settings', 'shield', 
            'sparkles', 'tool', 'wrench', 'zap-off', 'album', 'briefcase', 'cloud'
        ];

        function getFancyIcon(name) {
            const hash = getHash(name.toLowerCase());
            const gradIndex = hash % premiumGradients.length;
            const iconIndex = hash % premiumIcons.length;

            return {
                grad: premiumGradients[gradIndex],
                icon: premiumIcons[iconIndex]
            };
        }

        // CORE FUNCTIONS
        function generateAlphabet() {
            const container = document.getElementById('alphabet-container');
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            letters.forEach(l => {
                const btn = document.createElement('button');
                btn.id = `btn-${l}`;
                btn.className = "alpha-btn px-4 py-1.5 text-[11px] font-bold border border-theme rounded-full transition-all hover:bg-theme";
                btn.textContent = l;
                btn.onclick = () => filterByLetter(l);
                container.appendChild(btn);
            });
        }

        function filterByLetter(letter) {
            currentLetter = letter;
            document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${letter}`).classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const filtered = allApps.filter(app => {
                const matchesSearch = app.name.toLowerCase().includes(currentSearch) || app.title.toLowerCase().includes(currentSearch);
                const firstChar = app.name.charAt(0).toUpperCase();
                let matchesLetter = true;
                if (currentLetter === '#') matchesLetter = !/[A-Z]/.test(firstChar);
                else if (currentLetter !== 'ALL') matchesLetter = firstChar === currentLetter;
                return matchesSearch && matchesLetter;
            });
            renderApps(filtered);
        }

        function updateUIStrings() {
            const t = i18n[currentLang];
            document.getElementById('help-text').textContent = t.help;
            document.getElementById('loading-text').textContent = t.loading;
            document.getElementById('searchInput').placeholder = t.search;
            document.getElementById('error-title').textContent = t.error;
            document.getElementById('empty-title').textContent = t.empty;
            document.getElementById('lang-toggle').textContent = currentLang;
            document.getElementById('system-status').textContent = t.status;
            document.getElementById('terms-content').innerHTML = `<p>${t.terms}</p>`;
            applyFilters();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ID' ? 'EN' : 'ID';
            localStorage.setItem('tatadada_lang', currentLang);
            updateUIStrings();
            fetchRepoInfo(); 
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('tatadada_theme', isDark ? 'dark' : 'light');
            updateThemeIcons(isDark);
        }

        function updateThemeIcons(isDark) {
            document.getElementById('theme-icon-light').classList.toggle('hidden', !isDark);
            document.getElementById('theme-icon-dark').classList.toggle('hidden', isDark);
        }

        function toggleModal(show) {
            const modal = document.getElementById('termsModal');
            const container = document.getElementById('modalContainer');
            if(show) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    container.classList.remove('scale-95', 'opacity-0');
                }, 10);
            } else {
                container.classList.add('scale-95', 'opacity-0');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        async function fetchRepoInfo() {
            try {
                const response = await fetch(REPO_INFO_URL);
                if (response.ok) {
                    const data = await response.json();
                    const date = new Date(data.pushed_at);
                    const formatted = date.toLocaleDateString(currentLang === 'ID' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'short' });
                    document.getElementById('build-time').textContent = `${i18n[currentLang].build}: ${formatted}`;
                }
            } catch (e) { console.error(e); }
        }

        async function fetchApps() {
            const statusMessage = document.getElementById('statusMessage');
            const errorMessage = document.getElementById('errorMessage');
            statusMessage.classList.remove('hidden');
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('API Rate Limit');
                const data = await response.json();
                allApps = data
                    .filter(item => item.type === 'dir' && !item.name.startsWith('.'))
                    .map(folder => ({
                        name: folder.name,
                        url: `${BASE_PAGES_URL}${folder.name}/index.html`,
                        githubUrl: folder.html_url,
                        title: folder.name.replace(/[-_]/g, ' ').replace(/\b\w/g, l => l.toUpperCase())
                    }))
                    .sort((a, b) => a.name.localeCompare(b.name));
                document.getElementById('app-count').textContent = `${allApps.length} ${i18n[currentLang].apps}`;
                applyFilters();
            } catch (error) {
                errorMessage.classList.remove('hidden');
                document.getElementById('errorDetail').textContent = error.message;
            } finally {
                statusMessage.classList.add('hidden');
            }
        }

        function renderApps(apps) {
            const appGrid = document.getElementById('appGrid');
            const emptyState = document.getElementById('emptyState');
            appGrid.innerHTML = '';
            
            if (apps.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            apps.forEach(app => {
                const config = getFancyIcon(app.name);
                const card = document.createElement('a');
                card.href = app.url;
                card.target = "_blank";
                card.className = 'ios-card group flex flex-col items-center gap-3.5';
                
                card.innerHTML = `
                    <div class="w-20 h-20 md:w-24 md:h-24 icon-squircle ${config.grad} text-white group-hover:scale-105 group-hover:-translate-y-1">
                        <i data-lucide="${config.icon}" class="w-10 h-10 md:w-11 md:h-11"></i>
                    </div>
                    <h3 class="text-sm md:text-[15px] font-bold text-main tracking-tight leading-tight group-hover:text-blue-500 transition-colors line-clamp-1 w-full text-center mt-1">
                        ${app.title}
                    </h3>
                `;
                appGrid.appendChild(card);
            });
            lucide.createIcons();
        }

        // INITIALIZE
        window.onload = () => {
            if (localStorage.getItem('tatadada_theme') === 'dark') {
                document.documentElement.classList.add('dark');
                updateThemeIcons(true);
            }
            generateAlphabet();
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                applyFilters();
            });
            updateUIStrings();
            fetchRepoInfo();
            fetchApps();
            lucide.createIcons();
        };
    </script>
</body>
</html>
