<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js -->

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style id="main-styles">
        :root {
            --header-bg: #ffffff;
            --editor-bg: #ffffff;
            --preview-bg: #f8fafc;
            --footer-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
        }

        .dark-mode {
            --header-bg: #161b22;
            --editor-bg: #0d1117;
            --preview-bg: #010409;
            --footer-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
        }

        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: var(--preview-bg); color: var(--text-main); display: flex; flex-direction: column; }

        /* A4 Page Styles */
        .markdown-body {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            color: #1a1a1a;
            line-height: 1.6;
        }
        .markdown-body h1 { font-size: 22pt; font-weight: 800; margin-bottom: 18pt; border-bottom: 1.5pt solid #333; padding-bottom: 8pt; line-height: 1.1; color: #000; }
        .markdown-body h2 { font-size: 15pt; font-weight: 700; margin: 16pt 0 8pt 0; color: #111; line-height: 1.3; border-left: 4px solid #3b82f6; padding-left: 10pt; }
        .markdown-body p { margin-bottom: 10pt; text-align: justify; }
        .markdown-body table { border-collapse: collapse; width: 100% !important; margin: 12pt 0; border: 1px solid #cbd5e1; table-layout: auto; }
        .markdown-body table th { background: #f8fafc; border: 1px solid #94a3b8; padding: 8pt 12pt; font-weight: 700; font-size: 10pt; text-align: left; }
        .markdown-body table td { border: 1px solid #94a3b8; padding: 8pt 12pt; font-size: 9.5pt; vertical-align: top; word-break: normal; }
        .markdown-body blockquote { border-left: 4px solid #3b82f6; padding: 10pt 15pt; color: #475569; font-style: italic; margin: 15pt 0; background: #f1f5f9; }
        .markdown-body code { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: #f1f5f9; padding: 2px 4px; border-radius: 3px; }
        .markdown-body pre { background: #f8fafc; padding: 10px; border-radius: 4px; border: 1px solid #e2e8f0; overflow-x: auto; margin-bottom: 10px; }

        .katex-display { margin: 1em 0; overflow-x: auto; overflow-y: hidden; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark-mode .custom-scrollbar::-webkit-scrollbar-thumb { background: #30363d; }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            header, footer, #resizer, .floating-controls, .tab-bar { display: none !important; }
            main { display: block !important; height: auto !important; }
            #editor-pane { display: none !important; }
            #preview-pane { display: block !important; padding: 0 !important; background: white !important; width: 100% !important; overflow: visible !important; }
            #pages-container { transform: none !important; margin: 0 !important; }
            .a4-page { box-shadow: none !important; margin: 0 !important; page-break-after: always !important; width: 210mm !important; height: 297mm !important; border: none !important; }
        }

        .toast { position: fixed; top: 70px; right: 20px; background: #10b981; color: white; padding: 10px 20px; border-radius: 10px; font-size: 12px; font-weight: bold; transform: translateY(-20px); opacity: 0; transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; pointer-events: none; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="transition-colors duration-300">

    <div id="toast" class="toast shadow-2xl">Format tersalin!</div>

    <!-- HEADER -->
    <header class="h-14 border-b border-[var(--border-color)] bg-[var(--header-bg)] px-4 flex items-center justify-between z-40 shrink-0 shadow-sm transition-all">

    <!-- FOOTER STATS -->
    <footer class="h-8 border-t border-[var(--border-color)] bg-[var(--footer-bg)] px-6 flex items-center justify-between z-40 shrink-0 text-[10px] font-medium text-[var(--text-dim)] shadow-inner transition-all">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-1.5"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.121 21.879 5.5 12 15l-4 1 1-4 9.5-9.5z"></path></svg> <span id="word-count" class="font-bold">0</span> Kata</div>
            <div class="flex items-center gap-1.5 border-l border-[var(--border-color)] pl-4"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg> <span id="char-count" class="font-bold">0</span> Karakter</div>
            <div class="flex items-center gap-1.5 text-blue-500 font-bold border-l border-[var(--border-color)] pl-4"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> <span id="read-time" class="font-bold">0</span> Menit Baca</div>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-1.5"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3h18v18H3zM3 9h18M9 3v18"></path></svg> <span id="table-count" class="font-bold">0</span> Tabel</div>
            <div class="flex items-center gap-1.5 border-l border-[var(--border-color)] pl-4"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 7V5a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h2"></path><rect x="8" y="7" width="14" height="14" rx="2" ry="2"></rect></svg> <span id="formula-count" class="font-bold">0</span> Formula</div>
            <div class="flex items-center gap-1.5 border-l border-[var(--border-color)] pl-4"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> <span id="image-count" class="font-bold">0</span> Gambar</div>
        </div>
    </footer>

    <div id="measure-ref" class="markdown-body" style="position: absolute; top: -9999px; width: 602px; visibility: hidden; padding: 0; margin: 0;"></div>

    <script>
        const editor = document.getElementById('editor');
        const previewPane = document.getElementById('preview-pane');
        const pagesContainer = document.getElementById('pages-container');
        const measureRef = document.getElementById('measure-ref');
        const resizer = document.getElementById('resizer');
        const editorPane = document.getElementById('editor-pane');

        let scale = 0.75;
        let darkMode = false;
        let activeTab = 'split';

        const defaultContent = `## 📌 ONE-PAGER SUMMARY (For Quick Reference)

\`\`\`
┌─────────────────────────────────────────────────────────────┐
│  DANIALGEMINIV3ATTACK v3.5.6 — QUICK REFERENCE             │
├─────────────────────────────────────────────────────────────┤
│  Deposit: $130–$150 (sweet spot)                           │
│  Leverage: 1:2000                                          │
│  Symbol: XAUUSD M1 only                                    │
│  Broker: Exness Zero/Demo                                  │
├─────────────────────────────────────────────────────────────┤
│  Engine A: Scalper (Hurst + Slope + EMA)                   │
│  - Risk: 1.5% | SL: 2.5×ATR | TP: 1.5×SL                   │
│  - Filters: Hour, ATR, VSA, Candle Body                    │
├─────────────────────────────────────────────────────────────┤
│  Engine B: Trend Rider (3-layer entry + PSAR exit)         │
│  - Risk: 1.0% | SL: 3.5×ATR (max 600 pts)                  │
│  - Exit: 30% partial @ Fib 23.6%, PSAR H1 trailing         │
│  - Ratchet SL: Locks profit at 1R/2R/3R/5R                 │
│  - Min Equity: $70 OFF | $70–150 REDUCED | $150+ FULL      │
├─────────────────────────────────────────────────────────────┤
│  Safeguards: Fortress 20% DD | Daily 6% | Consec 3× pause  │
├─────────────────────────────────────────────────────────────┤
│  Expected 3mo (Demo): 30–100% ROI | <15% DD | PF >1.3      │
│  Backtest 3mo: 645% ROI | 8.5% DD | PF 2.2 (unrealistic)   │
├─────────────────────────────────────────────────────────────┤
│  Status: READY FOR DEMO FORWARD TEST                       │
│  Next Milestone: 3 months demo → Live consideration        │
└─────────────────────────────────────────────────────────────┘
\`\`\``;

        editor.value = defaultContent;

        function preProcessTables(text) {
            const lines = text.split('\n');
            let processed = [];
            let inBox = false;
            let currentTableRows = [];

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let trimmed = line.trim();

                if (trimmed.startsWith('```')) {
                    if (!inBox && i + 1 < lines.length && /^[┌]/.test(lines[i+1].trim())) continue; 
                    if (!inBox && i > 0 && /^[└]/.test(lines[i-1].trim())) continue; 
                }

                const isBoxEdge = /^[┌├└]/.test(trimmed);
                
                if (isBoxEdge) {
                    inBox = true;
                    if (trimmed.startsWith('└') && currentTableRows.length > 0) {
                        processed.push(...currentTableRows);
                        currentTableRows = [];
                        inBox = false;
                    }
                    continue; 
                }
                
                if (inBox && trimmed.startsWith('│')) {
                    let content = trimmed;
                    content = content.replace(/^│/, '').replace(/│$/, '').trim();
                    content = content.replace(/\|/g, '&#124;');
                    
                    let gfmRow = `| ${content} |`;
                    currentTableRows.push(gfmRow);
                    
                    if (currentTableRows.length === 1) {
                        currentTableRows.push('| :--- |');
                    }
                    continue;
                }

                if (inBox && !trimmed.startsWith('│') && trimmed.length > 0) {
                    if (currentTableRows.length > 0) processed.push(...currentTableRows);
                    currentTableRows = [];
                    inBox = false;
                }

                processed.push(line);
            }
            if (currentTableRows.length > 0) processed.push(...currentTableRows);

            return processed.join('\n');
        }

        function renderContent(text) {
            let content = preProcessTables(text);
            const mathBlocks = [];
            
            content = content.replace(/\$\$([\s\S]+?)\$\$/g, (m, f) => {
                const id = `MATOWY_MATH_B_${mathBlocks.length}_${Math.random().toString(36).substr(2, 5)}`;
                mathBlocks.push({ id, html: katex.renderToString(f.trim(), { displayMode: true, throwOnError: false }) });
                return id;
            });

            content = content.replace(/\$([^\$\s\n][^\$\n]*?[^\$\s\n])\$/g, (m, f) => {
                const looksLikeMath = /[\\]|[\^]|[_]|[\{]|[\}]/.test(f);
                if (!looksLikeMath) return m;

                const id = `MATOWY_MATH_I_${mathBlocks.length}_${Math.random().toString(36).substr(2, 5)}`;
                mathBlocks.push({ id, html: katex.renderToString(f.trim(), { displayMode: false, throwOnError: false }) });
                return id;
            });

            let rendered = marked.parse(content);
            mathBlocks.forEach(m => {
                rendered = rendered.split(m.id).join(m.html);
            });
            return rendered;
        }

        // --- SMART NODE SPLITTER ---
        function update() {
            const html = renderContent(editor.value);
            const container = document.createElement('div');
            container.innerHTML = html;
            const elements = Array.from(container.children);
            
            measureRef.innerHTML = "";
            pagesContainer.innerHTML = "";
            const MAX_HEIGHT = 925;
            let pageData = [];
            
            const finalizePage = () => { 
                if (measureRef.innerHTML.trim() !== "") {
                    pageData.push(measureRef.innerHTML); 
                    measureRef.innerHTML = ""; 
                }
            };

            function appendWithSplit(clone) {
                measureRef.appendChild(clone);
                if (measureRef.offsetHeight <= MAX_HEIGHT) return; 
                
                measureRef.removeChild(clone);
                
                if (clone.tagName === 'PRE') {
                    const codeEl = clone.querySelector('code') || clone;
                    const lines = codeEl.innerHTML.split('\n');
                    
                    let newPre = clone.cloneNode(false);
                    let newCode = codeEl.cloneNode(false);
                    newPre.appendChild(newCode);
                    measureRef.appendChild(newPre);
                    
                    let buf = [];
                    for (let i = 0; i < lines.length; i++) {
                        buf.push(lines[i]);
                        newCode.innerHTML = buf.join('\n');
                        
                        if (measureRef.offsetHeight > MAX_HEIGHT) {
                            buf.pop();
                            if (buf.length > 0) {
                                newCode.innerHTML = buf.join('\n');
                            } else {
                                measureRef.removeChild(newPre);
                            }
                            
                            finalizePage(); 
                            
                            newPre = clone.cloneNode(false);
                            newCode = codeEl.cloneNode(false);
                            newPre.appendChild(newCode);
                            measureRef.appendChild(newPre);
                            buf = [lines[i]];
                            newCode.innerHTML = buf.join('\n');
                        }
                    }
                } else if (clone.tagName === 'TABLE') {
                    const tbody = clone.querySelector('tbody');
                    const thead = clone.querySelector('thead');
                    if (!tbody) { finalizePage(); measureRef.appendChild(clone); return; }
                    
                    let newTable = clone.cloneNode(false);
                    if (thead) newTable.appendChild(thead.cloneNode(true));
                    let newTbody = tbody.cloneNode(false);
                    newTable.appendChild(newTbody);
                    measureRef.appendChild(newTable);
                    
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    for (let i = 0; i < rows.length; i++) {
                        newTbody.appendChild(rows[i].cloneNode(true));
                        if (measureRef.offsetHeight > MAX_HEIGHT) {
                            newTbody.removeChild(newTbody.lastChild);
                            if (newTbody.children.length === 0) measureRef.removeChild(newTable);
                            
                            finalizePage();
                            
                            newTable = clone.cloneNode(false);
                            if (thead) newTable.appendChild(thead.cloneNode(true));
                            newTbody = tbody.cloneNode(false);
                            newTable.appendChild(newTbody);
                            measureRef.appendChild(newTable);
                            newTbody.appendChild(rows[i].cloneNode(true));
                        }
                    }
                } else if (clone.tagName === 'UL' || clone.tagName === 'OL') {
                    let newList = clone.cloneNode(false);
                    measureRef.appendChild(newList);
                    const items = Array.from(clone.children);
                    
                    for (let i = 0; i < items.length; i++) {
                        newList.appendChild(items[i].cloneNode(true));
                        if (measureRef.offsetHeight > MAX_HEIGHT) {
                            newList.removeChild(newList.lastChild);
                            if (newList.children.length === 0) measureRef.removeChild(newList);
                            
                            finalizePage();
                            
                            newList = clone.cloneNode(false);
                            measureRef.appendChild(newList);
                            newList.appendChild(items[i].cloneNode(true));
                        }
                    }
                } else {
                    finalizePage();
                    measureRef.appendChild(clone);
                }
            }

            elements.forEach(el => appendWithSplit(el));
            finalizePage();

            pageData.forEach((h, i) => {
                const div = document.createElement('div');
                div.className = "a4-page bg-white shadow-[0_20px_50px_rgba(0,0,0,0.08)] mb-10 relative overflow-hidden shrink-0 p-[96px]";
                div.style.width = "794px"; div.style.height = "1123px"; div.style.boxSizing = "border-box";
                div.innerHTML = `<div class="w-full h-full overflow-hidden"><div class="markdown-body">${h}</div></div>
                    <div class="absolute bottom-10 left-0 right-0 px-[96px] flex justify-between items-center opacity-40">
                        <div class="flex items-center gap-2"><div class="w-6 h-1 bg-blue-600 rounded-full"></div><span class="text-[8px] font-black uppercase tracking-[0.2em] text-slate-500">MATOWY SYSTEM REPORT</span></div>
                        <span class="text-[10px] font-black text-slate-600 font-mono bg-slate-100 px-3 py-1 rounded-full">P${i + 1}</span>
                    </div>`;
                pagesContainer.appendChild(div);
            });
            updateStats();
            applyScale(); // Gunakan applyScale di akhir agar kompensasi ruang kosong terhitung ulang!
        }

        function updateStats() {
            const md = editor.value;
            const text = md.trim();
            const words = text ? text.split(/\s+/).length : 0;
            const chars = md.length;
            const setVal = (id, v) => { const el = document.getElementById(id); if(el) el.innerText = v; };
            setVal('word-count', words.toLocaleString());
            setVal('char-count', chars.toLocaleString());
            setVal('read-time', Math.max(1, Math.ceil(words / 200)));
            setVal('table-count', document.querySelectorAll('.markdown-body table').length || 0);
            
            let fCount = 0;
            const matches = md.match(/\$([^\$\s\n][^\$\n]*?[^\$\s\n])\$/g) || [];
            matches.forEach(m => { if (/[\\]|[\^]|[_]|[\{]|[\}]/.test(m)) fCount++; });
            fCount += (md.match(/\$\$([\s\S]+?)\$\$/g) || []).length;
            setVal('formula-count', fCount);
            
            setVal('image-count', (md.match(/!\[.*?\]\(.*?\)/g) || []).length);
        }

        // --- SCALE & WHITE SPACE COMPENSATION FIX ---
        function changeScale(d) { scale = Math.max(0.1, Math.min(2, scale + d)); applyScale(); }
        function autoFit() { 
            if (previewPane.offsetWidth) { 
                scale = Math.max(0.1, Math.min(1.5, (previewPane.offsetWidth - 100) / 794)); 
                applyScale(); 
            } 
        }
        function applyScale() { 
            pagesContainer.style.transform = `scale(${scale})`; 
            document.getElementById('zoom-text').innerText = `${Math.round(scale * 100)}%`; 
            
            // Kompensasi Ruang Kosong Bawah:
            const unscaledHeight = pagesContainer.offsetHeight;
            const emptySpace = unscaledHeight * (1 - scale);
            pagesContainer.style.marginBottom = `-${emptySpace}px`;
        }

        function copyToClipboard(isGDocs = false) {
            const container = document.createElement('div');
            container.innerHTML = `<div class="markdown-body">${renderContent(editor.value)}</div>`;
            
            container.querySelectorAll('table').forEach(table => {
                table.setAttribute('border', '1');
                table.style.borderCollapse = 'collapse';
                table.style.width = '100%';
                table.style.margin = '15px 0';
                table.querySelectorAll('th, td').forEach(cell => {
                    cell.style.border = '1px solid #94a3b8';
                    cell.style.padding = '8px 12px';
                    cell.style.fontSize = '10pt';
                    cell.style.verticalAlign = 'top';
                });
                table.querySelectorAll('th').forEach(th => {
                    th.style.backgroundColor = '#f8fafc';
                    th.style.fontWeight = 'bold';
                });
            });
            
            container.querySelectorAll('h1').forEach(h => h.style.cssText = "font-size: 24pt; font-weight: bold; border-bottom: 2px solid #333; margin-bottom: 15pt;");
            container.querySelectorAll('h2').forEach(h => h.style.cssText = "font-size: 18pt; font-weight: bold; color: #111; margin-top: 20pt; border-left: 5px solid #3b82f6; padding-left: 10pt;");
            
            container.style.position = 'fixed'; container.style.top = '0'; container.style.left = '0'; container.style.opacity = '0';
            container.style.pointerEvents = 'none'; container.style.zIndex = '-1'; container.style.fontFamily = "'Arial', sans-serif";
            
            document.body.appendChild(container);
            const range = document.createRange();
            range.selectNodeContents(container);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            
            try { if (document.execCommand('copy')) showToast(isGDocs ? "Format GDocs tersalin! Paste di Google Docs." : "Tersalin!"); } catch (err) {}
            
            selection.removeAllRanges();
            document.body.removeChild(container);
        }

        let resizing = false;
        resizer.addEventListener('mousedown', () => { resizing = true; document.body.style.cursor = 'col-resize'; });
        document.addEventListener('mousemove', (e) => {
            if (!resizing) return;
            const w = (e.clientX / window.innerWidth) * 100;
            if (w > 10 && w < 85) { editorPane.style.width = `${w}%`; autoFit(); }
        });
        document.addEventListener('mouseup', () => { resizing = false; document.body.style.cursor = 'default'; });

        function setTab(tab) {
            activeTab = tab;
            const eD = document.getElementById('editor-pane'), pD = document.getElementById('preview-pane'), rD = document.getElementById('resizer');
            document.querySelectorAll('.tab-bar button').forEach(b => b.className = "px-5 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all text-slate-400 hover:text-slate-600");
            document.getElementById(`btn-${tab}`).className = `px-5 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all ${darkMode ? 'bg-[#21262d] text-blue-400 shadow-sm' : 'bg-white text-blue-600 shadow-sm'}`;
            if (tab === 'edit') { eD.style.display = 'flex'; eD.style.width = '100%'; pD.style.display = 'none'; rD.style.display = 'none'; }
            else if (tab === 'preview') { eD.style.display = 'none'; pD.style.display = 'flex'; rD.style.display = 'none'; }
            else { eD.style.display = 'flex'; eD.style.width = '35%'; pD.style.display = 'flex'; rD.style.display = 'block'; }
            autoFit();
        }

        function toggleDarkMode() {
            darkMode = !darkMode;
            document.body.classList.toggle('dark-mode');
            if (darkMode) {
                document.getElementById('theme-icon').innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
                document.getElementById('logo-wy').style.color = "white";
            } else {
                document.getElementById('theme-icon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                document.getElementById('logo-wy').style.color = "#0f172a";
            }
            setTab(activeTab);
        }

        function getDetectedFilename() {
            const m = editor.value.match(/^#\s+(.*)$/m);
            return m ? m[1].trim().replace(/[/\\?%*:|"<>]/g, '_').substring(0, 100) : "Matowy_Document";
        }

        function exportMarkdown() {
            const b = new Blob([editor.value], { type: 'text/markdown' });
            const l = document.createElement("a");
            l.href = URL.createObjectURL(b); l.download = `${getDetectedFilename()}.md`; l.click();
        }

        function exportWord() {
            const css = document.getElementById('main-styles').innerHTML;
            const html = `<html><head><meta charset='utf-8'><style>${css}</style></head><body><div class="markdown-body">${renderContent(editor.value)}</div></body></html>`;
            const b = new Blob([html], { type: 'application/msword' });
            const l = document.createElement("a");
            l.href = URL.createObjectURL(b); l.download = `${getDetectedFilename()}.doc`; l.click();
        }

        function saveToGDocs() { copyToClipboard(true); }

        editor.addEventListener('input', update);
        window.addEventListener('resize', autoFit);
        update();
    </script>
</body>
</html>
