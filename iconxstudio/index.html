      function gtag(){dataLayer.push(arguments);}

    <!-- 2. Auto-Favicon Injector (Mandatory TATADADA v5.8 - Smart Parser) -->
    <script>
    // TATADADA Auto-Favicon Injector (Zoomed & Textless)
    fetch('icon.xml').then(r => r.text()).then(xml => {
        const doc = new DOMParser().parseFromString(xml, "text/xml");
        const svgNode = doc.querySelector('svg_elements');
        if (!svgNode) return;

        // 1. Hapus elemen teks agar favicon bersih
        svgNode.querySelectorAll('text').forEach(t => t.remove());

        // 2. Ambil warna gradien background
        const cStart = doc.querySelector('color_start')?.textContent || '#0ea5e9';
        const cEnd = doc.querySelector('color_end')?.textContent || '#4338ca';

        // 3. Render dengan viewBox zoom-in (12 12 76 76)
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 12 76 76"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${cStart}"/><stop offset="100%" stop-color="${cEnd}"/></linearGradient><linearGradient id="glossy-white" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#fff" stop-opacity="0.4"/></linearGradient><linearGradient id="glossy-dark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#333" stop-opacity="0.9"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/></linearGradient><filter id="inner-shadow"><feOffset dy="1"/><feGaussianBlur stdDeviation="1" result="offset-blur"/><feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/><feFlood flood-color="black" flood-opacity="0.2" result="color"/><feComposite operator="in" in="color" in2="inverse" result="shadow"/><feComposite operator="over" in="shadow" in2="SourceGraphic"/></filter><filter id="drop-shadow-sm"><feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/></filter></defs><style>.frosted-glass{fill:rgba(255,255,255,0.3);}</style><rect x="12" y="12" width="76" height="76" rx="18" fill="url(#bg)" />${svgNode.innerHTML}</svg>`;    
        const link = document.createElement('link');
        link.rel = 'icon'; link.type = 'image/svg+xml';
        link.href = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
        document.head.appendChild(link);
    }).catch(e => console.warn('Favicon XML not loaded (Running via dynamic canvas instead).'));
    </script>

    <script>
        // Inisialisasi Icons
        lucide.createIcons();

        // --- 1. CORE LOGIC & FAVICON AUTO-SYNC (v5.8) ---
        const xmlInput = document.getElementById('xml-input');
        const lineNumbers = document.getElementById('line-numbers');
        const squircle = document.getElementById('render-squircle');
        const svgIcon = document.getElementById('render-svg');
        const wave = document.getElementById('render-wave');
        const appNameEl = document.getElementById('render-name');
        const statusBadge = document.getElementById('status-indicator');

        const svgDefs = `
            <defs>
                <linearGradient id="glossy-white" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#FFFFFF" />
                    <stop offset="100%" stop-color="#E5E5EA" />
                </linearGradient>
                <linearGradient id="glossy-dark" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#48484a" />
                    <stop offset="100%" stop-color="#1c1c1e" />
                </linearGradient>
                <linearGradient id="glass-fill" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.25)" />
                    <stop offset="100%" stop-color="rgba(255,255,255,0.02)" />
                </linearGradient>
                <filter id="inner-shadow">
                    <feOffset dx="0" dy="2"/>
                    <feGaussianBlur stdDeviation="1.5" result="offset-blur"/>
                    <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
                    <feFlood flood-color="black" flood-opacity="0.25" result="color"/>
                    <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
                    <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
                </filter>
                <filter id="drop-shadow-sm">
                    <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="black" flood-opacity="0.35"/>
                </filter>
            </defs>
        `;

        function syncLineNumbers() {
            const lines = xmlInput.value.split('\n').length;
            lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
        }

        xmlInput.addEventListener('scroll', () => {
            lineNumbers.scrollTop = xmlInput.scrollTop;
        });

        // TATADADA v5.8 - Realtime Smart Favicon Updater
        function updateLiveFavicon(colorStart, colorEnd, svgElementsNode) {
            if (!svgElementsNode) return;
            const clonedNode = svgElementsNode.cloneNode(true);
            clonedNode.querySelectorAll('text').forEach(t => t.remove());

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 12 76 76"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${colorStart}"/><stop offset="100%" stop-color="${colorEnd}"/></linearGradient><linearGradient id="glossy-white" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff" stop-opacity="0.9"/><stop offset="100%" stop-color="#fff" stop-opacity="0.4"/></linearGradient><linearGradient id="glossy-dark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#333" stop-opacity="0.9"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/></linearGradient><filter id="inner-shadow"><feOffset dy="1"/><feGaussianBlur stdDeviation="1" result="offset-blur"/><feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/><feFlood flood-color="black" flood-opacity="0.2" result="color"/><feComposite operator="in" in="color" in2="inverse" result="shadow"/><feComposite operator="over" in="shadow" in2="SourceGraphic"/></filter><filter id="drop-shadow-sm"><feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/></filter></defs><style>.frosted-glass{fill:rgba(255,255,255,0.3);}</style><rect x="12" y="12" width="76" height="76" rx="18" fill="url(#bg)" />${clonedNode.innerHTML}</svg>`;    
            
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
                link = document.createElement('link');
                link.rel = 'icon'; link.type = 'image/svg+xml';
                document.head.appendChild(link);
            }
            link.href = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
        }

        function renderXML() {
            syncLineNumbers();
            try {
                const xmlDoc = new DOMParser().parseFromString(xmlInput.value, "text/xml");
                if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                    throw new Error("Invalid XML format");
                }

                const appName = xmlDoc.querySelector('app_name')?.textContent || 'App Name';
                const colorStart = xmlDoc.querySelector('color_start')?.textContent || '#007AFF';
                const colorEnd = xmlDoc.querySelector('color_end')?.textContent || '#5856D6';
                const scaleStr = xmlDoc.querySelector('icon_scale')?.textContent || '0.75';
                const ornament = xmlDoc.querySelector('ornament')?.textContent || 'none';

                appNameEl.textContent = appName;
                squircle.style.setProperty('--bg-start', colorStart);
                squircle.style.setProperty('--bg-end', colorEnd);
                
                const safeScale = Math.max(0.1, Math.min(1.0, parseFloat(scaleStr)));
                svgIcon.style.setProperty('--icon-size', `${256 * safeScale}px`);

                if (ornament.includes('wave')) {
                    wave.style.display = 'block';
                    wave.style.background = `linear-gradient(135deg, #FF2D55 0%, ${colorStart} 100%)`;
                } else {
                    wave.style.display = 'none';
                }

                const svgElementsNode = xmlDoc.querySelector('svg_elements');
                if (svgElementsNode) {
                    const serializer = new XMLSerializer();
                    let innerSvgContent = '';
                    Array.from(svgElementsNode.childNodes).forEach(node => {
                        innerSvgContent += serializer.serializeToString(node);
                    });
                    svgIcon.innerHTML = svgDefs + innerSvgContent;
                    
                    // Sync favicon on successful render
                    updateLiveFavicon(colorStart, colorEnd, svgElementsNode);
                } else {
                    svgIcon.innerHTML = svgDefs;
                }

                statusBadge.textContent = "VALID";
                statusBadge.style.backgroundColor = "#34C759";

            } catch (e) {
                statusBadge.textContent = "ERROR";
                statusBadge.style.backgroundColor = "#FF3B30";
            }
        }

        xmlInput.addEventListener('input', renderXML);
        renderXML();

        // --- 2. RESIZER LOGIC ---
        const resizer = document.getElementById('resizer');
        const leftPane = document.getElementById('left-pane');
        const rightPane = document.getElementById('right-pane');
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            leftPane.style.pointerEvents = 'none';
            rightPane.style.pointerEvents = 'none';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerWidth = document.body.clientWidth;
            const newLeftWidth = (e.clientX / containerWidth) * 100;
            if (newLeftWidth > 20 && newLeftWidth < 80) {
                leftPane.style.flex = `0 0 ${newLeftWidth}%`;
                rightPane.style.flex = `1 1 0%`;
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = 'default';
                leftPane.style.pointerEvents = 'auto';
                rightPane.style.pointerEvents = 'auto';
                document.body.style.userSelect = 'auto';
            }
        });

        // --- 3. THEME MANAGER ---
        const btnTheme = document.getElementById('btn-theme');
        const themeIcon = document.getElementById('theme-icon');
        const htmlRoot = document.documentElement;
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            htmlRoot.classList.add('dark');
            themeIcon.setAttribute('data-lucide', 'sun');
        } else {
            htmlRoot.classList.remove('dark');
            themeIcon.setAttribute('data-lucide', 'moon');
        }
        lucide.createIcons();

        btnTheme.addEventListener('click', () => {
            htmlRoot.classList.toggle('dark');
            const isDark = htmlRoot.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        });

        // --- 4. LOCALIZATION & STRICT MODAL TERMS ---
        const btnLang = document.getElementById('btn-lang');
        const elSmartContext = document.getElementById('terms-smart-context');
        const elLegalClause = document.getElementById('terms-legal-clause');
        
        let currentLang = localStorage.getItem('lang') || 'id';
        
        const i18n = {
            id: {
                help_title: "Cara Penggunaan",
                help_desc: "Edit XML di panel kanan untuk merender Ikon iOS. Desain akan langsung teraplikasi di kanvas secara real-time.",
                editor_title: "XML Pipeline (Tahap 1 v5.8)",
                export_title: "Penulis & Pengunduh Berkas",
                footer_status: "Pipeline Aktif & Sinkron",
                footer_stats: "Rendering Engine: iOS 17 Pro Mode (v5.8)",
                footer_terms: "Ketentuan & Privasi",
                terms_title: "Ketentuan Penggunaan",
                terms_btn: "Saya Mengerti",
                smart_context: "Aplikasi IconXstudio beroperasi sepenuhnya di browser lokal Anda menggunakan mesin rendering SVG ke Canvas. Tidak ada data desain yang dikirimkan ke server eksternal.",
                legal_clause: "Tidak ada paksaan dalam menggunakan aplikasi ini. Aplikasi ini disediakan 'as-is' (sebagaimana adanya) dan akurasi hasil tidak dijamin. Pembuatan aplikasi ini dibantu oleh AI tools. Aplikasi ini menggunakan Google Analytics untuk mengumpulkan data penggunaan anonim guna pengembangan fitur, tanpa merekam identitas pribadi. Pembuat dibebaskan dari segala bentuk konsekuensi, kerugian, atau tuntutan apapun yang timbul dari penggunaan aplikasi ini. Penggunaan aplikasi berarti Anda menyetujui ketentuan ini sepenuhnya."
            },
            en: {
                help_title: "How to Use",
                help_desc: "Edit the XML in the right panel to render the iOS Icon. Changes apply to the canvas in real-time.",
                editor_title: "XML Pipeline (Stage 1 v5.8)",
                export_title: "File Writer & Downloader",
                footer_status: "Pipeline Active & Synced",
                footer_stats: "Rendering Engine: iOS 17 Pro Mode (v5.8)",
                footer_terms: "Terms & Privacy",
                terms_title: "Terms of Use",
                terms_btn: "I Understand",
                smart_context: "The IconXstudio app operates entirely in your local browser using an SVG to Canvas rendering engine. No design data is transmitted to external servers.",
                legal_clause: "There is no coercion to use this app. This app is provided 'as-is' and the accuracy of results is not guaranteed. The development of this app was assisted by AI tools. This app uses Google Analytics to collect anonymous usage data for feature improvement, without recording personal identity. The creator is absolved from any consequences, damages, or claims arising from the use of this app. Use of this app constitutes full agreement to these terms."
            }
        };

        function updateLang(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            elSmartContext.textContent = i18n[lang].smart_context;
            elLegalClause.textContent = i18n[lang].legal_clause;
            btnLang.textContent = lang.toUpperCase();
        }

        btnLang.addEventListener('click', () => {
            currentLang = currentLang === 'id' ? 'en' : 'id';
            localStorage.setItem('lang', currentLang);
            updateLang(currentLang);
        });
        
        updateLang(currentLang);

        // --- 5. MODAL LOGIC ---
        const modalTerms = document.getElementById('modal-terms');
        const modalContent = document.getElementById('modal-content');
        const btnTermsOpen = document.getElementById('btn-terms');
        const btnsCloseModal = document.querySelectorAll('.modal-close, .modal-backdrop');

        function openModal() {
            modalTerms.classList.remove('hidden');
            modalTerms.classList.add('flex');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modalTerms.classList.add('hidden');
                modalTerms.classList.remove('flex');
            }, 300);
        }

        btnTermsOpen.addEventListener('click', openModal);
        btnsCloseModal.forEach(btn => btn.addEventListener('click', closeModal));

        // --- 6. EXPORT / DOWNLOAD LOGIC ---
        const btnDlPng = document.getElementById('btn-dl-png');
        const btnDlIco = document.getElementById('btn-dl-ico');
        const renderNode = document.getElementById('render-squircle');

        function triggerDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function createExport(pixelRatio = 1) {
            const dataUrl = await htmlToImage.toPng(renderNode, {
                pixelRatio: pixelRatio,
                style: { boxShadow: 'none', transform: 'none' }
            });
            const res = await fetch(dataUrl);
            return await res.blob();
        }

        btnDlPng.addEventListener('click', async () => {
            try {
                const originalText = btnDlPng.innerHTML;
                btnDlPng.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Memproses...';
                lucide.createIcons();
                
                const blob = await createExport(4);
                triggerDownload(blob, 'IconXstudio_HighRes.png');
                
                btnDlPng.innerHTML = originalText;
                lucide.createIcons();
            } catch (error) {
                console.error("Gagal mengekspor PNG:", error);
                alert("Terjadi kesalahan sistem saat memproses gambar.");
                btnDlPng.innerHTML = '<i data-lucide="image" class="w-4 h-4"></i> PNG High-Res';
                lucide.createIcons();
            }
        });

        btnDlIco.addEventListener('click', async () => {
            try {
                const originalText = btnDlIco.innerHTML;
                btnDlIco.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Menulis ICO...';
                lucide.createIcons();

                const pngBlob = await createExport(1);
                const arrayBuffer = await pngBlob.arrayBuffer();
                const pngBytes = new Uint8Array(arrayBuffer);
                const pngSize = pngBytes.length;

                const buffer = new ArrayBuffer(22 + pngSize);
                const view = new DataView(buffer);

                view.setUint16(0, 0, true);
                view.setUint16(2, 1, true); 
                view.setUint16(4, 1, true); 
                view.setUint8(6, 0); 
                view.setUint8(7, 0); 
                view.setUint8(8, 0); 
                view.setUint8(9, 0); 
                view.setUint16(10, 1, true); 
                view.setUint16(12, 32, true); 
                view.setUint32(14, pngSize, true); 
                view.setUint32(18, 22, true); 

                const outArray = new Uint8Array(buffer);
                outArray.set(pngBytes, 22); 

                const icoBlob = new Blob([buffer], { type: 'image/x-icon' });
                triggerDownload(icoBlob, 'favicon.ico');

                btnDlIco.innerHTML = originalText;
                lucide.createIcons();
            } catch (error) {
                console.error("Gagal menulis ICO:", error);
                alert("Terjadi kesalahan saat menulis metadata ICO.");
                btnDlIco.innerHTML = '<i data-lucide="app-window" class="w-4 h-4"></i> favicon.ico';
                lucide.createIcons();
            }
        });

    </script>
</body>
</html>
