<!-- TAFSIR VISUAL ICON: Ikon bergaya visionOS dengan latar squircle frosted-glass. Menggunakan palet spektrum warna (Merah ke Biru) yang diiris menjadi monokrom di satu sisi, menandakan simulasi buta warna. Teks "CHROMA" berfont Space Grotesk. -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaSim Pro - Simulator Buta Warna Realistis</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" crossorigin="anonymous">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- HTML-to-Image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

    <!-- TATADADA Tailwind Configuration v5.5 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        header: 'var(--header-bg)', editor: 'var(--editor-bg)', preview: 'var(--preview-bg)',
                        card: 'var(--card-bg)', footer: 'var(--footer-bg)', theme: 'var(--border-color)', 
                        main: 'var(--text-main)', dim: 'var(--text-dim)', accent: 'var(--theme-accent)'
                    },
                    boxShadow: {
                        'sm': 'var(--shadow-sm)',
                        'md': 'var(--shadow-md)',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'], }
                }
            }
        }
    </script>

    <!-- TATADADA CSS Tokens -->
    <style>
        :root {
            --header-bg: #ffffff;
            --editor-bg: #ffffff;
            --preview-bg: #f1f5f9; /* Selokan untuk kedalaman */
            --card-bg: #ffffff;
            --footer-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --theme-accent: #3b82f6;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        html.dark {
            --header-bg: #161b22;
            --editor-bg: #0d1117;
            --preview-bg: #010409;
            --card-bg: #0d1117;
            --footer-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            color-scheme: dark;
        }
        body { 
            background-color: var(--preview-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* Custom Split Slider */
        .split-slider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }
        .split-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 100vh;
            background: transparent;
            cursor: col-resize;
        }
        .split-slider::-moz-range-thumb {
            width: 20px;
            height: 100vh;
            background: transparent;
            cursor: col-resize;
            border: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, Component } = React;

        // --- DICTIONARY LOKALISASI TATADADA ---
        const translations = {
            id: {
                capture: "Foto", capturing: "Menyimpan...", engine: "Engine Ready", optics: "Simulasi Warna Aktif", terms: "Terms",
                help: "Cara Pakai", helpDesc: "Pilih tipe buta warna di panel kontrol untuk melihat perubahan secara instan. Geser (drag) kursor pada area gambar untuk melihat sekeliling gambar secara detail.", close: "Tutup",
                imgSelect: "Ganti Gambar", compare: "Bandingkan (Split)",
                types: {
                    normal: { name: "Normal Vision", desc: "Penglihatan warna penuh tanpa kelainan." },
                    protanopia: { name: "Protanopia", desc: "Buta warna merah. Sel kerucut merah tidak ada." },
                    protanomaly: { name: "Protanomali", desc: "Lemah merah. Sel kerucut merah bermutasi." },
                    deuteranopia: { name: "Deuteranopia", desc: "Buta warna hijau. Sel kerucut hijau tidak ada." },
                    deuteranomaly: { name: "Deuteranomali", desc: "Lemah hijau. Paling umum terjadi." },
                    tritanopia: { name: "Tritanopia", desc: "Buta warna biru. Sel kerucut biru tidak ada." },
                    tritanomaly: { name: "Tritanomali", desc: "Lemah biru. Sangat jarang terjadi." },
                    achromatopsia: { name: "Achromatopsia", desc: "Buta warna total. Hanya melihat hitam, putih & abu-abu." }
                },
                termsTitle: "Syarat & Ketentuan Penggunaan",
                termsContext: "Aplikasi ChromaSim Pro mensimulasikan visibilitas spektrum warna menggunakan matriks warna standar untuk tujuan edukasi. Aplikasi beroperasi secara penuh di lingkungan lokal peramban (browser) Anda tanpa mengirimkan gambar atau data penglihatan ke server eksternal.",
                termsLegal: "Tidak ada paksaan dalam menggunakan aplikasi ini. Aplikasi ini disediakan 'as-is' (sebagaimana adanya) dan akurasi hasil tidak dijamin. Pembuatan aplikasi ini dibantu oleh AI tools. Aplikasi ini tidak menyimpan data pribadi Anda di server kami. Pembuat dibebaskan dari segala bentuk konsekuensi, kerugian, atau tuntutan apapun yang timbul dari penggunaan aplikasi ini. Penggunaan aplikasi berarti Anda menyetujui ketentuan ini sepenuhnya."
            },
            en: {
                capture: "Capture", capturing: "Saving...", engine: "Engine Ready", optics: "Color Sim Active", terms: "Terms",
                help: "How to Use", helpDesc: "Select a color blindness type from the control panel to see changes instantly. Drag your cursor across the image area to pan around the image in detail.", close: "Close",
                imgSelect: "Change Image", compare: "Compare (Split)",
                types: {
                    normal: { name: "Normal Vision", desc: "Full color vision without anomaly." },
                    protanopia: { name: "Protanopia", desc: "Red-blind. Red cones are absent." },
                    protanomaly: { name: "Protanomaly", desc: "Red-weak. Red cones are mutated." },
                    deuteranopia: { name: "Deuteranopia", desc: "Green-blind. Green cones are absent." },
                    deuteranomaly: { name: "Deuteranomaly", desc: "Green-weak. Most common type." },
                    tritanopia: { name: "Tritanopia", desc: "Blue-blind. Blue cones are absent." },
                    tritanomaly: { name: "Tritanomaly", desc: "Blue-weak. Very rare anomaly." },
                    achromatopsia: { name: "Achromatopsia", desc: "Total color blindness. Only sees grayscale." }
                },
                termsTitle: "Terms of Use",
                termsContext: "The ChromaSim Pro application simulates color spectrum visibility using standard color matrices for educational purposes. The application operates fully locally within your browser environment without sending images or vision data to external servers.",
                termsLegal: "There is no coercion to use this app. This app is provided 'as-is' and the accuracy of results is not guaranteed. The development of this app was assisted by AI tools. This app does not store your personal data on our servers. The creator is absolved from any consequences, damages, or claims arising from the use of this app. Use of this app constitutes full agreement to these terms."
            }
        };

        // --- COLOR MATRICES (Aksesibilitas Standar) ---
        const colorMatrices = {
            protanopia: "0.567 0.433 0 0 0  0.558 0.442 0 0 0  0 0.242 0.758 0 0  0 0 0 1 0",
            protanomaly: "0.817 0.183 0 0 0  0.333 0.667 0 0 0  0 0.125 0.875 0 0  0 0 0 1 0",
            deuteranopia: "0.625 0.375 0 0 0  0.7 0.3 0 0 0  0 0.3 0.7 0 0  0 0 0 1 0",
            deuteranomaly: "0.8 0.2 0 0 0  0.258 0.742 0 0 0  0 0.142 0.858 0 0  0 0 0 1 0",
            tritanopia: "0.95 0.05 0 0 0  0 0.433 0.567 0 0  0 0.475 0.525 0 0  0 0 0 1 0",
            tritanomaly: "0.967 0.033 0 0 0  0 0.733 0.267 0 0  0 0.183 0.817 0 0  0 0 0 1 0",
            achromatopsia: "0.299 0.587 0.114 0 0  0.299 0.587 0.114 0 0  0.299 0.587 0.114 0 0  0 0 0 1 0"
        };

        // Gambar default di set ke urutan pertama
        const sampleImages = [
            "https://ik.trn.asia/uploads/2022/03/1647007269306.jpeg", // Default landscape requested
            "https://images.unsplash.com/photo-1513360371669-4adf3dd7dff8?auto=format&fit=crop&w=1600&q=80", // Pencils
            "https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?auto=format&fit=crop&w=1600&q=80", // Balloons
            "https://images.unsplash.com/photo-1610832958506-aa56368176cf?auto=format&fit=crop&w=1600&q=80", // Fruits
        ];

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-screen bg-red-900 text-white p-10 font-mono">
                            <h1 className="text-3xl font-bold mb-4">ENGINE CRASHED</h1>
                            <p className="bg-black p-4 rounded text-sm w-full max-w-2xl overflow-auto text-red-400 whitespace-pre-wrap">{this.state.error.toString()}</p>
                            <button onClick={() => window.location.reload()} className="mt-6 px-4 py-2 bg-white text-red-900 font-bold rounded">Muat Ulang Aplikasi</button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        // --- ICONS ---
        const SunIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const MoonIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const CameraIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
        const HelpCircleIcon = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
        const ImageIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
        const SplitIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20"/><rect width="8" height="16" x="14" y="4" rx="2"/><rect width="8" height="16" x="2" y="4" rx="2"/></svg>;

        // --- MAIN APPLICATION ---
        const App = () => {
            const [lang, setLang] = useState(() => typeof window !== 'undefined' ? localStorage.getItem('lang') || 'id' : 'id');
            const [darkMode, setDarkMode] = useState(() => typeof window !== 'undefined' ? localStorage.getItem('theme') === 'dark' : false);
            const [showTerms, setShowTerms] = useState(false);
            
            const t = translations[lang];

            const [activeFilter, setActiveFilter] = useState('normal');
            const [imageIndex, setImageIndex] = useState(0);
            const [isSplitMode, setIsSplitMode] = useState(false);
            const [splitPos, setSplitPos] = useState(50);

            const targetPan = useRef({ x: 0, y: 0 }); 
            const currentPan = useRef({ x: 0, y: 0 });
            const lastMousePos = useRef({ x: null, y: null });
            const panoAreaRef = useRef(null);
            const [isCapturing, setIsCapturing] = useState(false);

            useEffect(() => {
                if (darkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [darkMode]);

            useEffect(() => {
                let frame;
                const loop = () => {
                    currentPan.current.x += (targetPan.current.x - currentPan.current.x) * 0.15;
                    currentPan.current.y += (targetPan.current.y - currentPan.current.y) * 0.15;
                    if (panoAreaRef.current) {
                        panoAreaRef.current.style.setProperty('--pan-nx', currentPan.current.x);
                        panoAreaRef.current.style.setProperty('--pan-ny', currentPan.current.y);
                    }
                    frame = requestAnimationFrame(loop);
                };
                frame = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(frame);
            }, []); 

            const handleMouseMove = (e) => {
                lastMousePos.current = { x: e.clientX, y: e.clientY };
                const rect = e.currentTarget.getBoundingClientRect();
                targetPan.current = { x: (e.clientX - rect.left) / rect.width - 0.5, y: (e.clientY - rect.top) / rect.height - 0.5 };
            };

            const handleMouseLeave = () => {
                lastMousePos.current = { x: null, y: null }; 
                targetPan.current = { x: 0, y: 0 };
            };

            const handleDownload = async () => {
                const node = document.getElementById('pano-view-area');
                if (!node || !window.htmlToImage) return;
                setIsCapturing(true);
                try {
                    const dataUrl = await window.htmlToImage.toPng(node, { quality: 0.95, pixelRatio: 2, fontEmbedCSS: '' });
                    const link = document.createElement('a');
                    link.download = `ChromaSim-${activeFilter}${isSplitMode ? '-Split' : ''}-${new Date().getTime()}.png`;
                    link.href = dataUrl; link.click();
                } catch (error) {
                    alert('Gagal mengunduh gambar akibat batasan CORS pada sumber gambar luar.');
                } finally { setIsCapturing(false); }
            };

            const toggleImage = () => setImageIndex((prev) => (prev + 1) % sampleImages.length);

            const filterGroups = [
                { title: "Normal", items: ['normal'] },
                { title: "Red-Green (Protan)", items: ['protanomaly', 'protanopia'] },
                { title: "Red-Green (Deutan)", items: ['deuteranomaly', 'deuteranopia'] },
                { title: "Blue-Yellow (Tritan)", items: ['tritanomaly', 'tritanopia'] },
                { title: "Monokrom", items: ['achromatopsia'] }
            ];

            const tx = `calc(var(--pan-nx, 0) * -120px)`;
            const ty = `calc(var(--pan-ny, 0) * -80px)`;
            const baseScale = 1.15;

            return (
                <div className="h-screen flex flex-col bg-preview text-main font-sans select-none">
                    
                    {/* --- HEADER --- */}
                    <header className="flex items-center justify-between px-6 border-b border-theme bg-header shrink-0 relative z-50 h-14">
                        <div className="flex items-center gap-3">
                            <div className="flex flex-col">
                                <div className="flex items-center gap-2">
                                    <h1 className="text-lg font-bold bg-gradient-to-r from-rose-500 via-amber-500 to-blue-500 bg-clip-text text-transparent">ChromaSim Pro</h1>
                                    <span className="text-[10px] font-mono text-dim italic border border-theme px-1 rounded">v3.0 TATADADA</span>
                                </div>
                                <a href="https://danial.my.id" target="_blank" rel="noreferrer" className="lowercase font-bold tracking-[0.25em] text-[8px] text-dim hover:text-blue-500 uppercase transition-colors">by AhmadDanial</a>
                            </div>
                            <div className="relative group ml-2 cursor-help">
                                <HelpCircleIcon className="w-4 h-4 text-dim hover:text-blue-500 transition-colors" />
                                <div className="absolute left-0 top-full mt-2 w-80 p-4 bg-card border border-theme text-xs text-main rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
                                    <strong className="block mb-2 text-sm">{t.help}:</strong>
                                    <p className="text-dim space-y-1">{t.helpDesc}</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={handleDownload} disabled={isCapturing} className={`px-3 py-1.5 rounded text-[10px] font-bold border flex items-center gap-1.5 transition ${isCapturing ? 'bg-slate-700 text-slate-400 border-slate-600' : 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border-emerald-500/30 hover:bg-emerald-500/20'}`}>
                                <CameraIcon /> {isCapturing ? t.capturing : t.capture}
                            </button>
                            <div className="w-px h-6 bg-theme mx-1 self-center"></div>
                            
                            <button onClick={() => {
                                const newLang = lang === 'id' ? 'en' : 'id';
                                setLang(newLang); localStorage.setItem('lang', newLang);
                            }} className="text-[14px] font-bold text-dim hover:text-main transition-colors uppercase w-6 text-center" title="Change Language">
                                {lang === 'id' ? '🇮🇩' : '🇬🇧'}
                            </button>

                            <button onClick={() => setDarkMode(!darkMode)} className="p-1.5 rounded hover:bg-theme text-dim hover:text-main transition-colors" title="Toggle Tema">
                                {darkMode ? <SunIcon /> : <MoonIcon />}
                            </button>
                        </div>
                    </header>

                    {/* --- MAIN WORKSPACE (TATADADA Single View Card Layout) --- */}
                    <main className="flex-1 relative overflow-y-auto overflow-x-hidden flex flex-col p-4 md:p-8">
                        <div className="max-w-6xl mx-auto w-full flex flex-col gap-6">
                            
                            {/* CONTROL PANEL CARD */}
                            <div className="bg-card rounded-2xl shadow-sm border border-theme p-5 flex flex-col lg:flex-row gap-6 items-center justify-between z-40 relative">
                                <div className="flex-1 w-full overflow-x-auto hide-scrollbar">
                                    <div className="flex gap-4 min-w-max">
                                        {filterGroups.map((group, i) => (
                                            <div key={i} className="flex flex-col">
                                                <div className="text-[9px] text-dim font-bold tracking-widest mb-1.5 px-1 uppercase">{group.title}</div>
                                                <div className="flex gap-1 bg-preview p-1 rounded-lg border border-theme">
                                                    {group.items.map(filterId => (
                                                        <button 
                                                            key={filterId}
                                                            onClick={() => setActiveFilter(filterId)}
                                                            className={`px-3 py-1.5 rounded text-[11px] font-semibold transition-all ${
                                                                activeFilter === filterId 
                                                                    ? 'bg-blue-600 text-white shadow-md' 
                                                                    : 'hover:bg-theme text-dim hover:text-main'
                                                            }`}
                                                        >
                                                            {t.types[filterId].name}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex gap-2 pl-4 lg:border-l border-theme shrink-0 w-full lg:w-auto">
                                    <button onClick={toggleImage} className="flex-1 lg:flex-none px-4 py-2 rounded-xl text-[11px] font-bold border border-theme bg-preview hover:bg-theme text-main transition flex justify-center items-center gap-2">
                                        <ImageIcon /> {t.imgSelect}
                                    </button>
                                    <button onClick={() => setIsSplitMode(!isSplitMode)} className={`flex-1 lg:flex-none px-4 py-2 rounded-xl text-[11px] font-bold border flex justify-center items-center gap-2 transition ${isSplitMode ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-preview text-main border-theme hover:bg-theme'}`}>
                                        <SplitIcon /> {t.compare}
                                    </button>
                                </div>
                            </div>

                            {/* PANO VIEW AREA CARD */}
                            <div id="pano-view-area" 
                                 className="w-full h-[60vh] md:h-[65vh] bg-black rounded-2xl shadow-md border border-theme overflow-hidden relative cursor-crosshair group"
                                 ref={panoAreaRef} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave}>
                                
                                {/* SVG DEFINITIONS FOR COLOR BLINDNESS (Pindah ke dalam area capture agar ikut ter-render oleh html-to-image) */}
                                <svg width="0" height="0" className="absolute pointer-events-none">
                                    <defs>
                                        {Object.entries(colorMatrices).map(([id, matrix]) => (
                                            <filter id={`cb-${id}`} key={id}>
                                                <feColorMatrix type="matrix" values={matrix} />
                                            </filter>
                                        ))}
                                    </defs>
                                </svg>

                                {/* Base Image */}
                                <img src={sampleImages[imageIndex]} crossOrigin="anonymous" 
                                     className="absolute inset-0 w-full h-full object-cover origin-center pointer-events-none" 
                                     style={{ 
                                         transform: `scale(${baseScale}) translate(${tx}, ${ty})`, 
                                         filter: activeFilter !== 'normal' ? `url(#cb-${activeFilter})` : 'none',
                                         willChange: 'transform, filter'
                                     }} alt="Colorblind View" />

                                {/* Split Screen Image (Normal) */}
                                {isSplitMode && (
                                    <div className="absolute inset-0 pointer-events-none" style={{ clipPath: `inset(0 ${100 - splitPos}% 0 0)` }}>
                                        <img src={sampleImages[imageIndex]} crossOrigin="anonymous" 
                                             className="absolute inset-0 w-full h-full object-cover origin-center" 
                                             style={{ 
                                                 transform: `scale(${baseScale}) translate(${tx}, ${ty})`, 
                                                 willChange: 'transform'
                                             }} alt="Normal View" />
                                    </div>
                                )}

                                {/* Pembatas Split Screen (Render Manual agar terbaca html-to-image) */}
                                {isSplitMode && (
                                    <div className="absolute top-0 bottom-0 w-1 bg-white shadow-[0_0_15px_rgba(0,0,0,0.8)] z-30 pointer-events-none" 
                                         style={{ left: `calc(${splitPos}% - 2px)` }}></div>
                                )}

                                {/* Range Slider for Split Screen (Input Transparan untuk Interaksi) */}
                                {isSplitMode && (
                                    <input type="range" min="0" max="100" value={splitPos} onChange={(e) => setSplitPos(e.target.value)}
                                           className="absolute inset-0 w-full h-full opacity-0 split-slider z-50 cursor-col-resize" />
                                )}

                                {/* Label Indikator untuk Split Mode */}
                                {isSplitMode && (
                                    <div className="absolute top-4 left-4 right-4 flex justify-between pointer-events-none z-40">
                                        <span className="bg-black/60 backdrop-blur text-white text-xs px-3 py-1.5 rounded-full font-semibold border border-white/20 shadow-lg">Normal Vision</span>
                                        <span className="bg-black/60 backdrop-blur text-white text-xs px-3 py-1.5 rounded-full font-semibold border border-white/20 shadow-lg">{t.types[activeFilter].name}</span>
                                    </div>
                                )}

                                {/* Keterangan Tipe Buta Warna (Single Mode) */}
                                {!isSplitMode && activeFilter !== 'normal' && (
                                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 pointer-events-none z-40 transition-opacity">
                                        <div className="bg-black/70 backdrop-blur-md border border-white/10 p-4 rounded-2xl shadow-2xl flex flex-col items-center text-center max-w-sm">
                                            <h3 className="text-white font-bold text-lg mb-1">{t.types[activeFilter].name}</h3>
                                            <p className="text-gray-300 text-xs leading-relaxed">{t.types[activeFilter].desc}</p>
                                        </div>
                                    </div>
                                )}
                            </div>

                        </div>
                    </main>

                    {/* --- FOOTER --- */}
                    <footer className="flex items-center justify-between px-6 border-t border-theme bg-footer text-[10px] text-dim shrink-0 h-8 relative z-50">
                        <div className="flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            <span>{t.engine}</span>
                        </div>
                        <div>
                            <span className="font-mono text-center">{t.optics}</span>
                        </div>
                        <div>
                            <button onClick={() => setShowTerms(true)} className="hover:text-main transition-colors underline decoration-dotted underline-offset-2">
                                {t.terms}
                            </button>
                        </div>
                    </footer>

                    {/* --- MODAL TERMS OF USE (TATADADA Smart & Strict Mode) --- */}
                    {showTerms && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4" onClick={() => setShowTerms(false)}>
                            <div className="bg-card border border-theme rounded-2xl shadow-2xl max-w-lg w-full p-6 lg:p-8 relative" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-bold text-main mb-4">{t.termsTitle}</h3>
                                <div className="space-y-4 mb-8">
                                    <p className="text-sm text-dim leading-relaxed p-4 bg-preview rounded-xl border border-theme">
                                        {t.termsContext}
                                    </p>
                                    <p className="text-sm text-main font-medium leading-relaxed italic">
                                        {t.termsLegal}
                                    </p>
                                </div>
                                <div className="flex justify-end">
                                    <button onClick={() => setShowTerms(false)} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold rounded-xl transition-colors shadow-sm">
                                        {t.close}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
