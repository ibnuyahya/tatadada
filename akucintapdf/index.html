<!-- [TATADADA VISUAL INTERPRETATION]: Ikon aplikasi menggunakan material frosted-glass sebagai dasar, dengan tumpukan dokumen 3D berbalut glossy-white dan lensa glossy-dark yang merepresentasikan fitur pemindai/ekstraktor. Aksen merah dan biru menonjolkan fungsi PDF, memberi kesan premium dan mendalam (Vibrant Depth) ala visionOS. -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkuCintaPDF - PDF Tools Lokal</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PDF Libraries & Cryptography & QR Scanner & OCR -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- TATADADA Framework Styles -->
    <style>
        :root {
            --header-bg: #ffffff;
            --editor-bg: #ffffff;
            --preview-bg: #f1f5f9; 
            --card-bg: #ffffff;
            --footer-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --theme-accent: #3b82f6;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --freeze-bg: #f8fafc; 
            --freeze-bg-even: #f1f5f9;
            --freeze-hover: #eff6ff;
        }
        html.dark {
            --header-bg: #161b22;
            --editor-bg: #0d1117;
            --preview-bg: #010409;
            --card-bg: #0d1117;
            --footer-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --stripe-color: rgba(255, 255, 255, 0.03);
            --freeze-bg: #010409;
            --freeze-bg-even: #0d1117;
            --freeze-hover: rgba(59, 130, 246, 0.1);
            color-scheme: dark;
        }
        body { 
            background-color: var(--preview-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }
        
        .bg-header { background-color: var(--header-bg); }
        .bg-editor { background-color: var(--editor-bg); }
        .bg-preview { background-color: var(--preview-bg); }
        .bg-card { background-color: var(--card-bg); }
        .bg-footer { background-color: var(--footer-bg); }
        .border-theme { border-color: var(--border-color); }
        .text-main { color: var(--text-main); }
        .text-dim { color: var(--text-dim); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
        
        .tata-input {
            background-color: var(--preview-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }
        .tata-input:focus {
            border-color: var(--theme-accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .view-section { display: none; }
        .view-section.active { display: block; }
        
        /* Drag and Drop Visuals */
        .drag-over { border-color: #ef4444 !important; background-color: var(--stripe-color) !important; }
        .dragging { opacity: 0.5; }

        /* Custom Scrollbar for Logs & Textarea */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

        textarea.tata-editor {
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            line-height: 1.6;
            resize: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col text-main bg-preview font-sans overflow-hidden">

    <!-- HEADER (TATADADA h-14) -->
    <header class="h-14 flex items-center justify-between px-4 sm:px-6 border-b border-theme bg-header shrink-0 relative z-50 shadow-sm">
        <div class="flex items-center gap-2 cursor-pointer" onclick="switchView('home')">
            <i data-lucide="layers" class="w-5 h-5 text-red-600"></i>
            <div class="flex flex-col justify-center">
                <div class="flex items-baseline gap-1.5">
                    <span class="bg-gradient-to-r from-blue-400 to-indigo-600 bg-clip-text text-transparent font-extrabold text-sm tracking-tight">AkuCintaPDF</span>
                    <span class="text-[10px] font-mono text-dim italic hidden sm:inline">v3.2-Premium</span>
                    <div class="relative group ml-1 flex items-center cursor-help">
                        <i data-lucide="help-circle" class="w-3 h-3 text-dim hover:text-main transition-colors"></i>
                        <div class="absolute left-0 top-full mt-2 w-64 p-3 bg-editor border border-theme text-main text-xs rounded-xl shadow-xl whitespace-normal leading-relaxed opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[60]" data-i18n="helpTooltip"></div>
                    </div>
                </div>
                <a href="https://danial.my.id" target="_blank" rel="noreferrer" class="lowercase font-bold tracking-[0.25em] text-[8px] text-dim hover:text-blue-500 transition-colors">by AhmadDanial</a>
            </div>
        </div>

        <div class="flex items-center gap-2 sm:gap-3">
            <button id="btnToggleLang" class="text-[10px] font-bold text-dim hover:text-main px-2 py-1.5 bg-preview border border-theme rounded-lg flex items-center transition-all shadow-sm focus:ring-2 focus:ring-blue-500/20"></button>
            <button id="btnToggleTheme" class="p-1.5 text-dim hover:text-main bg-preview border border-theme rounded-lg transition-all shadow-sm focus:ring-2 focus:ring-blue-500/20">
                <i data-lucide="moon" class="w-4 h-4" id="themeIcon"></i>
            </button>
        </div>
    </header>

    <!-- MAIN WORKSPACE -->
    <main class="flex-1 relative overflow-auto p-2 sm:p-4 md:p-6 bg-preview" id="main-workspace">
        
        <!-- ================= VIEW: HOME ================= -->
        <div id="view-home" class="view-section active max-w-6xl mx-auto w-full bg-card rounded-2xl shadow-xl border border-theme p-6 md:p-8 my-2 md:my-6">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-extrabold text-main mb-3 tracking-tight">AkuCinta<span class="text-red-600">PDF</span></h1>
                <p class="text-sm md:text-base text-dim max-w-2xl mx-auto" data-i18n="appDesc"></p>
            </div>
            <!-- Grid 16 Fitur -->
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4 gap-3 sm:gap-4" id="home-menu-grid">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- ================= VIEW: INFO PDF (PURE METADATA) ================= -->
        <div id="view-info" class="view-section max-w-4xl mx-auto w-full bg-card rounded-2xl shadow-xl border border-theme p-4 sm:p-6 md:p-8 my-2 md:my-6">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="info" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="infoTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="infoDesc"></p>
            </div>
            
            <div id="info-upload-box" class="bg-preview p-4 sm:p-6 rounded-2xl border border-theme shadow-inner">
                <label class="border-2 border-dashed border-theme rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer bg-editor hover:bg-[var(--stripe-color)] transition-colors shadow-sm">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1" data-i18n="uploadPrompt"></span>
                    <input type="file" accept="application/pdf" class="hidden" id="info-input">
                </label>
            </div>

            <div id="info-active-box" class="space-y-5 hidden">
                <div class="flex items-center justify-between bg-preview p-4 rounded-lg border border-theme shadow-sm">
                    <div class="flex items-center overflow-hidden mr-3">
                        <i data-lucide="file-text" class="w-6 h-6 text-red-500 mr-3 shrink-0"></i>
                        <div class="min-w-0">
                            <h3 class="font-semibold text-main text-sm truncate" id="info-filename"></h3>
                            <p class="text-xs text-dim mt-0.5" id="info-filesize"></p>
                        </div>
                    </div>
                    <button onclick="InfoModule.reset()" class="text-xs text-red-600 hover:text-red-500 font-medium whitespace-nowrap shrink-0 px-3 py-1.5 bg-editor rounded-lg shadow-sm border border-theme focus:ring-2 focus:ring-blue-500/20" data-i18n="replaceFile"></button>
                </div>

                <div id="info-msg"></div>
                <div id="info-data-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
        </div>

        <!-- ================= VIEW: CEK E-SIGN / VERIFY PDF ================= -->
        <div id="view-verify" class="view-section max-w-[1400px] mx-auto w-full bg-card rounded-2xl shadow-xl border border-theme p-4 sm:p-6 md:p-8 my-2 md:my-6">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="shield-check" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="verifyTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="verifyDesc"></p>
            </div>
            
            <div id="verify-upload-box" class="bg-preview p-4 sm:p-6 rounded-2xl border border-theme shadow-inner">
                <label class="border-2 border-dashed border-theme rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer bg-editor hover:bg-[var(--stripe-color)] transition-colors shadow-sm">
                    <i data-lucide="shield" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1" data-i18n="uploadPrompt"></span>
                    <p class="text-xs text-dim text-center">Mendukung BSrE / Privy / e-Meterai Peruri</p>
                    <input type="file" accept="application/pdf" class="hidden" id="verify-input">
                </label>
            </div>

            <div id="verify-active-box" class="space-y-5 hidden">
                <div class="flex items-center justify-between bg-preview p-4 rounded-lg border border-theme shadow-sm">
                    <div class="flex items-center overflow-hidden mr-3">
                        <i data-lucide="file-check-2" class="w-6 h-6 text-red-500 mr-3 shrink-0"></i>
                        <div class="min-w-0">
                            <h3 class="font-semibold text-main text-sm truncate" id="verify-filename"></h3>
                            <p class="text-xs text-dim mt-0.5" id="verify-filesize"></p>
                        </div>
                    </div>
                    <button onclick="VerifySignModule.reset()" class="text-xs text-red-600 hover:text-red-500 font-medium whitespace-nowrap shrink-0 px-3 py-1.5 bg-editor rounded-lg shadow-sm border border-theme focus:ring-2 focus:ring-blue-500/20" data-i18n="replaceFile"></button>
                </div>

                <div id="verify-msg"></div>

                <div class="flex flex-col lg:flex-row gap-6 items-start h-full">
                    <!-- Left Column: Data & Signatures -->
                    <div class="w-full lg:w-1/2 xl:w-5/12 flex flex-col gap-4">
                        <div id="verify-success-banner"></div>
                        <div id="verify-signatures-container" class="space-y-4"></div>
                    </div>

                    <!-- Right Column: Page Preview & QR -->
                    <div class="w-full lg:w-1/2 xl:w-7/12 bg-editor rounded-xl shadow-sm border border-theme overflow-hidden flex flex-col relative">
                        <div class="bg-[var(--freeze-bg-even)] px-5 py-4 flex items-center justify-between shrink-0 border-b border-theme z-20">
                            <span class="text-sm font-bold text-main flex items-center gap-2">
                                <i data-lucide="image" class="w-4 h-4 text-blue-500"></i> <span data-i18n="previewTitle"></span>
                            </span>
                            <span class="text-[10px] text-dim bg-editor px-2 py-1 rounded-md border border-theme uppercase font-bold tracking-wider" data-i18n="pdfEngine"></span>
                        </div>

                        <div id="verify-qr-banner"></div>

                        <div id="verify-preview-container" class="flex-grow overflow-y-auto p-4 sm:p-8 flex flex-col items-center pb-10 relative z-0 custom-scrollbar bg-preview min-h-[400px]">
                            <!-- Canvas will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= VIEW: MERGE ================= -->
        <div id="view-merge" class="view-section max-w-5xl mx-auto w-full bg-card rounded-2xl shadow-xl border border-theme p-4 sm:p-6 md:p-8 my-2 md:my-6">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="layers" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="mergeTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="mergeDesc"></p>
            </div>
            <div class="bg-preview p-4 sm:p-6 rounded-2xl border border-theme shadow-inner">
                <label class="border-2 border-dashed border-theme rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer bg-editor hover:bg-[var(--stripe-color)] transition-colors mb-6 shadow-sm">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1 text-center" id="merge-upload-label" data-i18n="uploadPrompt"></span>
                    <span class="text-xs text-dim text-center" data-i18n="uploadOr"></span>
                    <input type="file" multiple accept="application/pdf" class="hidden" id="merge-input">
                </label>
                <div id="merge-list-container" class="mb-6 hidden">
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4" id="merge-list"></div>
                </div>
                <div id="merge-msg"></div>
                <button id="btn-process-merge" disabled class="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-editor text-dim cursor-not-allowed border border-theme shadow-sm focus:ring-2 focus:ring-red-500/20">
                    <i data-lucide="layers" class="w-4 h-4 mr-2"></i> <span data-i18n="mergeNow"></span>
                </button>
            </div>
        </div>

        <!-- ================= VIEW: SPLIT ================= -->
        <div id="view-split" class="view-section max-w-5xl mx-auto w-full bg-card rounded-2xl shadow-xl border border-theme p-4 sm:p-6 md:p-8 my-2 md:my-6">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="split" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="splitTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="splitDesc"></p>
            </div>
            <div class="bg-preview p-4 sm:p-6 rounded-2xl border border-theme shadow-inner">
                <label id="split-upload-box" class="border-2 border-dashed border-theme rounded-xl bg-editor p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-[var(--stripe-color)] transition-colors shadow-sm">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1 text-center" data-i18n="uploadPrompt"></span>
                    <input type="file" accept="application/pdf" class="hidden" id="split-input">
                </label>
                <div id="split-active-box" class="space-y-5 hidden">
                    <div class="flex items-center justify-between bg-editor p-4 rounded-lg border border-theme shadow-sm">
                        <div class="flex items-center overflow-hidden mr-3">
                            <i data-lucide="file" class="w-6 h-6 text-red-500 mr-3 shrink-0"></i>
                            <div class="min-w-0">
                                <h3 class="font-semibold text-main text-sm" id="split-filename"></h3>
                                <p class="text-xs text-dim mt-0.5">Total: <span id="split-pagecount"></span> <span data-i18n="pages"></span></p>
                            </div>
                        </div>
                        <button onclick="SplitModule.reset()" class="text-xs text-red-600 hover:text-red-500 font-medium px-3 py-1.5 bg-preview rounded-lg border border-theme shadow-sm" data-i18n="replaceFile"></button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div id="split-mode-range" class="p-4 border border-red-500 bg-red-500/5 rounded-xl cursor-pointer transition-all shadow-sm" onclick="SplitModule.setMode('range')">
                            <h4 class="font-bold text-main mb-1 text-sm" data-i18n="extractRange"></h4>
                            <p class="text-xs text-dim" data-i18n="extractRangeDesc"></p>
                        </div>
                        <div id="split-mode-all" class="p-4 border border-theme bg-editor hover:border-red-300 rounded-xl cursor-pointer transition-all shadow-sm" onclick="SplitModule.setMode('all')">
                            <h4 class="font-bold text-main mb-1 text-sm" data-i18n="splitAll"></h4>
                            <p class="text-xs text-dim" data-i18n="splitAllDesc"></p>
                        </div>
                    </div>
                    <div id="split-range-input-container" class="mt-2">
                        <label class="block text-xs font-semibold text-main mb-2">e.g., 1, 3-5, 8</label>
                        <input type="text" id="split-range-val" placeholder="1, 4-7, 10" class="w-full p-3 rounded-lg tata-input text-sm shadow-sm focus:ring-2 focus:ring-blue-500/20">
                    </div>
                    <div id="split-msg"></div>
                    <button id="btn-process-split" disabled class="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-editor text-dim cursor-not-allowed border border-theme shadow-sm focus:ring-2 focus:ring-red-500/20">
                        <i data-lucide="split" class="w-4 h-4 mr-2"></i> <span id="split-btn-text" data-i18n="splitNow"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= VIEW: ARRANGE ================= -->
        <div id="view-arrange" class="view-section max-w-5xl mx-auto w-full bg-card rounded-2xl shadow-xl border border-theme p-4 sm:p-6 md:p-8 my-2 md:my-6">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="settings" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="arrangeTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="arrangeDesc"></p>
            </div>
            <div class="bg-preview p-4 sm:p-6 rounded-2xl border border-theme shadow-inner">
                <label id="arrange-upload-box" class="border-2 border-dashed border-theme rounded-xl bg-editor p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-[var(--stripe-color)] transition-colors shadow-sm">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1 text-center" data-i18n="uploadPrompt"></span>
                    <input type="file" accept="application/pdf" class="hidden" id="arrange-input">
                </label>
                <div id="arrange-active-box" class="hidden">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-5 pb-4 border-b border-theme">
                        <h3 class="font-semibold text-main text-sm truncate w-full md:max-w-[40%]" id="arrange-filename"></h3>
                        <div class="flex flex-wrap items-center gap-2 sm:gap-3">
                            <button onclick="ArrangeModule.resetOrder()" title="Reset" class="flex items-center text-xs text-dim hover:text-main font-medium bg-editor shadow-sm px-3 py-1.5 rounded-lg border border-theme transition-colors focus:ring-2 focus:ring-blue-500/20">
                                <i data-lucide="rotate-ccw" class="w-3.5 h-3.5 sm:mr-1.5"></i><span class="hidden sm:inline" data-i18n="resetOrder"></span>
                            </button>
                            <div class="flex items-center gap-2 bg-editor shadow-sm px-3 py-1.5 rounded-lg border border-theme">
                                <i data-lucide="zoom-out" class="w-4 h-4 text-dim"></i>
                                <input type="range" min="1" max="8" value="3" id="arrange-zoom" class="w-16 sm:w-20 lg:w-24 accent-red-500 focus:outline-none">
                                <i data-lucide="zoom-in" class="w-4 h-4 text-dim"></i>
                            </div>
                            <button onclick="ArrangeModule.reset()" class="text-xs text-red-600 bg-editor shadow-sm border border-theme hover:text-red-500 font-medium whitespace-nowrap px-3 py-1.5 rounded-lg" data-i18n="replaceFile"></button>
                        </div>
                    </div>
                    <div id="arrange-grid" class="grid gap-3 mb-6 transition-all duration-300 grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8"></div>
                    <div id="arrange-msg"></div>
                    <button id="btn-process-arrange" class="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700 shadow-sm focus:ring-2 focus:ring-red-500/20">
                        <i data-lucide="download" class="w-4 h-4 mr-2"></i> <span data-i18n="arrangeApply"></span>
                    </button>
                </div>
            </div>
        </div>

            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        };

        function handleDownload(blobOrBytes, filename, mimeType = 'application/pdf') {
            const blob = blobOrBytes instanceof Blob ? blobOrBytes : new Blob([blobOrBytes], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url; link.download = filename;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        async function renderCanvasPdf(pdfRef, pageIndex, canvasEl, zoom = 3, rotationDelta = 0) {
            try {
                if (canvasEl._renderTask) { await canvasEl._renderTask.cancel(); }

                const page = await pdfRef.getPage(pageIndex + 1);
                const scale = 0.4 + (zoom * 0.2);
                const originalRotation = page.rotate || 0;
                const viewport = page.getViewport({ scale, rotation: originalRotation + rotationDelta });
                canvasEl.width = viewport.width; canvasEl.height = viewport.height;
                
                const renderContext = { canvasContext: canvasEl.getContext('2d'), viewport };
                const renderTask = page.render(renderContext);
                
                canvasEl._renderTask = renderTask;
                await renderTask.promise;
                canvasEl._renderTask = null;
            } catch (err) { 
                if (err.name !== 'RenderingCancelledException') console.error(err); 
            }
        }

        const safeString = (val) => {
            if (val === null || val === undefined) return null;
            if (typeof val === 'object') {
                try { return JSON.stringify(val); } catch (e) { return '[Data Objek Kompleks]'; }
            }
            return String(val);

            const found = attrs?.find(a => (a.name && a.name.includes(oidMapName)) || a.oid === oidStr);

            parsePdfDate(pdfDate) {
                if(!pdfDate) return '-';
                if(pdfDate.startsWith('D:')) {
                    const year = pdfDate.substring(2, 6);
                    const month = pdfDate.substring(6, 8);
                    const day = pdfDate.substring(8, 10);
                    const hour = pdfDate.substring(10, 12) || '00';
                    const min = pdfDate.substring(12, 14) || '00';
                    const sec = pdfDate.substring(14, 16) || '00';
                    return `${year}-${month}-${day} ${hour}:${min}:${sec}`;
                }
                return pdfDate;
            },
            async processFile(file) {
                try {
                    const objUrl = URL.createObjectURL(file);
                    const loadingTask = window.pdfjsLib.getDocument(objUrl);
                    
                    loadingTask.onPassword = () => {
                        this.metaData = { encrypted: true, error: 'Password required', filename: file.name, filesize: formatBytes(file.size) };
                        this.render();
                    };

                    const pdf = await loadingTask.promise;
                    const meta = await pdf.getMetadata();
                    const info = meta.info || {};
                    
                    this.metaData = {
                        encrypted: false,
                        filename: file.name,
                        filesize: formatBytes(file.size),
                        pages: pdf.numPages,
                        version: info.PDFFormatVersion || t('meta_unknown'),
                        title: info.Title || '-',
                        author: info.Author || '-',
                        subject: info.Subject || '-',
                        creator: info.Creator || '-',
                        producer: info.Producer || '-',
                        creationDate: this.parsePdfDate(info.CreationDate),
                        modDate: this.parsePdfDate(info.ModDate),
                        acroForm: (info.IsAcroFormPresent || info.IsXFAPresent) ? t('meta_yes') : t('meta_no')

                    this.render();
                    URL.revokeObjectURL(objUrl);

        const VerifySignModule = {
            file: null, signatures: [], qrUrl: null, targetPage: 1, pdfDocument: null,
            init() {
                document.getElementById('verify-input').addEventListener('change', async (e) => {
                    if (!e.target.files.length || !libsLoaded) return;

                    showMsg('verify-msg', false, '');

            reset() {
