                    document.getElementById('wm-size-val').innerText = `${this.size}%`;
                    document.getElementById('wm-op-val').innerText = `${Math.round(this.opacity * 100)}%`;

                    let text = this.mode === 'preset' ? (this.preset === 'DRAFT' ? t('wm_draft') : t('wm_confid')) : this.custom;
                    if(!text.trim()) text = 'WATERMARK';
                    
                    const pText = document.getElementById('wm-preview-text');
                    pText.innerText = text;
                    pText.style.color = this.color === 'red' ? '#ef4444' : '#9ca3af';
                    pText.style.transform = `translate(-50%, -50%) rotate(-45deg) scale(${this.size / 50})`;
                    document.getElementById('wm-overlay').style.opacity = this.opacity;
                    
                    if(this.pdfRef) renderCanvasPdf(this.pdfRef, 0, document.getElementById('wm-canvas'), 2);
                    this.setLoading(false);
                }
            },
            async process() {
                if(!this.file || !libsLoaded) return;
                this.setLoading(true); showMsg('wm-msg', false, '');
                try {
                    const pdf = await window.PDFLib.PDFDocument.load(await this.file.arrayBuffer());
                    const font = await pdf.embedFont(window.PDFLib.StandardFonts.HelveticaBold);
                    let text = this.mode === 'preset' ? (this.preset === 'DRAFT' ? t('wm_draft') : t('wm_confid')) : this.custom;
                    if(!text.trim()) text = 'WATERMARK';
                    const c = this.color === 'red' ? window.PDFLib.rgb(0.8,0.1,0.1) : window.PDFLib.rgb(0.6,0.6,0.6);
                    
                    pdf.getPages().forEach(p => {
                        const {width, height} = p.getSize();
                        const fs = width * 0.12 * (this.size / 50);
                        const tW = font.widthOfTextAtSize(text, fs);
                        const off = fs / 3;
                        const rad = 45 * Math.PI / 180;
                        p.drawText(text, {
                            x: width/2 - (tW/2)*Math.cos(rad) + off*Math.sin(rad),
                            y: height/2 - (tW/2)*Math.sin(rad) - off*Math.cos(rad),
                            size: fs, font, color: c, opacity: this.opacity, rotate: window.PDFLib.degrees(45)
                        });
                    });
                    handleDownload(await pdf.save(), `${this.file.name.replace('.pdf','')}_Watermarked.pdf`);
                    showMsg('wm-msg', false, 'Success');
                } catch(err) { showMsg('wm-msg', true, 'Error'); }
                this.setLoading(false);
            }
        };

        // ==========================================
        // 12. OCR MODULE
        // ==========================================
        const OcrModule = {
            file: null, pdfRef: null, currentPage: 1, totalPages: 1, ocrLang: 'eng+ind',
            init() {
                document.getElementById('ocr-input').addEventListener('change', async (e) => {
                    if(!e.target.files.length || !libsLoaded || !window.Tesseract) return;
                    this.file = e.target.files[0]; this.setLoading(true);
                    try {
                        this.pdfRef = await window.pdfjsLib.getDocument(URL.createObjectURL(this.file)).promise;
                        this.totalPages = this.pdfRef.numPages;
                        this.currentPage = 1;
                        this.render();
                    } catch(err) { showMsg('ocr-msg', true, 'Error load PDF'); }
                    e.target.value=''; this.setLoading(false);
                });
                document.getElementById('btn-process-ocr').addEventListener('click', () => this.process());
                document.getElementById('ocr-lang-select').addEventListener('change', (e) => { this.ocrLang = e.target.value; });
            },
            reset() { this.file=null; this.pdfRef=null; document.getElementById('ocr-textarea').value=''; showMsg('ocr-msg', false, ''); this.render(); },
            changePage(delta) {
                let n = this.currentPage + delta;
                if(n < 1) n = 1; if(n > this.totalPages) n = this.totalPages;
                this.currentPage = n;
                this.render();
            },
            setLoading(isL) {
                const btn = document.getElementById('btn-process-ocr');
                if(isL) { btn.disabled=true; btn.innerHTML=t('processing'); btn.className="bg-preview text-dim px-5 py-3 rounded-lg font-bold text-sm cursor-not-allowed border border-theme flex items-center shrink-0"; }
                else { btn.disabled=false; btn.className="bg-red-600 hover:bg-red-700 text-white px-5 py-3 rounded-lg font-bold text-sm shadow-sm transition-colors flex items-center shrink-0"; btn.innerHTML = `<i data-lucide="scan-text" class="w-4 h-4 mr-2"></i> ${t('ocr_scanBtn')}`; lucide.createIcons(); }
            },
            render() {
                if(!this.file) { document.getElementById('ocr-upload-box').classList.remove('hidden'); document.getElementById('ocr-active-box').classList.add('hidden'); }
                else {
                    document.getElementById('ocr-upload-box').classList.add('hidden'); document.getElementById('ocr-active-box').classList.remove('hidden');
                    document.getElementById('ocr-filename').innerText = this.file.name;
                    document.getElementById('ocr-filesize').innerText = formatBytes(this.file.size);
                    document.getElementById('ocr-current-page').innerText = this.currentPage;
                    document.getElementById('ocr-total-pages').innerText = this.totalPages;
                    
                    if(this.pdfRef) renderCanvasPdf(this.pdfRef, this.currentPage-1, document.getElementById('ocr-canvas'), 3); // Zoom 3
                    this.setLoading(false);
                }
            },
            async process() {
                if(!this.file || !this.pdfRef || !window.Tesseract) return;
                this.setLoading(true); showMsg('ocr-msg', false, '');
                try {
                    // re-render canvas to a higher scale temporarily for better OCR accuracy
                    const cvs = document.createElement('canvas');
                    await renderCanvasPdf(this.pdfRef, this.currentPage-1, cvs, 5); // Zoom 5
                    const imgData = cvs.toDataURL('image/png');
                    
                    const { data: { text } } = await window.Tesseract.recognize(imgData, this.ocrLang);
                    document.getElementById('ocr-textarea').value = text;
                    showMsg('ocr-msg', false, 'Success');
                } catch(err) { showMsg('ocr-msg', true, 'OCR Error: ' + err.message); }
                this.setLoading(false);
            },
            copyText() {
                const ta = document.getElementById('ocr-textarea');
                ta.select(); document.execCommand('copy');
            }
        };

        // ==========================================
        // 13. EXTRACT URL MODULE
        // ==========================================
        const UrlModule = {
            file: null, pdfRef: null,
            init() {
                document.getElementById('url-input').addEventListener('change', async (e) => {
                    if(!e.target.files.length || !libsLoaded) return;
                    this.file = e.target.files[0]; this.setLoading(true);
                    try {
                        this.pdfRef = await window.pdfjsLib.getDocument(URL.createObjectURL(this.file)).promise;
                        this.render();
                    } catch(err) { showMsg('url-msg', true, 'Error load PDF'); }
                    e.target.value=''; this.setLoading(false);
                });
                document.getElementById('btn-process-url').addEventListener('click', () => this.process());
            },
            reset() { this.file=null; this.pdfRef=null; document.getElementById('url-result-box').classList.add('hidden'); showMsg('url-msg', false, ''); this.render(); },
            setLoading(isL) {
                const btn = document.getElementById('btn-process-url');
                if(isL) { btn.disabled=true; btn.innerHTML=t('processing'); btn.className="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-preview text-dim cursor-not-allowed border border-theme"; }
                else { btn.disabled=false; btn.className="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700 shadow-sm"; btn.innerHTML = `<i data-lucide="search" class="w-4 h-4 mr-2"></i> ${t('url_extractBtn')}`; lucide.createIcons(); }
            },
            render() {
                if(!this.file) { document.getElementById('url-upload-box').classList.remove('hidden'); document.getElementById('url-active-box').classList.add('hidden'); }
                else {
                    document.getElementById('url-upload-box').classList.add('hidden'); document.getElementById('url-active-box').classList.remove('hidden');
                    document.getElementById('url-filename').innerText = this.file.name;
                    document.getElementById('url-filesize').innerText = formatBytes(this.file.size);
                    this.setLoading(false);
                }
            },
            async process() {
                if(!this.file || !this.pdfRef) return;
                this.setLoading(true); showMsg('url-msg', false, '');
                try {
                    const urls = new Set();
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    
                    for(let i=1; i<=this.pdfRef.numPages; i++) {
                        const page = await this.pdfRef.getPage(i);
                        // 1. Get from Annotations (Clickable Links)
                        const annots = await page.getAnnotations();
                        annots.forEach(a => { if(a.url) urls.add(a.url); });
                        
                        // 2. Get from raw text
                        const textContent = await page.getTextContent();
                        const rawText = textContent.items.map(it => it.str).join(' ');
                        const matches = rawText.match(urlRegex);
                        if(matches) matches.forEach(m => urls.add(m));
                    }
                    
                    const arr = Array.from(urls);
                    const ul = document.getElementById('url-list');
                    ul.innerHTML = '';
                    if(arr.length === 0) {
                        ul.innerHTML = `<li class="text-dim">${t('url_empty')}</li>`;
                    } else {
                        arr.forEach(u => {
                            ul.insertAdjacentHTML('beforeend', `<li class="break-all border-b border-theme pb-2"><a href="${u}" target="_blank" class="text-blue-500 hover:underline">${u}</a></li>`);
                        });
                    }
                    document.getElementById('url-count').innerText = arr.length;
                    document.getElementById('url-result-box').classList.remove('hidden');
                } catch(err) { showMsg('url-msg', true, 'Error extracting URLs'); }
                this.setLoading(false);
            },
            copyAll() {
                const items = document.querySelectorAll('#url-list a');
                const text = Array.from(items).map(a => a.href).join('\n');
                const temp = document.createElement('textarea'); temp.value = text;
                document.body.appendChild(temp); temp.select(); document.execCommand('copy'); document.body.removeChild(temp);
            }
        };

        // ==========================================
        // 14. INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            if(window.PDFLib && window.JSZip && window.pdfjsLib) { libsLoaded = true; }

            if (theme === 'dark') document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').setAttribute('data-lucide', theme === 'light' ? 'moon' : 'sun');
            
            document.getElementById('btnToggleLang').addEventListener('click', () => {
                lang = lang === 'id' ? 'en' : 'id';
                localStorage.setItem('lang', lang);
                updateI18n();
            });
            document.getElementById('btnToggleTheme').addEventListener('click', toggleTheme);

            InfoModule.init();
            MergeModule.init();
            SplitModule.init();
            ArrangeModule.init();
            RotateModule.init();
            CompressModule.init();
            PngModule.init();
            ReformatModule.init();
            WatermarkModule.init();
            OcrModule.init();
            UrlModule.init();

            updateI18n();
            switchView('home');
        });

    </script>
</body>
