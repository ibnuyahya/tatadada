<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkuCintaPDF - PDF Tools Lokal</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PDF Libraries & Cryptography & QR Scanner & OCR -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- TATADADA Framework Styles -->
    <style>
        :root {
            --header-bg: #ffffff;
            --editor-bg: #ffffff;
            --preview-bg: #f8fafc;
            --footer-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --stripe-color: rgba(0, 0, 0, 0.02);
            --freeze-bg: #f8fafc; 
            --freeze-bg-even: #f1f5f9;
            --freeze-hover: #eff6ff;
        }
        html.dark {
            --header-bg: #161b22;
            --editor-bg: #0d1117;
            --preview-bg: #010409;
            --footer-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --stripe-color: rgba(255, 255, 255, 0.03);
            --freeze-bg: #010409;
            --freeze-bg-even: #0d1117;
            --freeze-hover: rgba(59, 130, 246, 0.1);
            color-scheme: dark;
        }
        body { 
            background-color: var(--preview-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }
        
        .bg-header { background-color: var(--header-bg); }
        .bg-editor { background-color: var(--editor-bg); }
        .bg-preview { background-color: var(--preview-bg); }
        .bg-footer { background-color: var(--footer-bg); }
        .border-theme { border-color: var(--border-color); }
        .text-main { color: var(--text-main); }
        .text-dim { color: var(--text-dim); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
        
        .tata-input {
            background-color: var(--preview-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }
        .tata-input:focus {
            border-color: #ef4444;
            outline: none;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }
        
        /* Drag and Drop Visuals */
        .drag-over { border-color: #ef4444 !important; background-color: var(--stripe-color) !important; }
        .dragging { opacity: 0.5; }

        /* Custom Scrollbar for Logs & Textarea */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

        /* Textarea Editor Settings */
        textarea.tata-editor {
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap; /* allow wrap for OCR text */
            line-height: 1.6;
            resize: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col text-main bg-preview font-sans overflow-hidden">

    <!-- HEADER (TATADADA h-14) -->
    <header class="flex items-center justify-between px-6 border-b border-theme bg-header shrink-0 relative z-50 h-14">
        <div class="flex items-center gap-2 cursor-pointer" onclick="switchView('home')">
            <i data-lucide="layers" class="w-5 h-5 text-red-600"></i>
            <div class="flex flex-col justify-center">
                <div class="flex items-baseline gap-1.5">
                    <span class="bg-gradient-to-r from-red-500 to-orange-500 bg-clip-text text-transparent font-extrabold text-sm tracking-tight">AkuCintaPDF</span>
                    <span class="text-[10px] font-mono text-dim italic">v1.9-Vanilla</span>
                    <div class="relative group ml-1 flex items-center cursor-help">
                        <i data-lucide="help-circle" class="w-3 h-3 text-dim hover:text-main transition-colors"></i>
                        <div class="absolute left-0 top-full mt-2 w-64 p-2.5 bg-editor border border-theme text-main text-[10px] rounded-lg shadow-xl whitespace-normal leading-relaxed opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[60]" data-i18n="helpTooltip"></div>
                    </div>
                </div>
                <a href="https://danial.my.id" target="_blank" rel="noreferrer" class="lowercase font-bold tracking-[0.25em] text-[8px] text-dim hover:text-blue-500 transition-colors">by AhmadDanial</a>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button id="btnToggleLang" class="text-[10px] font-bold text-dim hover:text-main px-2 py-1 bg-preview border border-theme rounded flex items-center transition-colors"></button>
            <button id="btnToggleTheme" class="p-1.5 text-dim hover:text-main bg-preview border border-theme rounded transition-colors">
                <i data-lucide="moon" class="w-3.5 h-3.5" id="themeIcon"></i>
            </button>
        </div>
    </header>

    <!-- MAIN WORKSPACE -->
    <main class="flex-1 relative overflow-auto p-2 md:p-6 bg-preview" id="main-workspace">
        
        <!-- ================= VIEW: HOME ================= -->
        <div id="view-home" class="view-section active max-w-6xl mx-auto">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-extrabold text-main mb-3 tracking-tight">AkuCinta<span class="text-red-600">PDF</span></h1>
                <p class="text-sm md:text-base text-dim max-w-2xl mx-auto" data-i18n="appDesc"></p>
            </div>
            <!-- Grid Diperkecil agar muat 11 fitur -->
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3" id="home-menu-grid">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- ================= VIEW: INFO PDF ================= -->
        <div id="view-info" class="view-section max-w-[1400px] mx-auto">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="info" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="infoTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="infoDesc"></p>
            </div>
            
            <div id="info-upload-box" class="bg-editor p-6 rounded-xl border border-theme">
                <label class="border-2 border-dashed border-theme rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-[var(--stripe-color)] transition-colors">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1" data-i18n="uploadPrompt"></span>
                    <input type="file" accept="application/pdf" class="hidden" id="info-input">
                </label>
            </div>

            <div id="info-active-box" class="space-y-5 hidden">
                <div class="flex items-center justify-between bg-preview p-4 rounded-lg border border-theme">
                    <div class="flex items-center">
                        <i data-lucide="file-text" class="w-6 h-6 text-red-500 mr-3"></i>
                        <div class="min-w-0">
                            <h3 class="font-semibold text-main text-sm truncate" id="info-filename"></h3>
                            <p class="text-xs text-dim mt-0.5" id="info-filesize"></p>
                        </div>
                    </div>
                    <button onclick="InfoModule.reset()" class="text-xs text-red-600 hover:text-red-500 font-medium whitespace-nowrap shrink-0" data-i18n="replaceFile"></button>
                </div>

                <div id="info-msg"></div>

                <div class="flex flex-col lg:flex-row gap-6 items-start h-full">
                    <!-- Left Column: Data & Signatures -->
                    <div class="w-full lg:w-1/2 xl:w-5/12 flex flex-col gap-4">
                        <div id="info-success-banner"></div>
                        <div id="info-data-grid" class="grid grid-cols-2 gap-3 mb-2"></div>
                        <div id="info-signatures-container" class="space-y-4"></div>
                    </div>

                    <!-- Right Column: Page Preview & QR -->
                    <div class="w-full lg:w-1/2 xl:w-7/12 bg-editor rounded-xl shadow-sm border border-theme overflow-hidden flex flex-col relative">
                        <div class="bg-[var(--freeze-bg-even)] px-5 py-4 flex items-center justify-between shrink-0 border-b border-theme z-20">
                            <span class="text-sm font-bold text-main flex items-center gap-2">
                                <i data-lucide="image" class="w-4 h-4 text-blue-500"></i> <span data-i18n="previewTitle"></span>
                            </span>
                            <span class="text-[10px] text-dim bg-editor px-2 py-1 rounded border border-theme uppercase font-bold tracking-wider" data-i18n="pdfEngine"></span>
                        </div>

                        <div id="info-qr-banner"></div>

                        <div id="info-preview-container" class="flex-grow overflow-y-auto p-4 sm:p-8 flex flex-col items-center pb-10 relative z-0 custom-scrollbar bg-preview min-h-[400px]">
                            <!-- Canvas will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= VIEW: MERGE ================= -->
        <div id="view-merge" class="view-section max-w-4xl mx-auto">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="layers" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="mergeTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="mergeDesc"></p>
            </div>
            <div class="bg-editor p-6 rounded-xl border border-theme">
                <label class="border-2 border-dashed border-theme rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-[var(--stripe-color)] transition-colors mb-6">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1" id="merge-upload-label" data-i18n="uploadPrompt"></span>
                    <span class="text-xs text-dim" data-i18n="uploadOr"></span>
                    <input type="file" multiple accept="application/pdf" class="hidden" id="merge-input">
                </label>
                <div id="merge-list-container" class="mb-6 hidden">
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4" id="merge-list"></div>
                </div>
                <div id="merge-msg"></div>
                <button id="btn-process-merge" disabled class="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-preview text-dim cursor-not-allowed border border-theme">
                    <i data-lucide="layers" class="w-4 h-4 mr-2"></i> <span data-i18n="mergeNow"></span>
                </button>
            </div>
        </div>

        <!-- ================= VIEW: SPLIT ================= -->
        <div id="view-split" class="view-section max-w-4xl mx-auto">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="split" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="splitTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="splitDesc"></p>
            </div>
            <div class="bg-editor p-6 rounded-xl border border-theme">
                <label id="split-upload-box" class="border-2 border-dashed border-theme rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-[var(--stripe-color)] transition-colors">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1" data-i18n="uploadPrompt"></span>
                    <input type="file" accept="application/pdf" class="hidden" id="split-input">
                </label>
                <div id="split-active-box" class="space-y-5 hidden">
                    <div class="flex items-center justify-between bg-preview p-4 rounded-lg border border-theme">
                        <div class="flex items-center">
                            <i data-lucide="file" class="w-6 h-6 text-red-500 mr-3"></i>
                            <div>
                                <h3 class="font-semibold text-main text-sm" id="split-filename"></h3>
                                <p class="text-xs text-dim">Total: <span id="split-pagecount"></span> <span data-i18n="pages"></span></p>
                            </div>
                        </div>
                        <button onclick="SplitModule.reset()" class="text-xs text-red-600 hover:text-red-500 font-medium" data-i18n="replaceFile"></button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div id="split-mode-range" class="p-4 border border-red-500 bg-red-500/5 rounded-xl cursor-pointer transition-all" onclick="SplitModule.setMode('range')">
                            <h4 class="font-bold text-main mb-1 text-sm" data-i18n="extractRange"></h4>
                            <p class="text-xs text-dim" data-i18n="extractRangeDesc"></p>
                        </div>
                        <div id="split-mode-all" class="p-4 border border-theme hover:border-red-300 rounded-xl cursor-pointer transition-all" onclick="SplitModule.setMode('all')">
                            <h4 class="font-bold text-main mb-1 text-sm" data-i18n="splitAll"></h4>
                            <p class="text-xs text-dim" data-i18n="splitAllDesc"></p>
                        </div>
                    </div>
                    <div id="split-range-input-container" class="mt-2">
                        <label class="block text-xs font-semibold text-main mb-2">e.g., 1, 3-5, 8</label>
                        <input type="text" id="split-range-val" placeholder="1, 4-7, 10" class="w-full p-2.5 rounded-lg tata-input text-sm">
                    </div>
                    <div id="split-msg"></div>
                    <button id="btn-process-split" disabled class="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-preview text-dim cursor-not-allowed border border-theme">
                        <i data-lucide="split" class="w-4 h-4 mr-2"></i> <span id="split-btn-text" data-i18n="splitNow"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= VIEW: ARRANGE ================= -->
        <div id="view-arrange" class="view-section max-w-5xl mx-auto">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="settings" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="arrangeTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="arrangeDesc"></p>
            </div>
            <div class="bg-editor p-6 rounded-xl border border-theme">
                <label id="arrange-upload-box" class="border-2 border-dashed border-theme rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-[var(--stripe-color)] transition-colors">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1" data-i18n="uploadPrompt"></span>
                    <input type="file" accept="application/pdf" class="hidden" id="arrange-input">
                </label>
                <div id="arrange-active-box" class="hidden">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5 pb-4 border-b border-theme">
                        <h3 class="font-semibold text-main text-sm truncate max-w-[50%]" id="arrange-filename"></h3>
                        <div class="flex flex-wrap items-center gap-3">
                            <button onclick="ArrangeModule.resetOrder()" title="Reset" class="flex items-center text-xs text-dim hover:text-main font-medium bg-preview px-3 py-1.5 rounded-lg border border-theme transition-colors">
                                <i data-lucide="rotate-ccw" class="w-3.5 h-3.5 sm:mr-1.5"></i><span class="hidden sm:inline" data-i18n="resetOrder"></span>
                            </button>
                            <div class="flex items-center gap-2 bg-preview px-3 py-1.5 rounded-lg border border-theme">
                                <i data-lucide="zoom-out" class="w-4 h-4 text-dim"></i>
                                <input type="range" min="1" max="8" value="3" id="arrange-zoom" class="w-16 sm:w-24 accent-red-500">
                                <i data-lucide="zoom-in" class="w-4 h-4 text-dim"></i>
                            </div>
                            <button onclick="ArrangeModule.reset()" class="text-xs text-red-600 hover:text-red-500 font-medium whitespace-nowrap px-1" data-i18n="replaceFile"></button>
                        </div>
                    </div>
                    <div id="arrange-grid" class="grid gap-3 mb-6 transition-all duration-300 grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8"></div>
                    <div id="arrange-msg"></div>
                    <button id="btn-process-arrange" class="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700">
                        <i data-lucide="download" class="w-4 h-4 mr-2"></i> <span data-i18n="arrangeApply"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= VIEW: ROTATE ================= -->
        <div id="view-rotate" class="view-section max-w-5xl mx-auto">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="rotate-cw" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="rotateTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="rotateDesc"></p>
            </div>
            <div class="bg-editor p-6 rounded-xl border border-theme">
                <label id="rotate-upload-box" class="border-2 border-dashed border-theme rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-[var(--stripe-color)] transition-colors">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1" data-i18n="uploadPrompt"></span>
                    <input type="file" accept="application/pdf" class="hidden" id="rotate-input">
                </label>
                <div id="rotate-active-box" class="hidden">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5 pb-4 border-b border-theme">
                        <h3 class="font-semibold text-main text-sm truncate max-w-[40%]" id="rotate-filename"></h3>
                        <div class="flex flex-wrap items-center gap-3">
                            <button onclick="RotateModule.rotateAll(-90)" class="flex items-center text-xs text-dim hover:text-main font-medium bg-preview px-3 py-1.5 rounded-lg border border-theme transition-colors">
                                <i data-lucide="rotate-ccw" class="w-3.5 h-3.5 sm:mr-1.5"></i><span class="hidden sm:inline" data-i18n="rotateAllLeft"></span>
                            </button>
                            <button onclick="RotateModule.rotateAll(90)" class="flex items-center text-xs text-dim hover:text-main font-medium bg-preview px-3 py-1.5 rounded-lg border border-theme transition-colors">
                                <i data-lucide="rotate-cw" class="w-3.5 h-3.5 sm:mr-1.5"></i><span class="hidden sm:inline" data-i18n="rotateAllRight"></span>
                            </button>
                            <div class="flex items-center gap-2 bg-preview px-3 py-1.5 rounded-lg border border-theme">
                                <i data-lucide="zoom-out" class="w-4 h-4 text-dim"></i>
                                <input type="range" min="1" max="8" value="3" id="rotate-zoom" class="w-16 sm:w-20 accent-red-500">
                                <i data-lucide="zoom-in" class="w-4 h-4 text-dim"></i>
                            </div>
                            <button onclick="RotateModule.reset()" class="text-xs text-red-600 hover:text-red-500 font-medium whitespace-nowrap px-1" data-i18n="replaceFile"></button>
                        </div>
                    </div>
                    <div id="rotate-grid" class="grid gap-3 mb-6 transition-all duration-300 grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8"></div>
                    <div id="rotate-msg"></div>
                    <button id="btn-process-rotate" class="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700">
                        <i data-lucide="download" class="w-4 h-4 mr-2"></i> <span data-i18n="rotateApply"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= VIEW: COMPRESS ================= -->
        <div id="view-compress" class="view-section max-w-4xl mx-auto">
            <button onclick="switchView('home')" class="flex items-center text-dim hover:text-red-500 mb-6 font-medium transition-colors"><i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> <span data-i18n="backHome"></span></button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-main flex items-center mb-2"><i data-lucide="minimize" class="w-6 h-6 mr-3 text-red-600"></i> <span data-i18n="compressTitle"></span></h2>
                <p class="text-dim text-sm" data-i18n="compressDesc"></p>
            </div>
            <div class="bg-editor p-6 rounded-xl border border-theme">
                <label id="compress-upload-box" class="border-2 border-dashed border-theme rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-[var(--stripe-color)] transition-colors">
                    <i data-lucide="upload-cloud" class="w-10 h-10 text-dim mb-3"></i>
                    <span class="text-base font-medium text-main mb-1" data-i18n="uploadPrompt"></span>
                    <input type="file" accept="application/pdf" class="hidden" id="compress-input">
                </label>
                <div id="compress-active-box" class="space-y-6 hidden">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-preview p-4 rounded-lg border border-theme gap-4">
                        <div class="flex items-center">
                            <i data-lucide="file" class="w-6 h-6 text-red-500 mr-3 shrink-0"></i>
                            <div class="min-w-0">

        const formatBytes = (bytes, decimals = 2) => {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        };

        const t = (key) => i18nData[lang][key] || key;

        function updateI18n() {
            document.querySelectorAll('[data-i18n]').forEach(el => {

                if (el.tagName === 'INPUT' && el.type === 'text') el.placeholder = t(key);
                else el.innerHTML = t(key);
            });

            theme = theme === 'light' ? 'dark' : 'light';

            lucide.createIcons();

        function handleDownload(blobOrBytes, filename, mimeType = 'application/pdf') {
            const blob = blobOrBytes instanceof Blob ? blobOrBytes : new Blob([blobOrBytes], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url; link.download = filename;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        async function renderCanvasPdf(pdfRef, pageIndex, canvasEl, zoom = 3, rotationDelta = 0) {
            try {
                if (canvasEl._renderTask) { await canvasEl._renderTask.cancel(); }

                const page = await pdfRef.getPage(pageIndex + 1);
                const scale = 0.4 + (zoom * 0.2);
                const originalRotation = page.rotate || 0;
                const viewport = page.getViewport({ scale, rotation: originalRotation + rotationDelta });
                canvasEl.width = viewport.width; canvasEl.height = viewport.height;
                
                const renderContext = { canvasContext: canvasEl.getContext('2d'), viewport };
                const renderTask = page.render(renderContext);
                
                canvasEl._renderTask = renderTask;
                await renderTask.promise;
                canvasEl._renderTask = null;
            } catch (err) { 
                if (err.name !== 'RenderingCancelledException') console.error(err); 
            }
        }

        const safeString = (val) => {
            if (val === null || val === undefined) return null;
            if (typeof val === 'object') {
                try { return JSON.stringify(val); } catch (e) { return '[Data Objek Kompleks]'; }
            }
            return String(val);
        };

        const getAttrValue = (attrs, oidMapName, oidStr) => {
            const found = attrs?.find(a => (a.name && a.name.includes(oidMapName)) || a.oid === oidStr);
            return found ? safeString(found.value) : null;
        };

            name: OID_MAP[attr.type] || attr.name || 'Atribut Kustom',

            file: null, metaData: null, signatures: [], qrUrl: null, targetPage: 1, pdfDocument: null,
            init() {
                document.getElementById('info-input').addEventListener('change', async (e) => {
                    if (!e.target.files.length || !libsLoaded) return;
                    this.file = e.target.files[0];
                    showMsg('info-msg', false, '');

                    await this.processFile(this.file);

            reset() {

                this.qrUrl = null; this.targetPage = 1; this.pdfDocument = null; 
                this.render(); showMsg('info-msg', false, '');

            parsePdfDate(pdfDate) {
                if(!pdfDate) return '-';
                if(pdfDate.startsWith('D:')) {
                    const year = pdfDate.substring(2, 6);
                    const month = pdfDate.substring(6, 8);
                    const day = pdfDate.substring(8, 10);
                    const hour = pdfDate.substring(10, 12) || '00';
                    const min = pdfDate.substring(12, 14) || '00';
                    const sec = pdfDate.substring(14, 16) || '00';
                    return `${year}-${month}-${day} ${hour}:${min}:${sec}`;
                }
                return pdfDate;
            },

            prepareAndValidatePayload(rawHex) {
                const logs = [];
                const cleanedForHex = rawHex.replace(/[^0-9a-fA-F]/g, '');
                logs.push(`Mengekstrak ${cleanedForHex.length} karakter hex.`);

                if (cleanedForHex.length % 2 !== 0) throw new Error("Payload rusak (panjang ganjil).");

                const binaryArray = new Uint8Array(cleanedForHex.length / 2);
                for (let i = 0; i < cleanedForHex.length; i += 2) {
                    binaryArray[i / 2] = parseInt(cleanedForHex.substr(i, 2), 16);
                }

                let validLength = binaryArray.length;
                while (validLength > 0 && binaryArray[validLength - 1] === 0x00) {
                    validLength--;
                }

                const finalBinaryArray = binaryArray.slice(0, validLength);
                logs.push(`Membersihkan ${binaryArray.length - validLength} byte trailing padding (\\x00).`);

                if (finalBinaryArray.length === 0) throw new Error("Payload kosong.");

                let binaryStr = '';
                const chunkSize = 8192; 
                for (let i = 0; i < finalBinaryArray.length; i += chunkSize) {
                    binaryStr += String.fromCharCode.apply(null, finalBinaryArray.slice(i, i + chunkSize));
                }
                return { binaryStr, logs };
            },

            async extractSignatures(arrayBuffer) {
                const decoder = new TextDecoder('latin1');
                const pdfText = decoder.decode(arrayBuffer);
                const foundSignatures = [];
                const contentsTag = '/Contents';
                let searchIndex = 0;

                while ((searchIndex = pdfText.indexOf(contentsTag, searchIndex)) !== -1) {
                    const startBracketIndex = pdfText.indexOf('<', searchIndex);
                    if (startBracketIndex !== -1 && startBracketIndex - searchIndex < 50) {
                        const endBracketIndex = pdfText.indexOf('>', startBracketIndex);
                        if (endBracketIndex !== -1) {
                            const rawHex = pdfText.substring(startBracketIndex + 1, endBracketIndex);
                            if (rawHex.length > 500) {
                                let debugLogs = [];
                                try {
                                    const { binaryStr, logs } = this.prepareAndValidatePayload(rawHex);
                                    debugLogs = logs;

                                    const asn1Obj = window.forge.asn1.fromDer(binaryStr);
                                    const p7 = window.forge.pkcs7.messageFromAsn1(asn1Obj);

                                    const certs = (p7.certificates || []).map(cert => ({
                                        subject: mapAttributes(cert.subject.attributes),
                                        issuer: mapAttributes(cert.issuer.attributes),
                                        validFrom: cert.validity.notBefore.toString(),
                                        validTo: cert.validity.notAfter.toString(),
                                        serialNumber: cert.serialNumber
                                    }));

                                    const signerInfos = (p7.signerInfos || []).map(signer => {
                                        const authAttrs = (signer.authenticatedAttributes || []).map(attr => {
                                            let rawValue = 'N/A';
                                            if (attr.value && Array.isArray(attr.value) && attr.value.length > 0) {
                                                const v = attr.value[0];
                                                if (v.type === window.forge.asn1.Type.UTCTIME || v.type === window.forge.asn1.Type.GENERALIZEDTIME) {
                                                    rawValue = formatDate(v.value);
                                                } else if (typeof v.value === 'string') {
                                                    rawValue = window.forge.util.bytesToHex(v.value);
                                                }
                                            }
                                            return { oid: attr.type, name: OID_MAP[attr.type] || 'Atribut CMS', value: rawValue };
                                        });
                                        return { authAttrs };
                                    });

                                    debugLogs.push("Rantai Sertifikat berhasil dibedah.");
                                    foundSignatures.push({ id: foundSignatures.length + 1, debugLogs, certificates: certs, signerInfos, error: null });
                                } catch (parseErr) {
                                    foundSignatures.push({ id: foundSignatures.length + 1, error: parseErr.message, debugLogs: [...debugLogs, `ERROR: ${parseErr.message}`], certificates: [] });
                                }
                            }
                        }
                    }
                    searchIndex += contentsTag.length;
                }
                return foundSignatures.filter(s => s.certificates.length > 0 || s.error);
            },

            async scanPageForSignatureAndQR(pdf) {
                let bestPageNum = pdf.numPages; 
                let foundQrUrl = null;

                const scanCanvas = document.createElement('canvas');
                const scanCtx = scanCanvas.getContext('2d', { willReadFrequently: true });

                for (let i = pdf.numPages; i >= 1; i--) {
                    try {
                        const page = await pdf.getPage(i);
                        const annotations = await page.getAnnotations();
                        
                        if (window.jsQR) {
                            const viewport = page.getViewport({ scale: 2.0 });
                            scanCanvas.width = viewport.width;
                            scanCanvas.height = viewport.height;
                            
                            await page.render({ canvasContext: scanCtx, viewport }).promise;
                            const imageData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
                            
                            const code = window.jsQR(imageData.data, imageData.width, imageData.height, {
                                inversionAttempts: "dontInvert"
                            });
                            
                            if (code && code.data) {
                                foundQrUrl = code.data;
                                bestPageNum = i;
                                break; 
                            }
                        }

                        if (annotations.some(a => a.fieldType === 'Sig')) {
                            bestPageNum = i;
                        }
                    } catch (err) {
                        console.warn(`Gagal memindai halaman ${i}:`, err);
                    }
                }
                return { bestPageNum, foundQrUrl };
            },

            async processFile(file) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    let rawString = '';
                    
                    if (file.size < 30 * 1024 * 1024) { 
                        const uint8Array = new Uint8Array(arrayBuffer);
                        rawString = new TextDecoder('latin1').decode(uint8Array);
                    }

                    const isLinearized = rawString ? rawString.slice(0, 1024).includes('/Linearized') : false;
                    const fontCount = rawString ? (rawString.match(/\/Type\s*\/Font\b/g) || []).length : 0;
                    const imageCount = rawString ? (rawString.match(/\/Subtype\s*\/Image\b/g) || []).length : 0;

                    let signatureText = t('meta_unsigned');
                    
                    const sigResult = await parseDigitalSignature(file);
                    
                    if (sigResult.success && sigResult.signatures.length > 0) {
                        let sigDetails = [];
                        sigResult.signatures.forEach(sig => {
                            const human = sig.humanReadableValues;
                            const issuer = sig.issuer || {};
                            
                            let finalName = human.CommonName || human.CN || "Unknown Signer";
                            let label = `👤 <b class="text-main">${finalName}</b>`;
                            
                            let badges = [];
                            const org = human.Organization || human.O || "";
                            const issuerOrg = issuer.Organization || issuer.O || "";
                            
                            if (issuerOrg.includes('BSrE') || issuerOrg.includes('Balai Besar Sertifikasi Elektronik') || rawString.includes('BSrE')) {
                                badges.push("BSrE Verified");
                            }
                            if (org.includes('Universitas Indonesia') || finalName.includes('Universitas Indonesia')) {
                                badges.push("Universitas Indonesia");
                            }
                            
                            if (badges.length > 0) {
                                label += ` <span class="inline-block text-[9px] font-bold bg-green-100 text-green-700 px-1.5 py-0.5 rounded ml-1 align-middle">${badges.join(' | ')}</span>`;
                            }
                            
                            let extras = [];
                            Object.keys(human).forEach(k => {
                                if (k !== 'CommonName' && k !== 'CN') { 
                                     let val = human[k];
                                     if (typeof val === 'string') {
                                         val = val.replace(/[\x00-\x1F\x7F-\x9F]/g, ""); 
                                         extras.push(`<span class="text-[11px] text-dim break-all"><b class="font-semibold">${k}:</b> ${val}</span>`);
                                     }
                                }
                            });
                            
                            if (extras.length > 0) {
                                label += `<br><div class="mt-1 flex flex-col gap-0.5">${extras.join('')}</div>`;
                            }
                            
                            sigDetails.push(label);
                        });
                        signatureText = sigDetails.join('<div class="my-2 border-t border-theme border-dashed"></div>');
                    } else {
                        if (rawString.includes('/adbe.pkcs7') || rawString.includes('/ETSI.CAdES.detached')) {
                            let isBSrE = rawString.includes('BSrE') || rawString.includes('Balai Besar Sertifikasi Elektronik');
                            signatureText = t('meta_signed') + (isBSrE ? ' <span class="inline-block text-[9px] bg-green-100 text-green-700 px-1.5 py-0.5 rounded ml-2 align-middle">BSrE Verified</span>' : '');
                        }
                    }

                    const objUrl = URL.createObjectURL(file);
                    const loadingTask = window.pdfjsLib.getDocument(objUrl);
                    
                    loadingTask.onPassword = () => {
                        this.metaData = { encrypted: true, error: 'Password required', filename: file.name, filesize: formatBytes(file.size) };
                        this.render();
                    };

                    const pdf = await loadingTask.promise;
                    this.pdfDocument = pdf;
                    
                    const meta = await pdf.getMetadata();
                    const info = meta.info || {};
                    
                    this.metaData = {
                        encrypted: false,
                        filename: file.name,
                        filesize: formatBytes(file.size),
                        pages: pdf.numPages,
                        version: info.PDFFormatVersion || t('meta_unknown'),
                        signature: signatureText,
                        title: info.Title || '-',
                        author: info.Author || '-',
                        subject: info.Subject || '-',
                        keywords: info.Keywords || '-',
                        creator: info.Creator || '-',
                        producer: info.Producer || '-',
                        creationDate: this.parsePdfDate(info.CreationDate),
                        modDate: this.parsePdfDate(info.ModDate),
                        acroForm: (info.IsAcroFormPresent || info.IsXFAPresent) ? t('meta_yes') : t('meta_no'),
                        linearized: isLinearized ? t('meta_yes') : t('meta_no'),
                        fontCount: fontCount > 0 ? fontCount : '-',
                        imageCount: imageCount > 0 ? imageCount : '-'
                    };

                    const { bestPageNum, foundQrUrl } = await this.scanPageForSignatureAndQR(pdf);
                    this.targetPage = bestPageNum;
                    this.qrUrl = foundQrUrl;

                    this.render();
                    URL.revokeObjectURL(objUrl);
                } catch(e) {
                    if (e.name !== 'PasswordException') {
                        showMsg('info-msg', true, 'Gagal memproses dokumen.');
                    }
                }
            },

        async function parseDigitalSignature(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                const decoder = new TextDecoder('latin1');
                const pdfString = decoder.decode(uint8Array);

                const contentsRegex = /\/Contents\s*<([A-Fa-f0-9\s]+)>/g;
                let match;
                let signatures = [];

                while ((match = contentsRegex.exec(pdfString)) !== null) {
                    let hexString = match[1].replace(/\s+/g, '');
                    if (hexString.length < 100) continue; 

                    let derString = '';
                    for (let i = 0; i < hexString.length; i += 2) {
                        derString += String.fromCharCode(parseInt(hexString.substr(i, 2), 16));
                    }

                    try {
                        const asn1 = window.forge.asn1.fromDer(derString);
                        const p7 = window.forge.pkcs7.messageFromAsn1(asn1);
                        
                        if (p7.certificates && p7.certificates.length > 0) {
                            const cert = p7.certificates[0]; 
                            
                            const rawOidValues = {};
                            const humanReadableValues = {};
                            
                            cert.subject.attributes.forEach(attr => {
                                const oid = attr.type;
                                const value = attr.value;
                                rawOidValues[oid] = value;
                                
                                const humanName = attr.shortName || attr.name || OID_MAP[oid] || `OID.${oid}`;
                                humanReadableValues[humanName] = value;
                            });
                            
                            const issuerHuman = {};
                            cert.issuer.attributes.forEach(attr => {
                                const oid = attr.type;
                                const humanName = attr.shortName || attr.name || OID_MAP[oid] || `OID.${oid}`;
                                issuerHuman[humanName] = attr.value;
                            });

                            signatures.push({
                                success: true,
                                rawOidValues,
                                humanReadableValues,
                                issuer: issuerHuman
                            });
                        }
                    } catch (e) {
                        console.log("Forge Parse Skip:", e.message);
                    }
                }

                return { success: signatures.length > 0, signatures };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        // ==========================================
        // 4. MERGE MODULE
        // ==========================================
        const MergeModule = {
            items: [], expandedId: null, dragSrcIndex: null, dragDestIndex: null,
            init() {
                document.getElementById('merge-input').addEventListener('change', async (e) => {
                    if (!e.target.files.length || !libsLoaded) return;
                    this.setLoading(true);
                    for (const file of Array.from(e.target.files)) {
                        if (file.type === 'application/pdf') {
                            try {
                                const objUrl = URL.createObjectURL(file);
                                const pdf = await window.pdfjsLib.getDocument(objUrl).promise;
                                const pageCount = pdf.numPages;
                                const page = await pdf.getPage(1);
                                const viewport = page.getViewport({ scale: 0.5 });
                                const canvas = document.createElement('canvas');
                                canvas.width = viewport.width; canvas.height = viewport.height;
                                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                                
                                const pages = Array.from({length: pageCount}, (_, i) => ({ index: i, included: true }));
                                this.items.push({ id: Math.random().toString(36).substr(2, 9), file, name: file.name, pageCount, coverUrl: canvas.toDataURL(), pages, pdfRef: pdf });
                            } catch(err) { console.error(err); }
                        }
                    }
                    e.target.value = '';
                    this.setLoading(false);
                    this.render();
                });
                document.getElementById('btn-process-merge').addEventListener('click', () => this.process());
            },
            reset() { this.items = []; this.expandedId = null; this.render(); showMsg('merge-msg', false, ''); },
            setLoading(isLoading) {
                const btn = document.getElementById('btn-process-merge');
                document.getElementById('merge-upload-label').innerText = isLoading ? t('processing') : t('uploadPrompt');
                document.getElementById('merge-input').disabled = isLoading;
                if(isLoading) {
                    btn.disabled = true; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-preview text-dim cursor-not-allowed border border-theme";
                    btn.innerHTML = t('processing');
                } else {
                    this.renderBtn();
                }
            },
            renderBtn() {
                const btn = document.getElementById('btn-process-merge');
                if (this.items.length < 2) {
                    btn.disabled = true; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-preview text-dim cursor-not-allowed border border-theme";
                } else {
                    btn.disabled = false; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700";
                }
                btn.innerHTML = `<i data-lucide="layers" class="w-4 h-4 mr-2"></i> ${t('mergeNow')}`;
                lucide.createIcons();
            },
            remove(index) { this.items.splice(index, 1); this.render(); },
            handleDragStart(e, index) { this.dragSrcIndex = index; e.currentTarget.classList.add('dragging'); },
            handleDragEnter(e, index) { this.dragDestIndex = index; e.currentTarget.classList.add('drag-over'); },
            handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); },
            handleDragEnd(e) {
                e.currentTarget.classList.remove('dragging');
                document.querySelectorAll('#merge-list > div').forEach(el => el.classList.remove('drag-over'));
                if (this.dragSrcIndex !== null && this.dragDestIndex !== null && this.dragSrcIndex !== this.dragDestIndex) {
                    const item = this.items.splice(this.dragSrcIndex, 1)[0];
                    this.items.splice(this.dragDestIndex, 0, item);
                    this.render();
                }
                this.dragSrcIndex = null; this.dragDestIndex = null;
            },
            expand(id) { 
                this.expandedId = id; 
                const item = this.items.find(i => i.id === id);
                document.getElementById('modal-merge-filename').innerText = item.name;
                document.getElementById('modal-merge').classList.remove('hidden');
                this.renderModalGrid();
            },
            closeModal() { document.getElementById('modal-merge').classList.add('hidden'); this.expandedId = null; this.render(); },
            togglePage(pageIdx) {
                const item = this.items.find(i => i.id === this.expandedId);
                const p = item.pages.find(x => x.index === pageIdx);
                p.included = !p.included;
                this.renderModalGrid();
            },
            selectAll(state) {
                const item = this.items.find(i => i.id === this.expandedId);
                item.pages.forEach(p => p.included = state);
                this.renderModalGrid();
            },
            renderModalGrid() {
                const item = this.items.find(i => i.id === this.expandedId);
                const grid = document.getElementById('modal-merge-grid');
                grid.innerHTML = '';
                item.pages.forEach(p => {
                    const div = document.createElement('div');
                    div.className = `relative cursor-pointer rounded-lg overflow-hidden border-4 transition-all bg-editor ${p.included ? 'border-red-500 shadow-md' : 'border-theme opacity-40 hover:opacity-70'}`;
                    div.onclick = () => this.togglePage(p.index);
                    const canvas = document.createElement('canvas'); canvas.className = "w-full h-auto block bg-white";
                    div.appendChild(canvas);
                    div.insertAdjacentHTML('beforeend', `<div class="absolute bottom-0 inset-x-0 bg-black/80 text-white text-xs font-bold text-center py-1.5">${t('page')} ${p.index + 1}</div>`);
                    if (p.included) div.insertAdjacentHTML('beforeend', `<div class="absolute top-1 right-1 bg-red-500 rounded-full p-0.5 text-white shadow-sm"><i data-lucide="check-circle-2" class="w-4 h-4"></i></div>`);
                    grid.appendChild(div);
                    renderCanvasPdf(item.pdfRef, p.index, canvas, 2);
                });
                lucide.createIcons();
            },
            render() {
                const container = document.getElementById('merge-list-container');
                const list = document.getElementById('merge-list');
                if (this.items.length === 0) { container.classList.add('hidden'); this.renderBtn(); return; }
                container.classList.remove('hidden');
                list.innerHTML = '';
                this.items.forEach((item, index) => {
                    const incCount = item.pages.filter(p => p.included).length;
                    const div = document.createElement('div');
                    div.draggable = true;
                    div.className = "group relative bg-preview border border-theme rounded-xl overflow-hidden hover:border-red-400 transition-all cursor-grab flex flex-col";
                    div.ondragstart = (e) => this.handleDragStart(e, index);
                    div.ondragenter = (e) => this.handleDragEnter(e, index);
                    div.ondragleave = (e) => this.handleDragLeave(e);
                    div.ondragend = (e) => this.handleDragEnd(e);
                    div.ondragover = (e) => e.preventDefault();
                    
                    div.innerHTML = `
                        <div class="relative aspect-[1/1.4] bg-white border-b border-theme">
                            <img src="${item.coverUrl}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-2">
                                <button onclick="MergeModule.expand('${item.id}')" class="bg-editor text-main text-xs px-3 py-1.5 rounded font-medium flex items-center shadow-sm hover:bg-preview"><i data-lucide="maximize-2" class="w-3 h-3 mr-1"></i> ${t('selectPages')}</button>
                                <button onclick="MergeModule.remove(${index})" class="bg-red-600 text-white text-xs px-3 py-1.5 rounded font-medium flex items-center shadow-sm hover:bg-red-700"><i data-lucide="trash-2" class="w-3 h-3 mr-1"></i> Remove</button>
                            </div>
                            ${incCount === 0 ? `<div class="absolute inset-0 bg-editor/80 flex items-center justify-center backdrop-blur-sm"><span class="bg-black text-white text-xs px-2 py-1 rounded font-bold">${t('skipped')}</span></div>` : ''}
                        </div>
                        <div class="p-2">
                            <div class="flex items-center mb-1"><i data-lucide="grip-vertical" class="w-3 h-3 text-dim mr-1 shrink-0"></i><h4 class="font-medium text-xs text-main truncate" title="${item.name}">${item.name}</h4></div>
                            <p class="text-[10px] text-dim text-center mt-1 font-medium">${incCount} / ${item.pageCount} ${t('pages')}</p>
                        </div>
                    `;
                    list.appendChild(div);
                });
                lucide.createIcons();
                this.renderBtn();
            },
            async process() {
                if (this.items.length < 2 || !libsLoaded) return;
                this.setLoading(true); showMsg('merge-msg', false, '');
                try {
                    const mergedPdf = await window.PDFLib.PDFDocument.create();
                    for (const item of this.items) {
                        const arrayBuffer = await item.file.arrayBuffer();
                        const pdf = await window.PDFLib.PDFDocument.load(arrayBuffer);
                        const indicesToInclude = item.pages.filter(p => p.included).map(p => p.index);
                        if (indicesToInclude.length > 0) {
                            const copiedPages = await mergedPdf.copyPages(pdf, indicesToInclude);
                            copiedPages.forEach(p => mergedPdf.addPage(p));
                        }
                    }
                    const pdfBytes = await mergedPdf.save();
                    handleDownload(pdfBytes, 'Merged_Document.pdf');
                    showMsg('merge-msg', false, 'Success Merge');
                } catch (err) { showMsg('merge-msg', true, "Failed to merge PDF."); console.error(err); }
                this.setLoading(false);
            }
        };

        // ==========================================
        // 5. SPLIT MODULE
        // ==========================================
        const SplitModule = {
            file: null, mode: 'range', pageCount: 0,
            init() {
                document.getElementById('split-input').addEventListener('change', async (e) => {
                    if (!e.target.files.length || !libsLoaded) return;
                    this.file = e.target.files[0];
                    this.setLoading(true);
                    try {
                        const arrayBuffer = await this.file.arrayBuffer();
                        const pdf = await window.PDFLib.PDFDocument.load(arrayBuffer);
                        this.pageCount = pdf.getPageCount();
                        this.render();
                    } catch (err) { showMsg('split-msg', true, 'Failed reading PDF'); }
                    e.target.value = '';
                    this.setLoading(false);
                });
                document.getElementById('btn-process-split').addEventListener('click', () => this.process());
                document.getElementById('split-range-val').addEventListener('input', () => this.renderBtn());
            },
            reset() { this.file = null; this.pageCount = 0; this.mode = 'range'; document.getElementById('split-range-val').value = ''; this.render(); showMsg('split-msg', false, ''); },
            setMode(m) { this.mode = m; this.render(); },
            setLoading(isLoading) {
                const btn = document.getElementById('btn-process-split');
                if(isLoading) {
                    btn.disabled = true; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-preview text-dim cursor-not-allowed border border-theme";
                    btn.innerHTML = t('processing');
                } else this.renderBtn();
            },
            renderBtn() {
                const btn = document.getElementById('btn-process-split');
                const rangeVal = document.getElementById('split-range-val').value.trim();
                const btnText = this.mode === 'all' ? t('splitZip') : t('splitNow');
                
                if (this.mode === 'range' && !rangeVal) {
                    btn.disabled = true; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-preview text-dim cursor-not-allowed border border-theme";
                } else {
                    btn.disabled = false; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700";
                }
                btn.innerHTML = `<i data-lucide="split" class="w-4 h-4 mr-2"></i> ${btnText}`;
                lucide.createIcons();
            },
            render() {
                if (!this.file) {
                    document.getElementById('split-upload-box').classList.remove('hidden');
                    document.getElementById('split-active-box').classList.add('hidden');
                } else {
                    document.getElementById('split-upload-box').classList.add('hidden');
                    document.getElementById('split-active-box').classList.remove('hidden');
                    document.getElementById('split-filename').innerText = this.file.name;
                    document.getElementById('split-pagecount').innerText = this.pageCount;
                    
                    document.getElementById('split-mode-range').className = `p-4 border rounded-xl cursor-pointer transition-all ${this.mode === 'range' ? 'border-red-500 bg-red-500/5' : 'border-theme hover:border-red-300'}`;
                    document.getElementById('split-mode-all').className = `p-4 border rounded-xl cursor-pointer transition-all ${this.mode === 'all' ? 'border-red-500 bg-red-500/5' : 'border-theme hover:border-red-300'}`;
                    
                    document.getElementById('split-range-input-container').style.display = this.mode === 'range' ? 'block' : 'none';
                    this.renderBtn();
                }
            },
            async process() {
                if (!this.file || !libsLoaded) return;
                this.setLoading(true); showMsg('split-msg', false, '');
                try {
                    const arrayBuffer = await this.file.arrayBuffer();
                    const pdf = await window.PDFLib.PDFDocument.load(arrayBuffer);
                    if (this.mode === 'all') {
                        const zip = new window.JSZip();
                        for (let i = 0; i < this.pageCount; i++) {
                            const newPdf = await window.PDFLib.PDFDocument.create();
                            const [copiedPage] = await newPdf.copyPages(pdf, [i]);
                            newPdf.addPage(copiedPage);
                            zip.file(`Page_${i + 1}.pdf`, await newPdf.save());
                        }
                        handleDownload(await zip.generateAsync({ type: 'blob' }), `${this.file.name.replace('.pdf', '')}_Split.zip`, 'application/zip');
                    } else {
                        const rangeVal = document.getElementById('split-range-val').value;
                        let indices = new Set();
                        rangeVal.split(',').forEach(p => {
                            p = p.trim();
                            if (p.includes('-')) {
                                const [s, e] = p.split('-').map(n => parseInt(n.trim(), 10));
                                if (!isNaN(s) && !isNaN(e) && s > 0 && e <= this.pageCount && s <= e) for(let i=s; i<=e; i++) indices.add(i-1);
                            } else {
                                const n = parseInt(p, 10);
                                if (!isNaN(n) && n > 0 && n <= this.pageCount) indices.add(n-1);
                            }
                        });
                        const arr = Array.from(indices).sort((a,b) => a-b);
                        if (arr.length === 0) throw new Error("Invalid Range");
                        const newPdf = await window.PDFLib.PDFDocument.create();
                        const copied = await newPdf.copyPages(pdf, arr);
                        copied.forEach(p => newPdf.addPage(p));
                        handleDownload(await newPdf.save(), `Extracted_${this.file.name}`);
                    }
                    showMsg('split-msg', false, 'Success');
                } catch(err) { showMsg('split-msg', true, err.message || 'Error splitting PDF'); }
                this.setLoading(false);
            }
        };

        // ==========================================
        // 6. ARRANGE MODULE
        // ==========================================
        const ArrangeModule = {
            file: null, order: [], pdfRef: null, zoom: 3, dragSrc: null, dragDest: null, timer: null,
            init() {
                document.getElementById('arrange-input').addEventListener('change', async (e) => {
                    if (!e.target.files.length || !libsLoaded) return;
                    this.file = e.target.files[0];
                    this.setLoading(true);
                    try {
                        const arrBuf = await this.file.arrayBuffer();
                        const pdf = await window.PDFLib.PDFDocument.load(arrBuf);
                        const count = pdf.getPageCount();
                        this.pdfRef = await window.pdfjsLib.getDocument(URL.createObjectURL(this.file)).promise;
                        this.order = Array.from({length: count}, (_, i) => ({ orig: i, id: `p-${i}` }));
                        this.render();
                    } catch(err) { showMsg('arrange-msg', true, 'Failed reading'); }
                    e.target.value = ''; this.setLoading(false);
                });
                document.getElementById('btn-process-arrange').addEventListener('click', () => this.process());
                document.getElementById('arrange-zoom').addEventListener('input', (e) => {
                    this.zoom = parseInt(e.target.value);
                    this.updateGridClass();
                    clearTimeout(this.timer);
                    this.timer = setTimeout(() => this.renderCanvases(), 300);
                });
            },
            reset() { this.file = null; this.order = []; this.pdfRef = null; this.zoom = 3; document.getElementById('arrange-zoom').value = 3; this.render(); showMsg('arrange-msg', false, ''); },
            resetOrder() {
                if(!this.pdfRef) return;
                this.order = Array.from({length: this.pdfRef.numPages}, (_, i) => ({ orig: i, id: `p-${i}` }));
                this.render();
            },
            setLoading(isL) {
                const btn = document.getElementById('btn-process-arrange');
                if(isL) { btn.disabled=true; btn.innerHTML = t('processing'); btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-preview text-dim cursor-not-allowed border border-theme"; }
                else this.renderBtn();
            },
            renderBtn() {
                const btn = document.getElementById('btn-process-arrange');
                if(this.order.length === 0) {
                    btn.disabled = true; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-preview text-dim cursor-not-allowed border border-theme";
                } else {
                    btn.disabled = false; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700";
                }
                btn.innerHTML = `<i data-lucide="download" class="w-4 h-4 mr-2"></i> ${t('arrangeApply')}`;
                lucide.createIcons();
            },
            getGridClass(z) {
                switch(z) {
                    case 1: return 'grid-cols-6 sm:grid-cols-8 md:grid-cols-10 lg:grid-cols-12';
                    case 2: return 'grid-cols-5 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10';
                    case 3: return 'grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8';
                    case 4: return 'grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6';
                    case 5: return 'grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5';
                    case 6: return 'grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4';
                    case 7: return 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3'; 
                    case 8: return 'grid-cols-1 sm:grid-cols-1 md:grid-cols-2'; 
                    default: return 'grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8';
                }
            },
            updateGridClass() { document.getElementById('arrange-grid').className = `grid gap-3 mb-6 transition-all duration-300 ${this.getGridClass(this.zoom)}`; },
            handleDrag(e, idx, type) {
                if(type==='start') { this.dragSrc = idx; e.currentTarget.classList.add('dragging'); }
                if(type==='enter') { this.dragDest = idx; e.currentTarget.classList.add('drag-over'); }
                if(type==='leave') { e.currentTarget.classList.remove('drag-over'); }
                if(type==='end') {
                    e.currentTarget.classList.remove('dragging');
                    document.querySelectorAll('#arrange-grid > div').forEach(el => el.classList.remove('drag-over'));
                    if(this.dragSrc !== null && this.dragDest !== null && this.dragSrc !== this.dragDest) {
                        const item = this.order.splice(this.dragSrc, 1)[0];
                        this.order.splice(this.dragDest, 0, item);
                        this.render();
                    }
                    this.dragSrc = null; this.dragDest = null;
                }
            },
            remove(idx) { this.order.splice(idx, 1); this.render(); },
            render() {
                if (!this.file) {
                    document.getElementById('arrange-upload-box').classList.remove('hidden');
                    document.getElementById('arrange-active-box').classList.add('hidden');
                } else {
                    document.getElementById('arrange-upload-box').classList.add('hidden');
                    document.getElementById('arrange-active-box').classList.remove('hidden');
                    document.getElementById('arrange-filename').innerText = this.file.name;
                    this.updateGridClass();
                    
                    const grid = document.getElementById('arrange-grid');
                    grid.innerHTML = '';
                    this.order.forEach((page, idx) => {
                        const div = document.createElement('div');
                        div.draggable = true;
                        div.className = "relative group aspect-[1/1.4] bg-preview border-2 border-theme rounded-lg overflow-hidden flex flex-col items-center justify-center cursor-grab hover:border-red-400 hover:shadow-lg transition-all";
                        div.ondragstart = (e) => this.handleDrag(e, idx, 'start');
                        div.ondragenter = (e) => this.handleDrag(e, idx, 'enter');
                        div.ondragleave = (e) => this.handleDrag(e, idx, 'leave');
                        div.ondragend = (e) => this.handleDrag(e, idx, 'end');
                        div.ondragover = (e) => e.preventDefault();
                        
                        div.innerHTML = `
                            <button onclick="ArrangeModule.remove(${idx})" class="absolute top-1 right-1 z-10 bg-editor border border-theme text-red-500 rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 hover:text-white shadow-sm"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            <div class="absolute top-1 left-1 z-10 bg-black/60 text-white text-[9px] sm:text-[10px] px-1.5 py-0.5 rounded backdrop-blur-[2px] font-medium shadow-sm pointer-events-none">${t('original')} ${page.orig + 1}</div>
                            <canvas id="arr-cvs-${page.id}" class="w-full h-full object-contain pointer-events-none bg-white"></canvas>
                            <div class="absolute bottom-0 inset-x-0 bg-black/70 py-1 flex justify-center backdrop-blur-[2px]"><span class="text-[10px] sm:text-xs font-bold text-white text-center px-1 truncate">${t('page')} ${idx + 1}</span></div>
                        `;
                        grid.appendChild(div);
                    });
                    lucide.createIcons();
                    this.renderCanvases();
                    this.renderBtn();
                }
            },
            renderCanvases() {
                if(!this.pdfRef) return;
                this.order.forEach(page => {
                    const cvs = document.getElementById(`arr-cvs-${page.id}`);
                    if(cvs) renderCanvasPdf(this.pdfRef, page.orig, cvs, this.zoom);
                });
            },
            async process() {
                if(!this.file || this.order.length===0 || !libsLoaded) return;
                this.setLoading(true); showMsg('arrange-msg', false, '');
                try {
                    const arrBuf = await this.file.arrayBuffer();
                    const origPdf = await window.PDFLib.PDFDocument.load(arrBuf);
                    const newPdf = await window.PDFLib.PDFDocument.create();
                    const indices = this.order.map(i => i.orig);
                    const copied = await newPdf.copyPages(origPdf, indices);
                    copied.forEach(p => newPdf.addPage(p));
                    handleDownload(await newPdf.save(), `Arranged_${this.file.name}`);
                    showMsg('arrange-msg', false, 'Success');
                } catch(err) { showMsg('arrange-msg', true, 'Error'); }
                this.setLoading(false);
            }
        };

        // ==========================================
        // 7. ROTATE MODULE
        // ==========================================
        const RotateModule = {
            file: null, pages: [], pdfRef: null, zoom: 3, timer: null,
            init() {
                document.getElementById('rotate-input').addEventListener('change', async (e) => {

                else { btn.disabled=false; btn.innerHTML = `<i data-lucide="download" class="w-4 h-4 mr-2"></i> ${t('rotateApply')}`; btn.className="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700"; lucide.createIcons(); }
            },
            rotate(idx, dir) { this.pages.find(p=>p.orig===idx).delta = (this.pages.find(p=>p.orig===idx).delta + dir) % 360; this.renderCanvases(); },
            rotateAll(dir) { this.pages.forEach(p => p.delta = (p.delta + dir) % 360); this.renderCanvases(); },
            render() {
                if (!this.file) {
                    document.getElementById('rotate-upload-box').classList.remove('hidden');
                    document.getElementById('rotate-active-box').classList.add('hidden');
                } else {
                    document.getElementById('rotate-upload-box').classList.add('hidden');
                    document.getElementById('rotate-active-box').classList.remove('hidden');
                    document.getElementById('rotate-filename').innerText = this.file.name;
                    document.getElementById('rotate-grid').className = `grid gap-3 mb-6 transition-all duration-300 ${ArrangeModule.getGridClass(this.zoom)}`;
                    
                    const grid = document.getElementById('rotate-grid'); grid.innerHTML = '';

                        const pdf = await window.PDFLib.PDFDocument.load(await this.file.arrayBuffer());
                        const newPdf = await window.PDFLib.PDFDocument.create();
                        const copied = await newPdf.copyPages(pdf, pdf.getPageIndices());
                        copied.forEach(p => newPdf.addPage(p));
                        bytes = await newPdf.save({ useObjectStreams: true });
                    } else {
                        const newPdf = await window.PDFLib.PDFDocument.create();
                        const pdfJs = await window.pdfjsLib.getDocument(URL.createObjectURL(this.file)).promise;
