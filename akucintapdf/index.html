            },
            extractRdn(nameNode) {
                const attrs = [];
                if (nameNode && Array.isArray(nameNode.value)) {
                    nameNode.value.forEach(setNode => {
                        if (setNode && Array.isArray(setNode.value)) {
                            setNode.value.forEach(seqNode => {
                                if (seqNode && Array.isArray(seqNode.value) && seqNode.value.length === 2) {
                                    try {
                                        const oid = window.forge.asn1.derToOid(seqNode.value[0].value);
                                        const valueNode = seqNode.value[1];
                                        let valueStr = valueNode.value;
                                        if (valueStr) {
                                            try { valueStr = window.forge.util.decodeUtf8(valueStr); } 
                                            catch(e) { }
                                        }
                                        attrs.push({ oid: oid, name: OID_MAP[oid] || oid, value: valueStr });
                                    } catch(e) {}
                                }
                            });
                        }
                    });
                }
                return attrs;
            },
            parseAsn1Time(timeNode) {
                try {
                    if (timeNode.type === 23) return window.forge.asn1.utcTimeToDate(timeNode.value);
                    if (timeNode.type === 24) return window.forge.asn1.generalizedTimeToDate(timeNode.value);
                } catch(e) {}
                return new Date(0);
            },
            parseCertAsn1Manual(certAsn1) {
                try {
                    const tbsCert = certAsn1.value[0];
                    let issuer = [], subject = [], validFrom = '-', validTo = '-', serialNumber = '';
                    
                    let idx = 0;
                    if (tbsCert.value[idx].tagClass === 128 && tbsCert.value[idx].type === 0) idx++; 
                    
                    const serialNode = tbsCert.value[idx++];
                    if (serialNode && serialNode.type === 2) { 
                        serialNumber = window.forge.util.bytesToHex(serialNode.value).toUpperCase();
                    }
                    
                    idx++; // skip signature algorithm
                    
                    const issuerNode = tbsCert.value[idx++];
                    issuer = this.extractRdn(issuerNode);
                    
                    const validityNode = tbsCert.value[idx++];
                    if (validityNode && Array.isArray(validityNode.value) && validityNode.value.length >= 2) {
                        validFrom = this.parseAsn1Time(validityNode.value[0]);
                        validTo = this.parseAsn1Time(validityNode.value[1]);
                    }
                    
                    const subjectNode = tbsCert.value[idx++];
                    subject = this.extractRdn(subjectNode);
                    
                    return { subject, issuer, validFrom, validTo, serialNumber, rawCert: certAsn1 };
                } catch(e) {
                    console.error("Manual Cert Parsing Error", e);
                    return { subject: [], issuer: [], validFrom: '-', validTo: '-', serialNumber: 'UNKNOWN', rawCert: certAsn1 };
                }
            },
            getActualAsn1Size(buf) {
                let offset = 0;
                function readTag() {
                    if (offset >= buf.length) return null;
                    let tag = buf[offset++];
                    if ((tag & 0x1F) === 0x1F) {
                        while (offset < buf.length && (buf[offset++] & 0x80)) {}
                    }
                    return tag;
                }
                function readLength() {
                    if (offset >= buf.length) return 0;
                    let len = buf[offset++];
                    if (len === 0x80) return -1; 
                    if (len > 0x80) {
                        let numBytes = len & 0x7F;
                        len = 0;
                        for (let i = 0; i < numBytes; i++) {
                            if (offset >= buf.length) break;
                            len = (len << 8) | buf[offset++];
                        }
                    }
                    return len;
                }
                function walk() {
                    if (offset >= buf.length) return;
                    let tag = readTag();
                    if (tag === null) return;
                    let len = readLength();
                    if (len === -1) { 
                        while (offset < buf.length) {
                            if (buf[offset] === 0x00 && buf[offset+1] === 0x00) {
                                offset += 2; break;
                            }
                            walk();
                        }
                    } else { 
                        offset += len;
                    }
                }
                walk();
                return offset;
            },
            prepareAndValidatePayload(rawHex) {
                const logs = [];
                const cleanedForHex = rawHex.replace(/[^0-9a-fA-F]/g, '');
                logs.push(`Extracted ${cleanedForHex.length} hex chars.`);

                if (cleanedForHex.length % 2 !== 0) throw new Error("Payload rusak (panjang ganjil).");

                const binaryArray = new Uint8Array(cleanedForHex.length / 2);
                for (let i = 0; i < cleanedForHex.length; i += 2) {
                    binaryArray[i / 2] = parseInt(cleanedForHex.substring(i, i + 2), 16);
                }

                let asn1Size = binaryArray.length;
                try {
                    let calcSize = this.getActualAsn1Size(binaryArray);
                    if (calcSize > 0 && calcSize <= binaryArray.length) {
                        asn1Size = calcSize;
                        logs.push("Smart Slicer applied.");
                    }
                } catch (e) { logs.push("Smart Slicer error: " + e.message); }

                const finalBinaryArray = binaryArray.slice(0, asn1Size);
                if (finalBinaryArray.length === 0) throw new Error("Payload kosong.");

                const binaryStr = window.forge.util.createBuffer(finalBinaryArray).getBytes();
                return { binaryStr, logs };
            },
            rescueAsn1Data(asn1Obj) {
                const result = { certificates: [], messageDigests: [], signingTimes: [], hasTSA: false };
                const visited = new Set();
                function traverse(node) {
                    if (!node || typeof node !== 'object' || visited.has(node)) return;
                    visited.add(node);
                    
                    if (node.tagClass === 128 && node.type === 0 && Array.isArray(node.value)) {
                        for (let i = 0; i < node.value.length; i++) {
                            const child = node.value[i];
                            if (child && child.tagClass === 0 && child.type === 16 && Array.isArray(child.value) && child.value.length >= 2) {
                                if (child.value[0].tagClass === 0 && child.value[0].type === 16) result.certificates.push(child);
                            }
                        }
                    }
                    if (node.tagClass === 0 && node.type === 16 && Array.isArray(node.value)) {
                        const child0 = node.value[0];
                        if (child0 && child0.tagClass === 0 && child0.type === 6) {
                            try {
                                const oid = window.forge.asn1.derToOid(child0.value);
                                if (oid === '1.2.840.113549.1.9.4') {
                                    const child1 = node.value[1];
                                    if (child1 && child1.tagClass === 0 && child1.type === 17 && Array.isArray(child1.value)) {
                                        const hashNode = child1.value[0];
                                        if (hashNode && hashNode.tagClass === 0 && hashNode.type === 4) result.messageDigests.push(window.forge.util.bytesToHex(hashNode.value).toLowerCase());
                                    }
                                } else if (oid === '1.2.840.113549.1.9.5') {
                                    const child1 = node.value[1];
                                    if (child1 && child1.tagClass === 0 && child1.type === 17 && Array.isArray(child1.value)) {
                                        const timeNode = child1.value[0];
                                        if (timeNode && timeNode.tagClass === 0 && (timeNode.type === 23 || timeNode.type === 24)) {
                                            let dateObj;
                                            if (timeNode.type === 23) dateObj = window.forge.asn1.utcTimeToDate(timeNode.value);
                                            else dateObj = window.forge.asn1.generalizedTimeToDate(timeNode.value);
                                            result.signingTimes.push(dateObj.toISOString());
                                        }
                                    }
                                } else if (oid === '1.2.840.113549.1.9.16.2.14') {
                                    result.hasTSA = true;
                                }
                            } catch(e) {}
                        }
                    }
                    if (Array.isArray(node.value)) { for (let i = 0; i < node.value.length; i++) traverse(node.value[i]); }
                }
                traverse(asn1Obj);
                result.certificates = result.certificates.filter(cert => {
                    if (cert.value && cert.value.length > 0) {
                        const firstChild = cert.value[0];
                        if (firstChild.tagClass === 0 && firstChild.type === 16) return true; 
                    }
                    return false;
                });
                return result;
            },
            async extractSignatures(arrayBuffer) {
                const decoder = new TextDecoder('latin1');
                const pdfText = decoder.decode(arrayBuffer);
                const foundSignatures = [];
                const contentsTag = '/Contents';
                let searchIndex = 0;

                while ((searchIndex = pdfText.indexOf(contentsTag, searchIndex)) !== -1) {
                    const startBracketIndex = pdfText.indexOf('<', searchIndex);
                    if (startBracketIndex !== -1 && startBracketIndex - searchIndex < 50) {
                        const endBracketIndex = pdfText.indexOf('>', startBracketIndex);
                        if (endBracketIndex !== -1) {
                            const rawHex = pdfText.substring(startBracketIndex + 1, endBracketIndex);
                            if (rawHex.length > 500) {
                                let debugLogs = [];
                                
                                const contextStart = Math.max(0, startBracketIndex - 2000);
                                const contextEnd = Math.min(pdfText.length, endBracketIndex + 2000);
                                const contextStr = pdfText.substring(contextStart, contextEnd);
                                
                                let byteRange = null;
                                const brMatch = contextStr.match(/\/ByteRange\s*\[\s*(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s*\]/);
                                if (brMatch) byteRange = [parseInt(brMatch[1]), parseInt(brMatch[2]), parseInt(brMatch[3]), parseInt(brMatch[4])];

                                let forensicData = { byteRangeValid: null, algorithm: 'Unknown' };

                                try {
                                    const { binaryStr, logs } = this.prepareAndValidatePayload(rawHex);
                                    debugLogs = logs;

                                    const asn1Obj = window.forge.asn1.fromDer(binaryStr, false);
                                    let p7 = null;
                                    let certs = [];
                                    let expectedHashes = [];
                                    let signerInfos = [];

                                    try {
                                        p7 = window.forge.pkcs7.messageFromAsn1(asn1Obj);
                                        certs = (p7.certificates || []).map(cert => ({
                                            subject: mapAttributes(cert.subject.attributes),
                                            issuer: mapAttributes(cert.issuer.attributes),
                                            validFrom: cert.validity.notBefore.toString(),
                                            validTo: cert.validity.notAfter.toString()
                                        }));
                                        signerInfos = (p7.signerInfos || []);
                                        if(signerInfos.length > 0) {
                                            const attrs = signerInfos[0].authenticatedAttributes || [];
                                            attrs.forEach(a => {
                                                if(a.type === '1.2.840.113549.1.9.4' && Array.isArray(a.value)) {
                                                    expectedHashes.push(window.forge.util.bytesToHex(a.value[0].value).toLowerCase());
                                                }
                                            });
                                        }
                                        debugLogs.push("Standard parse success.");
                                    } catch (p7Err) {
                                        debugLogs.push("Standard parse failed. Deep search ASN.1...");
                                        const rescued = this.rescueAsn1Data(asn1Obj);
                                        if (rescued.certificates.length > 0) {
                                            certs = rescued.certificates.map(rawAsn1 => {
                                                const parsed = this.parseCertAsn1Manual(rawAsn1);
                                                return {
                                                    subject: parsed.subject,
                                                    issuer: parsed.issuer,
                                                    validFrom: parsed.validFrom,
                                                    validTo: parsed.validTo
                                                };
                                            });
                                            if (rescued.messageDigests.length > 0) expectedHashes.push(...rescued.messageDigests);
                                            
                                            // Mock signer info for display if signing time extracted
                                            if (rescued.signingTimes && rescued.signingTimes.length > 0) {
                                                signerInfos = [{ authAttrs: [{ type: '1.2.840.113549.1.9.5', value: rescued.signingTimes[0] }] }];
                                            }
                                        } else {
                                            throw new Error("Cannot parse CMS/PKCS7 structure.");
                                        }
                                    }

                                    // Verify Integrity ByteRange
                                    let decryptedSignatureHex = null;
                                    if (expectedHashes.length === 0 && p7 && p7.signerInfos && p7.signerInfos.length > 0 && p7.certificates && p7.certificates.length > 0) {
                                        try {
                                            const rawDecrypted = p7.certificates[0].publicKey.encrypt(p7.signerInfos[0].signature, 'NONE');
                                            decryptedSignatureHex = window.forge.util.bytesToHex(rawDecrypted).toLowerCase();
                                        } catch(e) {}
                                    }

                                    if (byteRange && (expectedHashes.length > 0 || decryptedSignatureHex)) {
                                        const view = new Uint8Array(arrayBuffer);
                                        if (byteRange[0]+byteRange[1] <= view.length && byteRange[2]+byteRange[3] <= view.length) {
                                            const part1 = view.slice(byteRange[0], byteRange[0] + byteRange[1]);
                                            const part2 = view.slice(byteRange[2], byteRange[2] + byteRange[3]);
                                            const combined = new Uint8Array(part1.length + part2.length);
                                            combined.set(part1, 0); combined.set(part2, part1.length);
                                            
                                            const hashBuf256 = await crypto.subtle.digest('SHA-256', combined);
                                            const computedHash256 = Array.from(new Uint8Array(hashBuf256)).map(b => b.toString(16).padStart(2, '0')).join('').toLowerCase();
                                            
                                            let isHashMatch = false;
                                            if (expectedHashes.length > 0) {
                                                isHashMatch = expectedHashes.some(h => computedHash256.includes(h) || h.includes(computedHash256));
                                            }
                                            if (!isHashMatch && decryptedSignatureHex) {
                                                isHashMatch = decryptedSignatureHex.endsWith(computedHash256);
                                            }
                                            forensicData.byteRangeValid = isHashMatch;
                                        }
                                    }

                                    foundSignatures.push({ id: foundSignatures.length + 1, debugLogs, certificates: certs, signerInfos, forensic: forensicData, error: null });
                                } catch (parseErr) {
                                    foundSignatures.push({ id: foundSignatures.length + 1, error: parseErr.message, debugLogs: [...debugLogs, `ERROR: ${parseErr.message}`], certificates: [] });
                                }
                            }
                        }
                    }
                    searchIndex += contentsTag.length;
                }
                return foundSignatures;
            },

            async scanPageForSignatureAndQR(pdf) {
                let bestPageNum = pdf.numPages; 
                let foundQrUrl = null;

                const scanCanvas = document.createElement('canvas');
                const scanCtx = scanCanvas.getContext('2d', { willReadFrequently: true });

                for (let i = pdf.numPages; i >= 1; i--) {
                    try {
                        const page = await pdf.getPage(i);
                        const annotations = await page.getAnnotations();
                        
                        if (window.jsQR) {
                            const viewport = page.getViewport({ scale: 2.0 });
                            scanCanvas.width = viewport.width;
                            scanCanvas.height = viewport.height;
                            
                            await page.render({ canvasContext: scanCtx, viewport }).promise;
                            const imageData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
                            
                            const code = window.jsQR(imageData.data, imageData.width, imageData.height, {
                                inversionAttempts: "dontInvert"
                            });
                            
                            if (code && code.data) {
                                foundQrUrl = code.data;
                                bestPageNum = i;
                                break; 
                            }
                        }

                        if (annotations.some(a => a.fieldType === 'Sig')) {
                            bestPageNum = i;
                        }
                    } catch (err) { console.warn(`Gagal memindai halaman ${i}:`, err); }
                }
                return { bestPageNum, foundQrUrl };
            },

            async processFile(file) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    
                    try {
                        this.signatures = await this.extractSignatures(arrayBuffer.slice(0));
                    } catch(e) { this.signatures = []; }

                    const objUrl = URL.createObjectURL(file);
                    const pdfJs = await window.pdfjsLib.getDocument(objUrl).promise;
                    this.pdfDocument = pdfJs;

                    const { bestPageNum, foundQrUrl } = await this.scanPageForSignatureAndQR(pdfJs);
                    this.targetPage = bestPageNum;
                    this.qrUrl = foundQrUrl;

                    this.render();
                    URL.revokeObjectURL(objUrl);
                } catch(e) {
                    showMsg('verify-msg', true, 'Gagal memproses dokumen forensik.');
                }
            },

            escapeHtml(str) {
                const div = document.createElement('div');
                div.appendChild(document.createTextNode(str));
                return div.innerHTML;
            },

            copyReport() {
                let report = `📄 ${t('shortReportTitle')}\n`;
                report += `File: ${this.file.name}\n`;
                report += `Status: ${this.signatures.length} ${t('statusFoundReport')}\n`;
                report += `=========================================\n\n`;

                this.signatures.forEach((sig, idx) => {
                    if (sig.error) {
                        report += `[${idx + 1}] ERROR: ${sig.error}\n`;
                        report += `-----------------------------------------\n\n`;
                        return;
                    }
                    const leafCert = sig.certificates.find(cert => {
                        const certCN = getAttrValue(cert.subject, 'Common Name', '2.5.4.3');
                        if (!certCN) return false;
                        return !sig.certificates.some(otherCert => otherCert !== cert && getAttrValue(otherCert.issuer, 'Common Name', '2.5.4.3') === certCN);
                    }) || sig.certificates[sig.certificates.length - 1];
                    
                    const signerName = getAttrValue(leafCert.subject, 'Common Name', '2.5.4.3') || t('unknownName');
                    const issuerName = getAttrValue(leafCert.issuer, 'Common Name', '2.5.4.3') || 'Unknown CA';
                    
                    let signingTime = null;
                    if (sig.signerInfos && sig.signerInfos.length > 0) {
                        const attr = sig.signerInfos[0].authAttrs?.find(a => a.oid === '1.2.840.113549.1.9.5' || a.type === '1.2.840.113549.1.9.5');
                        signingTime = attr ? attr.value : null;
                    }
                    if (!signingTime && sig.forensic && sig.forensic.dictionaryDate) {
                        signingTime = InfoModule.parsePdfDate(sig.forensic.dictionaryDate) + " (PDF Dict)";
                    }
                    signingTime = signingTime || t('noTime');

                    const isUtuh = sig.forensic?.byteRangeValid === true;
                    const isModif = sig.forensic?.byteRangeValid === false;
                    const integrityText = isUtuh ? "UTUH (Valid)" : (isModif ? "DIMODIFIKASI (Invalid)" : "Belum diverifikasi");

                    const issuerLower = issuerName.toLowerCase();
                    let trustLevel = "Unknown CA";
                    if (issuerLower.includes('bsre') || issuerLower.includes('badan siber') || issuerLower.includes('privy') || issuerLower.includes('peruri')) {
                        trustLevel = "Trusted CA";
                    }

                    report += `[${idx + 1}] ${signerName}\n`;
                    report += `    - Otoritas: ${issuerName} (${trustLevel})\n`;
                    report += `    - Integritas: ${integrityText}\n`;
                    report += `    - Waktu TTD: ${signingTime}\n\n`;
                });

                const temp = document.createElement('textarea');
                temp.value = report;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                showMsg('verify-msg', false, 'Laporan berhasil disalin ke clipboard!');
            },

            render() {
                if (!this.file) {
                    document.getElementById('verify-upload-box').classList.remove('hidden');
                    document.getElementById('verify-active-box').classList.add('hidden');
                } else {
                    document.getElementById('verify-upload-box').classList.add('hidden');
                    document.getElementById('verify-active-box').classList.remove('hidden');
                    document.getElementById('verify-filename').innerText = this.file.name;
                    document.getElementById('verify-filesize').innerText = formatBytes(this.file.size);
                    
                    const sigContainer = document.getElementById('verify-signatures-container');
                    const qrBanner = document.getElementById('verify-qr-banner');
                    const previewContainer = document.getElementById('verify-preview-container');
                    const successBanner = document.getElementById('verify-success-banner');

                    sigContainer.innerHTML = '';
                    qrBanner.innerHTML = '';
                    previewContainer.innerHTML = '';
                    successBanner.innerHTML = '';

                    const validSigs = this.signatures.filter(s => !s.error);
                    
                    if (validSigs.length > 0) {
                        successBanner.innerHTML = `
                            <div class="bg-emerald-600 rounded-lg px-4 py-3 flex items-center gap-3 text-white shadow-sm shrink-0 mb-4">
                                <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-100 shrink-0"></i>
                                <div>
                                    <h3 class="font-bold text-xs tracking-wide">${t('verifySuccess')}</h3>
                                    <p class="text-[10px] text-emerald-100 mt-0.5">${t('verifySuccessSub')}</p>
                                </div>
                            </div>
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="font-bold text-main text-sm">Daftar Tanda Tangan</h3>
                                <button onclick="VerifySignModule.copyReport()" class="text-xs bg-editor border border-theme px-3 py-1.5 rounded-lg shadow-sm hover:text-blue-500 font-medium flex items-center transition-colors">
                                    <i data-lucide="clipboard-copy" class="w-3.5 h-3.5 mr-1.5"></i> ${t('copyReport')}
                                </button>
                            </div>
                        `;

                        this.signatures.forEach((sig, idx) => {
                            if (sig.error) {
                                sigContainer.insertAdjacentHTML('beforeend', `
                                    <div class="bg-red-50 rounded-xl shadow-sm border border-red-200 overflow-hidden mb-4 p-4 text-red-600 text-xs">
                                        <i data-lucide="alert-circle" class="w-4 h-4 mb-2"></i>
                                        <b>Error Tanda Tangan ${idx + 1}:</b> ${sig.error}
                                    </div>
                                `);
                                return;
                            }

                            const leafCert = sig.certificates.find(cert => {
                                const certCN = getAttrValue(cert.subject, 'Common Name', '2.5.4.3');
                                if (!certCN) return false;
                                return !sig.certificates.some(otherCert => otherCert !== cert && getAttrValue(otherCert.issuer, 'Common Name', '2.5.4.3') === certCN);
                            }) || sig.certificates[sig.certificates.length - 1];
                            
                            const signerName = getAttrValue(leafCert.subject, 'Common Name', '2.5.4.3');
                            const signerOrg = getAttrValue(leafCert.subject, 'Organization', '2.5.4.10');
                            const signerNik = getAttrValue(leafCert.subject, 'Serial Number', '2.5.4.5');
                            const issuerName = getAttrValue(leafCert.issuer, 'Common Name', '2.5.4.3');
                            
                            const isUtuh = sig.forensic?.byteRangeValid === true;
                            const isModif = sig.forensic?.byteRangeValid === false;
                            const integrityText = isUtuh ? t('statusValid') : (isModif ? t('statusInvalid') : "Belum diverifikasi");
                            const integrityColor = isUtuh ? "text-emerald-600" : (isModif ? "text-red-600" : "text-slate-500");

                            const issuerLower = (issuerName || '').toLowerCase();
                            let trustBadge = `<span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[9px] font-bold">Unknown CA</span>`;
                            if (issuerLower.includes('bsre') || issuerLower.includes('badan siber') || issuerLower.includes('privy') || issuerLower.includes('peruri')) {
                                trustBadge = `<span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-[9px] font-bold border border-emerald-200">Trusted CA</span>`;
                            }

                            let logsHtml = sig.debugLogs.map(log => `<div class="mb-1">&gt; ${this.escapeHtml(log)}</div>`).join('');

                            sigContainer.insertAdjacentHTML('beforeend', `
                                <div class="bg-editor rounded-xl shadow-sm border border-theme overflow-hidden">
                                    <div class="bg-[var(--freeze-bg-even)] border-b border-theme p-4 sm:p-5">
                                        <p class="text-xs font-bold text-dim uppercase tracking-wider mb-1">
                                            ${t('signedByRev').replace('{idx}', idx + 1)}
                                        </p>
                                        <h3 class="text-xl font-bold text-main">${this.escapeHtml(signerName) || t('unknownName')}</h3>
                                        <div class="flex items-center gap-2 mt-2 text-sm text-dim font-medium">
                                            <i data-lucide="building" class="w-4 h-4 shrink-0"></i>
                                            <span class="line-clamp-2">${this.escapeHtml(signerOrg) || t('unknownOrg')}</span>
                                        </div>
                                    </div>
                                    <div class="p-4 sm:p-5 space-y-4">
                                        <div class="grid grid-cols-2 gap-3">
                                            <div class="bg-preview p-3 rounded-lg border border-theme">
                                                <p class="text-[9px] font-bold text-dim uppercase mb-1">${t('nik')}</p>
                                                <p class="text-xs font-bold text-main truncate" title="${this.escapeHtml(signerNik)}">${this.escapeHtml(signerNik) || '-'}</p>
                                            </div>
                                            <div class="bg-preview p-3 rounded-lg border border-theme">
                                                <p class="text-[9px] font-bold text-dim uppercase mb-1">${t('integrity')}</p>
                                                <p class="text-xs font-bold ${integrityColor} truncate">${integrityText}</p>
                                            </div>
                                        </div>
                                        
                                        <div class="bg-preview p-3 rounded-lg border border-theme">
                                            <p class="text-[9px] font-bold text-dim uppercase mb-1">${t('ca')}</p>
                                            <div class="flex items-center gap-2">
                                                <p class="text-xs font-bold text-main truncate">${this.escapeHtml(issuerName)}</p>
                                                ${trustBadge}
                                            </div>
                                        </div>

                                        <details class="group border border-theme rounded-xl overflow-hidden shadow-sm">
                                            <summary class="px-4 py-2.5 bg-[var(--freeze-bg-even)] text-[10px] font-bold text-dim cursor-pointer flex items-center justify-between hover:bg-[var(--freeze-hover)] list-none">
                                                <span class="flex items-center gap-2"><i data-lucide="terminal" class="w-3.5 h-3.5"></i> ${t('logsTitle')}</span>
                                            </summary>
                                            <div class="p-3 bg-[#0d1117] text-green-400 font-mono text-[9px] leading-relaxed max-h-32 overflow-y-auto border-t border-theme custom-scrollbar">
                                                ${logsHtml}
                                            </div>
                                        </details>
                                    </div>
                                </div>
                            `);
                        });
                    }

                    if (this.qrUrl) {
                        qrBanner.innerHTML = `
                            <div class="bg-indigo-500/10 border-b border-indigo-500/20 p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 shrink-0 z-10 shadow-sm">
                                <div class="flex items-start gap-3 overflow-hidden w-full">
                                    <div class="p-2.5 bg-indigo-500/20 rounded-lg shrink-0">
                                        <i data-lucide="qr-code" class="w-5 h-5 text-indigo-600"></i>
                                    </div>
                                    <div class="overflow-hidden flex-1">
                                        <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-wider mb-0.5">${t('qrDetected')}</p>
                                        <p class="text-sm font-bold text-main truncate" title="${this.qrUrl}">${this.escapeHtml(this.qrUrl)}</p>
                                    </div>
                                </div>
                                <a href="${this.qrUrl}" target="_blank" rel="noreferrer" class="shrink-0 w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2 transition-all shadow-sm focus:ring-2 focus:ring-indigo-500/20">
                                    ${t('openLink')} <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                            </div>
                        `;
                    }

                    if (this.pdfDocument) {
                        previewContainer.innerHTML = `
                            <div class="relative flex justify-center w-full">
                                <div class="absolute -left-2 sm:-left-6 top-4 bg-main text-[var(--editor-bg)] text-[10px] font-bold py-1 px-3 rounded-lg shadow-md z-10">
                                    ${t('hal')} ${this.targetPage}
                                </div>
                                <canvas id="verify-canvas-preview" class="shadow-xl border border-theme max-w-full h-auto bg-white rounded-md w-full"></canvas>
                            </div>
                        `;
                        const canvas = document.getElementById('verify-canvas-preview');
                        renderCanvasPdf(this.pdfDocument, this.targetPage - 1, canvas, 5); 
                    }

                    lucide.createIcons();
                }
            }
        };

        // ==========================================
        // 4. MERGE MODULE
        // ==========================================
        const MergeModule = {
            items: [], expandedId: null, dragSrcIndex: null, dragDestIndex: null,
            init() {
                document.getElementById('merge-input').addEventListener('change', async (e) => {
                    if (!e.target.files.length || !libsLoaded) return;
                    this.setLoading(true);
                    for (const file of Array.from(e.target.files)) {
                        if (file.type === 'application/pdf') {
                            try {
                                const objUrl = URL.createObjectURL(file);
                                const pdf = await window.pdfjsLib.getDocument(objUrl).promise;
                                const pageCount = pdf.numPages;
                                const page = await pdf.getPage(1);
                                const viewport = page.getViewport({ scale: 0.5 });
                                const canvas = document.createElement('canvas');
                                canvas.width = viewport.width; canvas.height = viewport.height;
                                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                                
                                const pages = Array.from({length: pageCount}, (_, i) => ({ index: i, included: true }));
                                this.items.push({ id: Math.random().toString(36).substr(2, 9), file, name: file.name, pageCount, coverUrl: canvas.toDataURL(), pages, pdfRef: pdf });
                            } catch(err) { console.error(err); }
                        }
                    }
                    e.target.value = '';
                    this.setLoading(false);
                    this.render();
                });
                document.getElementById('btn-process-merge').addEventListener('click', () => this.process());
            },
            reset() { this.items = []; this.expandedId = null; this.render(); showMsg('merge-msg', false, ''); },
            setLoading(isLoading) {
                const btn = document.getElementById('btn-process-merge');
                document.getElementById('merge-upload-label').innerText = isLoading ? t('processing') : t('uploadPrompt');
                document.getElementById('merge-input').disabled = isLoading;
                if(isLoading) {
                    btn.disabled = true; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-editor text-dim cursor-not-allowed border border-theme shadow-sm focus:ring-2 focus:ring-red-500/20";
                    btn.innerHTML = t('processing');
                } else {
                    this.renderBtn();
                }
            },
            renderBtn() {
                const btn = document.getElementById('btn-process-merge');
                if (this.items.length < 2) {
                    btn.disabled = true; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-editor text-dim cursor-not-allowed border border-theme shadow-sm focus:ring-2 focus:ring-red-500/20";
                } else {
                    btn.disabled = false; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700 shadow-sm focus:ring-2 focus:ring-red-500/20";
                }
                btn.innerHTML = `<i data-lucide="layers" class="w-4 h-4 mr-2"></i> ${t('mergeNow')}`;
                lucide.createIcons();
            },
            remove(index) { this.items.splice(index, 1); this.render(); },
            handleDragStart(e, index) { this.dragSrcIndex = index; e.currentTarget.classList.add('dragging'); },
            handleDragEnter(e, index) { this.dragDestIndex = index; e.currentTarget.classList.add('drag-over'); },
            handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); },
            handleDragEnd(e) {
                e.currentTarget.classList.remove('dragging');
                document.querySelectorAll('#merge-list > div').forEach(el => el.classList.remove('drag-over'));
                if (this.dragSrcIndex !== null && this.dragDestIndex !== null && this.dragSrcIndex !== this.dragDestIndex) {
                    const item = this.items.splice(this.dragSrcIndex, 1)[0];
                    this.items.splice(this.dragDestIndex, 0, item);
                    this.render();
                }
                this.dragSrcIndex = null; this.dragDestIndex = null;
            },
            expand(id) { 
                this.expandedId = id; 
                const item = this.items.find(i => i.id === id);
                document.getElementById('modal-merge-filename').innerText = item.name;
                document.getElementById('modal-merge').classList.remove('hidden');
                this.renderModalGrid();
            },
            closeModal() { document.getElementById('modal-merge').classList.add('hidden'); this.expandedId = null; this.render(); },
            togglePage(pageIdx) {
                const item = this.items.find(i => i.id === this.expandedId);
                const p = item.pages.find(x => x.index === pageIdx);
                p.included = !p.included;
                this.renderModalGrid();
            },
            selectAll(state) {
                const item = this.items.find(i => i.id === this.expandedId);
                item.pages.forEach(p => p.included = state);
                this.renderModalGrid();
            },
            renderModalGrid() {
                const item = this.items.find(i => i.id === this.expandedId);
                const grid = document.getElementById('modal-merge-grid');
                grid.innerHTML = '';
                item.pages.forEach(p => {
                    const div = document.createElement('div');
                    div.className = `relative cursor-pointer rounded-lg overflow-hidden border-4 transition-all bg-editor ${p.included ? 'border-red-500 shadow-md' : 'border-theme opacity-40 hover:opacity-70'}`;
                    div.onclick = () => this.togglePage(p.index);
                    const canvas = document.createElement('canvas'); canvas.className = "w-full h-auto block bg-white";
                    div.appendChild(canvas);
                    div.insertAdjacentHTML('beforeend', `<div class="absolute bottom-0 inset-x-0 bg-black/80 text-white text-xs font-bold text-center py-1.5">${t('page')} ${p.index + 1}</div>`);
                    if (p.included) div.insertAdjacentHTML('beforeend', `<div class="absolute top-1 right-1 bg-red-500 rounded-full p-0.5 text-white shadow-sm"><i data-lucide="check-circle-2" class="w-4 h-4"></i></div>`);
                    grid.appendChild(div);
                    renderCanvasPdf(item.pdfRef, p.index, canvas, 2);
                });
                lucide.createIcons();
            },
            render() {
                const container = document.getElementById('merge-list-container');
                const list = document.getElementById('merge-list');
                if (this.items.length === 0) { container.classList.add('hidden'); this.renderBtn(); return; }
                container.classList.remove('hidden');
                list.innerHTML = '';
                this.items.forEach((item, index) => {
                    const incCount = item.pages.filter(p => p.included).length;
                    const div = document.createElement('div');
                    div.draggable = true;
                    div.className = "group relative bg-editor shadow-sm border border-theme rounded-xl overflow-hidden hover:border-red-400 transition-all cursor-grab flex flex-col";
                    div.ondragstart = (e) => this.handleDragStart(e, index);
                    div.ondragenter = (e) => this.handleDragEnter(e, index);
                    div.ondragleave = (e) => this.handleDragLeave(e);
                    div.ondragend = (e) => this.handleDragEnd(e);
                    div.ondragover = (e) => e.preventDefault();
                    
                    div.innerHTML = `
                        <div class="relative aspect-[1/1.4] bg-white border-b border-theme">
                            <img src="${item.coverUrl}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-2">
                                <button onclick="MergeModule.expand('${item.id}')" class="bg-editor text-main text-xs px-3 py-1.5 rounded font-medium flex items-center shadow-sm hover:bg-preview"><i data-lucide="maximize-2" class="w-3 h-3 mr-1"></i> ${t('selectPages')}</button>
                                <button onclick="MergeModule.remove(${index})" class="bg-red-600 text-white text-xs px-3 py-1.5 rounded font-medium flex items-center shadow-sm hover:bg-red-700"><i data-lucide="trash-2" class="w-3 h-3 mr-1"></i> Remove</button>
                            </div>
                            ${incCount === 0 ? `<div class="absolute inset-0 bg-editor/80 flex items-center justify-center backdrop-blur-sm"><span class="bg-black text-white text-xs px-2 py-1 rounded font-bold">${t('skipped')}</span></div>` : ''}
                        </div>
                        <div class="p-2">
                            <div class="flex items-center mb-1"><i data-lucide="grip-vertical" class="w-3 h-3 text-dim mr-1 shrink-0"></i><h4 class="font-medium text-xs text-main truncate" title="${item.name}">${item.name}</h4></div>
                            <p class="text-[10px] text-dim text-center mt-1 font-medium">${incCount} / ${item.pageCount} ${t('pages')}</p>
                        </div>
                    `;
                    list.appendChild(div);
                });
                lucide.createIcons();
                this.renderBtn();
            },
            async process() {
                if (this.items.length < 2 || !libsLoaded) return;
                this.setLoading(true); showMsg('merge-msg', false, '');
                try {
                    const mergedPdf = await window.PDFLib.PDFDocument.create();
                    for (const item of this.items) {
                        const arrayBuffer = await item.file.arrayBuffer();
                        const pdf = await window.PDFLib.PDFDocument.load(arrayBuffer);
                        const indicesToInclude = item.pages.filter(p => p.included).map(p => p.index);
                        if (indicesToInclude.length > 0) {
                            const copiedPages = await mergedPdf.copyPages(pdf, indicesToInclude);
                            copiedPages.forEach(p => mergedPdf.addPage(p));
                        }
                    }
                    const pdfBytes = await mergedPdf.save();
                    handleDownload(pdfBytes, 'Merged_Document.pdf');
                    showMsg('merge-msg', false, 'Success Merge');
                } catch (err) { showMsg('merge-msg', true, "Failed to merge PDF."); console.error(err); }
                this.setLoading(false);
            }
        };

        // ==========================================
        // 5. SPLIT MODULE
        // ==========================================
        const SplitModule = {
            file: null, mode: 'range', pageCount: 0,
            init() {
                document.getElementById('split-input').addEventListener('change', async (e) => {
                    if (!e.target.files.length || !libsLoaded) return;
                    this.file = e.target.files[0];
                    this.setLoading(true);
                    try {
                        const arrayBuffer = await this.file.arrayBuffer();
                        const pdf = await window.PDFLib.PDFDocument.load(arrayBuffer);
                        this.pageCount = pdf.getPageCount();
                        this.render();
                    } catch (err) { showMsg('split-msg', true, 'Failed reading PDF'); }
                    e.target.value = '';
                    this.setLoading(false);
                });
                document.getElementById('btn-process-split').addEventListener('click', () => this.process());
                document.getElementById('split-range-val').addEventListener('input', () => this.renderBtn());
            },
            reset() { this.file = null; this.pageCount = 0; this.mode = 'range'; document.getElementById('split-range-val').value = ''; this.render(); showMsg('split-msg', false, ''); },
            setMode(m) { this.mode = m; this.render(); },
            setLoading(isLoading) {
                const btn = document.getElementById('btn-process-split');
                if(isLoading) {
                    btn.disabled = true; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-editor text-dim cursor-not-allowed border border-theme shadow-sm focus:ring-2 focus:ring-red-500/20";
                    btn.innerHTML = t('processing');
                } else this.renderBtn();
            },
            renderBtn() {
                const btn = document.getElementById('btn-process-split');
                const rangeVal = document.getElementById('split-range-val').value.trim();
                const btnText = this.mode === 'all' ? t('splitZip') : t('splitNow');
                
                if (this.mode === 'range' && !rangeVal) {
                    btn.disabled = true; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-editor text-dim cursor-not-allowed border border-theme shadow-sm focus:ring-2 focus:ring-red-500/20";
                } else {
                    btn.disabled = false; btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700 shadow-sm focus:ring-2 focus:ring-red-500/20";
                }
                btn.innerHTML = `<i data-lucide="split" class="w-4 h-4 mr-2"></i> ${btnText}`;
                lucide.createIcons();
            },
            render() {
                if (!this.file) {
                    document.getElementById('split-upload-box').classList.remove('hidden');
                    document.getElementById('split-active-box').classList.add('hidden');
                } else {
                    document.getElementById('split-upload-box').classList.add('hidden');
                    document.getElementById('split-active-box').classList.remove('hidden');
                    document.getElementById('split-filename').innerText = this.file.name;
                    document.getElementById('split-pagecount').innerText = this.pageCount;
                    
                    document.getElementById('split-mode-range').className = `p-4 border rounded-xl cursor-pointer transition-all shadow-sm ${this.mode === 'range' ? 'border-red-500 bg-red-500/5' : 'border-theme bg-editor hover:border-red-300'}`;
                    document.getElementById('split-mode-all').className = `p-4 border rounded-xl cursor-pointer transition-all shadow-sm ${this.mode === 'all' ? 'border-red-500 bg-red-500/5' : 'border-theme bg-editor hover:border-red-300'}`;
                    
                    document.getElementById('split-range-input-container').style.display = this.mode === 'range' ? 'block' : 'none';
                    this.renderBtn();
                }
            },
            async process() {
                if (!this.file || !libsLoaded) return;
                this.setLoading(true); showMsg('split-msg', false, '');
                try {
                    const arrayBuffer = await this.file.arrayBuffer();
                    const pdf = await window.PDFLib.PDFDocument.load(arrayBuffer);
                    if (this.mode === 'all') {
                        const zip = new window.JSZip();
                        for (let i = 0; i < this.pageCount; i++) {
                            const newPdf = await window.PDFLib.PDFDocument.create();
                            const [copiedPage] = await newPdf.copyPages(pdf, [i]);
                            newPdf.addPage(copiedPage);
                            zip.file(`Page_${i + 1}.pdf`, await newPdf.save());
                        }
                        handleDownload(await zip.generateAsync({ type: 'blob' }), `${this.file.name.replace('.pdf', '')}_Split.zip`, 'application/zip');
                    } else {
                        const rangeVal = document.getElementById('split-range-val').value;
                        let indices = new Set();
                        rangeVal.split(',').forEach(p => {
                            p = p.trim();
                            if (p.includes('-')) {
                                const [s, e] = p.split('-').map(n => parseInt(n.trim(), 10));
                                if (!isNaN(s) && !isNaN(e) && s > 0 && e <= this.pageCount && s <= e) for(let i=s; i<=e; i++) indices.add(i-1);
                            } else {
                                const n = parseInt(p, 10);
                                if (!isNaN(n) && n > 0 && n <= this.pageCount) indices.add(n-1);
                            }
                        });
                        const arr = Array.from(indices).sort((a,b) => a-b);
                        if (arr.length === 0) throw new Error("Invalid Range");
                        const newPdf = await window.PDFLib.PDFDocument.create();
                        const copied = await newPdf.copyPages(pdf, arr);
                        copied.forEach(p => newPdf.addPage(p));
                        handleDownload(await newPdf.save(), `Extracted_${this.file.name}`);
                    }
                    showMsg('split-msg', false, 'Success');
                } catch(err) { showMsg('split-msg', true, err.message || 'Error splitting PDF'); }
                this.setLoading(false);
            }
        };

        // ==========================================
        // 6. ARRANGE MODULE
        // ==========================================
        const ArrangeModule = {

            init() {
                document.getElementById('arrange-input').addEventListener('change', async (e) => {

            getGridClass(z) {
                switch(z) {

                    case 2: return 'grid-cols-5 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10';
                    case 3: return 'grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8';

                    case 5: return 'grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5';

                    case 7: return 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3';

            updateGridClass() { document.getElementById('arrange-grid').className = `grid gap-3 mb-6 transition-all duration-300 ${this.getGridClass(this.zoom)}`; },
            handleDrag(e, idx, type) {
                if(type==='start') { this.dragSrc = idx; e.currentTarget.classList.add('dragging'); }
                if(type==='enter') { this.dragDest = idx; e.currentTarget.classList.add('drag-over'); }
                if(type==='leave') { e.currentTarget.classList.remove('drag-over'); }
                if(type==='end') {
                    e.currentTarget.classList.remove('dragging');
                    document.querySelectorAll('#arrange-grid > div').forEach(el => el.classList.remove('drag-over'));
                    if(this.dragSrc !== null && this.dragDest !== null && this.dragSrc !== this.dragDest) {
                        const item = this.order.splice(this.dragSrc, 1)[0];
                        this.order.splice(this.dragDest, 0, item);
                        this.render();
                    }
                    this.dragSrc = null; this.dragDest = null;
                }
            },
            remove(idx) { this.order.splice(idx, 1); this.render(); },

                        div.innerHTML = `

                                    <button onclick="RotateModule.rotate(${p.orig}, 90)" class="bg-editor border border-theme text-main rounded-full p-2 hover:bg-slate-200 hover:text-red-500 shadow-md transition-colors"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
                                </div>

            renderCanvases() {
                if(!this.pdfRef) return;
                this.pages.forEach(p => {
                    const cvs = document.getElementById(`rot-cvs-${p.orig}`);
                    if(cvs) renderCanvasPdf(this.pdfRef, p.orig, cvs, this.zoom, p.delta);

                        }
                    });

        // ==========================================
        // 8. COMPRESS MODULE
        // ==========================================
        const CompressModule = {
            file: null, level: 'standar', res: null, url: '',
            config: {
                native: { type: 'native', expectedRatio: 0.85, title: 'c_native', desc: 'c_nativeD' },
                minimal: { type: 'raster', scale: 1.5, quality: 0.85, expectedRatio: 0.80, title: 'c_minimal', desc: 'c_minimalD' },
                standar: { type: 'raster', scale: 1.2, quality: 0.65, expectedRatio: 0.50, title: 'c_standar', desc: 'c_standarD' },
                max: { type: 'raster', scale: 0.9, quality: 0.50, expectedRatio: 0.30, title: 'c_max', desc: 'c_maxD' },
                ekstrim: { type: 'raster', scale: 0.6, quality: 0.30, expectedRatio: 0.15, title: 'c_ekstrim', desc: 'c_ekstrimD' }
            },
            init() {
                document.getElementById('compress-input').addEventListener('change', (e) => {

            },
            reset() { this.file=null; this.res=null; if(this.url) URL.revokeObjectURL(this.url); this.level='standar'; this.render(); showMsg('compress-msg', false, ''); },
            setLevel(k) { this.level = k; this.render(); },
            setLoading(isL) {
                const btn = document.getElementById('btn-process-compress');
                if(isL) { btn.disabled=true; btn.innerHTML = t('processing'); btn.className = "w-full mt-4 py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-editor text-dim cursor-not-allowed border border-theme shadow-sm focus:ring-2 focus:ring-red-500/20"; }
                else { btn.disabled=false; btn.innerHTML = `<i data-lucide="minimize" class="w-4 h-4 mr-2"></i> ${t('compressNow')}`; btn.className="w-full mt-4 py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700 shadow-sm focus:ring-2 focus:ring-red-500/20"; lucide.createIcons(); }
            },
            render() {
                if (!this.file) {
                    document.getElementById('compress-upload-box').classList.remove('hidden');
                    document.getElementById('compress-active-box').classList.add('hidden');
                } else {
                    document.getElementById('compress-upload-box').classList.add('hidden');
                    document.getElementById('compress-active-box').classList.remove('hidden');
                    document.getElementById('compress-filename').innerText = this.file.name;
                    document.getElementById('compress-filesize').innerText = formatBytes(this.file.size);
                    
                    if (!this.res) {
                        document.getElementById('compress-options-container').classList.remove('hidden');
                        document.getElementById('compress-result-container').classList.add('hidden');
                        const grid = document.getElementById('compress-grid'); grid.innerHTML = '';
                        Object.entries(this.config).forEach(([key, cfg]) => {
                            const isSel = this.level === key;
                            grid.insertAdjacentHTML('beforeend', `
                                <div onclick="CompressModule.setLevel('${key}')" class="p-4 border rounded-xl cursor-pointer transition-all flex flex-col justify-between h-full shadow-sm ${isSel ? 'border-red-500 bg-red-500/5 shadow-[0_0_0_1px_rgba(239,68,68,1)]' : 'border-theme hover:border-red-300 bg-editor'}">
                                    <div class="mb-3">
                                        <div class="flex items-center justify-between mb-2">
                                            <h4 class="font-bold text-sm ${isSel ? 'text-red-600' : 'text-main'}">${t(cfg.title)}</h4>
                                            <div class="w-4 h-4 rounded-full border shrink-0 flex items-center justify-center ${isSel ? 'border-red-500 bg-red-500' : 'border-theme'}">${isSel ? '<div class="w-1.5 h-1.5 bg-white rounded-full"></div>' : ''}</div>
                                        </div>
                                        <p class="text-[11px] leading-relaxed text-dim">${t(cfg.desc)}</p>
                                    </div>
                                    <div class="mt-auto pt-3 border-t border-theme border-opacity-50 flex justify-between items-center">
                                        <span class="text-[10px] font-medium text-dim">${t('estimated')}</span>

                        document.getElementById('compress-res-after').innerText = formatBytes(this.res.newS);
                        document.getElementById('compress-res-saving').innerText = Math.round((1 - (this.res.newS / this.res.orig)) * 100) + '%';
                        document.getElementById('compress-iframe').src = `${this.url}#toolbar=0&navpanes=0`;
                        document.getElementById('btn-download-compress').innerHTML = `<i data-lucide="download" class="w-4 h-4 mr-2"></i> Download PDF (${formatBytes(this.res.newS)})`;
                    }
                    lucide.createIcons();
                }
            },
            async process() {
                if(!this.file || !libsLoaded) return;
                this.setLoading(true); showMsg('compress-msg', false, '');
                try {
                    const cfg = this.config[this.level]; let bytes;
                    if(cfg.type === 'native') {
                        const pdf = await window.PDFLib.PDFDocument.load(await this.file.arrayBuffer());
                        const newPdf = await window.PDFLib.PDFDocument.create();
                        const copied = await newPdf.copyPages(pdf, pdf.getPageIndices());
                        copied.forEach(p => newPdf.addPage(p));
                        bytes = await newPdf.save({ useObjectStreams: true });
                    } else {
                        const newPdf = await window.PDFLib.PDFDocument.create();
                        const pdfJs = await window.pdfjsLib.getDocument(URL.createObjectURL(this.file)).promise;
                        for(let i=1; i<=pdfJs.numPages; i++) {
                            const page = await pdfJs.getPage(i);
                            const vp = page.getViewport({ scale: cfg.scale });
                            const cvs = document.createElement('canvas'); cvs.width=vp.width; cvs.height=vp.height;
                            await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp }).promise;
                            const imgData = cvs.toDataURL('image/jpeg', cfg.quality);
                            const imgObj = await newPdf.embedJpg(imgData);
                            const origVp = page.getViewport({ scale: 1 });
                            const np = newPdf.addPage([origVp.width, origVp.height]);
                            np.drawImage(imgObj, { x:0, y:0, width:origVp.width, height:origVp.height });
                        }
                        bytes = await newPdf.save();
                    }
                    const blob = new Blob([bytes], {type:'application/pdf'});
                    this.url = URL.createObjectURL(blob);
                    this.res = { orig: this.file.size, newS: blob.size, blob };
                    this.render();
                } catch(err) { showMsg('compress-msg', true, 'Error'); console.error(err); this.setLoading(false); }
            }
        };

                showMsg('imgtopdf-msg', false, '');
            },
            setLoading(isL) {
                const btn = document.getElementById('btn-process-imgtopdf');

                }
            },
            renderBtn() {
                const btn = document.getElementById('btn-process-imgtopdf');
                if(this.items.length === 0) {

                } else {
                    btn.disabled = false; 
                    btn.className = "w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700 shadow-sm focus:ring-2 focus:ring-red-500/20";
                }
                btn.innerHTML = `<i data-lucide="download" class="w-4 h-4 mr-2"></i> ${t('createPdfNow')}`;
                lucide.createIcons();
            },
            handleDrag(e, idx, type) {
                if(type==='start') { this.dragSrc = idx; e.currentTarget.classList.add('dragging'); }
                if(type==='enter') { this.dragDest = idx; e.currentTarget.classList.add('drag-over'); }
                if(type==='leave') { e.currentTarget.classList.remove('drag-over'); }
                if(type==='end') {
                    e.currentTarget.classList.remove('dragging');
                    document.querySelectorAll('#imgtopdf-grid > div').forEach(el => el.classList.remove('drag-over'));
                    if(this.dragSrc !== null && this.dragDest !== null && this.dragSrc !== this.dragDest) {
                        const item = this.items.splice(this.dragSrc, 1)[0];
                        this.items.splice(this.dragDest, 0, item);
                        this.render();
                    }
                    this.dragSrc = null; this.dragDest = null;
                }
            },
            remove(idx) {
                URL.revokeObjectURL(this.items[idx].url);
                this.items.splice(idx, 1);
                this.render();
            },
            render() {
                if (this.items.length === 0) {
                    document.getElementById('imgtopdf-upload-box').classList.remove('hidden');
                    document.getElementById('imgtopdf-active-box').classList.add('hidden');
                } else {
                    document.getElementById('imgtopdf-upload-box').classList.add('hidden');
                    document.getElementById('imgtopdf-active-box').classList.remove('hidden');
                    document.getElementById('imgtopdf-count').innerText = `Total: ${this.items.length} Gambar`;
                    
                    const grid = document.getElementById('imgtopdf-grid');
                    grid.innerHTML = '';
                    this.items.forEach((item, idx) => {
                        const div = document.createElement('div');
                        div.draggable = true;
                        div.className = "relative group aspect-[1/1.4] bg-editor shadow-sm border border-theme rounded-lg overflow-hidden flex flex-col items-center justify-center cursor-grab hover:border-red-400 hover:shadow-md transition-all p-1";
                        div.ondragstart = (e) => this.handleDrag(e, idx, 'start');
                        div.ondragenter = (e) => this.handleDrag(e, idx, 'enter');
                        div.ondragleave = (e) => this.handleDrag(e, idx, 'leave');
                        div.ondragend = (e) => this.handleDrag(e, idx, 'end');
                        div.ondragover = (e) => e.preventDefault();
                        
                        div.innerHTML = `
                            <button onclick="ImgToPdfModule.remove(${idx})" class="absolute top-1 right-1 z-10 bg-editor border border-theme text-red-500 rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 hover:text-white shadow-sm"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            <img src="${item.url}" class="w-full h-full object-cover rounded-sm pointer-events-none">
                            <div class="absolute bottom-0 inset-x-0 bg-black/70 py-1 flex justify-center backdrop-blur-[2px]"><span class="text-[10px] font-bold text-white text-center px-1 truncate">${idx + 1}</span></div>
                        `;
                        grid.appendChild(div);
                    });
                    lucide.createIcons();
                    this.renderBtn();
                }
            },
            async process() {
                if(this.items.length === 0 || !libsLoaded) return;
                this.setLoading(true); showMsg('imgtopdf-msg', false, '');
                try {
                    const pdfDoc = await window.PDFLib.PDFDocument.create();
                    
                    for (const item of this.items) {
                        const imgBytes = await item.file.arrayBuffer();
                        let pdfImage;
                        
                        if (item.file.type === 'image/jpeg' || item.file.type === 'image/jpg') {
                            pdfImage = await pdfDoc.embedJpg(imgBytes);
                        } else if (item.file.type === 'image/png') {
                            pdfImage = await pdfDoc.embedPng(imgBytes);
                        } else {
                            continue;
                        }
                        
                        const imgDims = pdfImage.scale(1);
                        const page = pdfDoc.addPage([imgDims.width, imgDims.height]);
                        page.drawImage(pdfImage, {
                            x: 0, y: 0, width: imgDims.width, height: imgDims.height
                        });
                    }
                    
                    const pdfBytes = await pdfDoc.save();
                    handleDownload(pdfBytes, 'Images_to_PDF.pdf');
                    showMsg('imgtopdf-msg', false, 'Success');
                } catch(err) { 
                    showMsg('imgtopdf-msg', true, 'Error processing images to PDF'); 
                }
                this.setLoading(false);
            }
        };

            },
            init() {
                document.getElementById('reformat-input').addEventListener('change', async (e) => {
                    if(e.target.files.length && libsLoaded) {
                        this.file = e.target.files[0]; this.setLoading(true);

            reset() { this.file=null; this.origSize=''; this.pdfRef=null; this.render(); showMsg('reformat-msg', false, ''); },
            setT(t) { this.target = t; this.render(); },
            setLoading(isL) {
                const btn = document.getElementById('btn-process-reformat');
                if(isL) { btn.disabled=true; btn.innerHTML=t('processing'); btn.className="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-editor text-dim cursor-not-allowed border border-theme shadow-sm focus:ring-2 focus:ring-red-500/20"; }
                else { btn.disabled=false; btn.className="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700 shadow-sm focus:ring-2 focus:ring-red-500/20"; btn.innerHTML = `<i data-lucide="frame" class="w-4 h-4 mr-2"></i> ${t('reformatNow')}`; lucide.createIcons(); }
            },
            render() {
                if(!this.file) { document.getElementById('reformat-upload-box').classList.remove('hidden'); document.getElementById('reformat-active-box').classList.add('hidden'); }
                else {
                    document.getElementById('reformat-upload-box').classList.add('hidden'); document.getElementById('reformat-active-box').classList.remove('hidden');
                    document.getElementById('reformat-filename').innerText = this.file.name;
                    document.getElementById('reformat-detected').innerText = this.origSize;
                    
                    const grid = document.getElementById('reformat-grid'); grid.innerHTML='';
                    Object.entries(this.config).forEach(([key, cfg]) => {
                        const isSel = this.target === key;
                        grid.insertAdjacentHTML('beforeend', `
                            <div onclick="ReformatModule.setT('${key}')" class="p-3 border rounded-xl cursor-pointer transition-all flex flex-col justify-center text-center h-full shadow-sm ${isSel ? 'border-red-500 bg-red-500/5 shadow-[0_0_0_1px_rgba(239,68,68,1)]' : 'border-theme hover:border-red-300 bg-editor'}">
                                <h4 class="font-bold text-sm mb-0.5 ${isSel ? 'text-red-600' : 'text-main'}">${cfg.l}</h4>
                                <p class="text-[10px] text-dim">${cfg.d}</p>
                            </div>
                        `);
                    });
                    
                    // Preview Aspect Ratio Update
                    const cfg = this.config[this.target];
                    const tW = this.isL ? Math.max(cfg.w, cfg.h) : Math.min(cfg.w, cfg.h);
                    const tH = this.isL ? Math.min(cfg.w, cfg.h) : Math.max(cfg.w, cfg.h);
                    document.getElementById('reformat-preview-container').style.aspectRatio = tW / tH;
                    if(this.pdfRef) renderCanvasPdf(this.pdfRef, 0, document.getElementById('reformat-canvas'), 2);
                    this.setLoading(false);
                }
            },
            async process() {
                if(!this.file || !libsLoaded) return;
                this.setLoading(true); showMsg('reformat-msg', false, '');
                try {
                    const origPdf = await window.PDFLib.PDFDocument.load(await this.file.arrayBuffer());
                    const newPdf = await window.PDFLib.PDFDocument.create();
                    const cfg = this.config[this.target];
                    
                    for(const i of origPdf.getPageIndices()) {
                        const origP = origPdf.getPage(i);
                        const {width: oW, height: oH} = origP.getSize();
                        const isL = oW > oH;
                        const tW = isL ? Math.max(cfg.w, cfg.h) : Math.min(cfg.w, cfg.h);
                        const tH = isL ? Math.min(cfg.w, cfg.h) : Math.max(cfg.w, cfg.h);
                        const scale = Math.min(tW/oW, tH/oH);
                        
                        const ePage = await newPdf.embedPage(origP);
                        const nP = newPdf.addPage([tW, tH]);
                        nP.drawPage(ePage, { x: (tW - oW*scale)/2, y: (tH - oH*scale)/2, xScale: scale, yScale: scale });
                    }
                    handleDownload(await newPdf.save(), `${this.file.name.replace('.pdf','')}_${this.target}.pdf`);
                    showMsg('reformat-msg', false, 'Success');
                } catch(err) { showMsg('reformat-msg', true, 'Error'); }
                this.setLoading(false);
            }
        };

                        });
                    });
