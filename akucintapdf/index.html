                    showMsg('ocr-msg', false, 'Success');
                } catch(err) { showMsg('ocr-msg', true, 'OCR Error: ' + err.message); }
                this.setLoading(false);
            },
            copyText() {
                const ta = document.getElementById('ocr-textarea');
                ta.select(); document.execCommand('copy');
            }
        };

        // ==========================================
        // 13. EXTRACT URL MODULE
        // ==========================================
        const UrlModule = {
            file: null, pdfRef: null,
            init() {
                document.getElementById('url-input').addEventListener('change', async (e) => {
                    if(!e.target.files.length || !libsLoaded) return;
                    this.file = e.target.files[0]; this.setLoading(true);
                    try {
                        this.pdfRef = await window.pdfjsLib.getDocument(URL.createObjectURL(this.file)).promise;
                        this.render();
                    } catch(err) { showMsg('url-msg', true, 'Error load PDF'); }
                    e.target.value=''; this.setLoading(false);
                });
                document.getElementById('btn-process-url').addEventListener('click', () => this.process());
            },
            reset() { this.file=null; this.pdfRef=null; document.getElementById('url-result-box').classList.add('hidden'); showMsg('url-msg', false, ''); this.render(); },
            setLoading(isL) {
                const btn = document.getElementById('btn-process-url');
                if(isL) { btn.disabled=true; btn.innerHTML=t('processing'); btn.className="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-editor text-dim cursor-not-allowed border border-theme shadow-sm focus:ring-2 focus:ring-red-500/20"; }
                else { btn.disabled=false; btn.className="w-full py-3 rounded-lg font-bold text-sm flex justify-center items-center transition-all bg-red-600 text-white hover:bg-red-700 shadow-sm focus:ring-2 focus:ring-red-500/20"; btn.innerHTML = `<i data-lucide="search" class="w-4 h-4 mr-2"></i> ${t('url_extractBtn')}`; lucide.createIcons(); }
            },
            render() {
                if(!this.file) { document.getElementById('url-upload-box').classList.remove('hidden'); document.getElementById('url-active-box').classList.add('hidden'); }
                else {
                    document.getElementById('url-upload-box').classList.add('hidden'); document.getElementById('url-active-box').classList.remove('hidden');
                    document.getElementById('url-filename').innerText = this.file.name;
                    document.getElementById('url-filesize').innerText = formatBytes(this.file.size);
                    this.setLoading(false);
                }
            },
            async process() {
                if(!this.file || !this.pdfRef) return;
                this.setLoading(true); showMsg('url-msg', false, '');
                try {
                    const urls = new Set();
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    
                    for(let i=1; i<=this.pdfRef.numPages; i++) {
                        const page = await this.pdfRef.getPage(i);
                        const annots = await page.getAnnotations();
                        annots.forEach(a => { if(a.url) urls.add(a.url); });
                        
                        const textContent = await page.getTextContent();
                        const rawText = textContent.items.map(it => it.str).join(' ');
                        const matches = rawText.match(urlRegex);
                        if(matches) matches.forEach(m => urls.add(m));
                    }
                    
                    const arr = Array.from(urls);
                    const ul = document.getElementById('url-list');
                    ul.innerHTML = '';
                    if(arr.length === 0) {
                        ul.innerHTML = `<li class="text-dim">${t('url_empty')}</li>`;
                    } else {
                        arr.forEach(u => {
                            ul.insertAdjacentHTML('beforeend', `<li class="break-all border-b border-theme pb-2"><a href="${u}" target="_blank" class="text-blue-500 hover:underline">${u}</a></li>`);
                        });
                    }
                    document.getElementById('url-count').innerText = arr.length;
                    document.getElementById('url-result-box').classList.remove('hidden');
                } catch(err) { showMsg('url-msg', true, 'Error extracting URLs'); }
                this.setLoading(false);
            },
            copyAll() {
                const items = document.querySelectorAll('#url-list a');
                const text = Array.from(items).map(a => a.href).join('\n');
                const temp = document.createElement('textarea'); temp.value = text;
                document.body.appendChild(temp); temp.select(); document.execCommand('copy'); document.body.removeChild(temp);
            }
        };

        // ==========================================
        // 14. NEW: UNLOCK MODULE
        // ==========================================
        const UnlockModule = {
            file: null,
            init() {
                document.getElementById('unlock-input').addEventListener('change', (e) => {
                    if(!e.target.files.length || !libsLoaded) return;
                    this.file = e.target.files[0];
                    this.render();
                    e.target.value = '';
                });
                document.getElementById('btn-process-unlock').addEventListener('click', () => this.process());
            },
            reset() {
                this.file = null;
                document.getElementById('unlock-password').value = '';
                showMsg('unlock-msg', false, '');
                this.render();
            },
            render() {
                if(!this.file) {
                    document.getElementById('unlock-upload-box').classList.remove('hidden');
                    document.getElementById('unlock-active-box').classList.add('hidden');
                } else {
                    document.getElementById('unlock-upload-box').classList.add('hidden');
                    document.getElementById('unlock-active-box').classList.remove('hidden');
                    document.getElementById('unlock-filename').innerText = this.file.name;
                }
            },
            async process() {
                if(!this.file || !libsLoaded) return;
                const pass = document.getElementById('unlock-password').value;
                if(!pass) return showMsg('unlock-msg', true, 'Kata sandi tidak boleh kosong.');
                
                const btn = document.getElementById('btn-process-unlock');
                btn.disabled = true; btn.innerHTML = t('processing');
                showMsg('unlock-msg', false, 'Membuka kunci & memproses ulang dokumen secara visual (Print-to-PDF)...');

                try {
                    const arrayBuffer = await this.file.arrayBuffer();
                    
                    // Gunakan pdf.js yang MENDUKUNG password untuk membongkar PDF
                    const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer, password: pass });
                    const pdfJs = await loadingTask.promise;
                    
                    const newPdf = await window.PDFLib.PDFDocument.create();
                    
                    for(let i=1; i<=pdfJs.numPages; i++) {
                        const page = await pdfJs.getPage(i);
                        const vp = page.getViewport({ scale: 2.0 }); 
                        const cvs = document.createElement('canvas');
                        cvs.width = vp.width; cvs.height = vp.height;
                        await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp }).promise;
                        
                        const imgData = cvs.toDataURL('image/jpeg', 0.95);
                        const imgObj = await newPdf.embedJpg(imgData);
                        const newPage = newPdf.addPage([vp.width, vp.height]);
                        newPage.drawImage(imgObj, { x: 0, y: 0, width: vp.width, height: vp.height });
                    }

                    const pdfBytes = await newPdf.save();
                    handleDownload(pdfBytes, `${this.file.name.replace('.pdf', '')}_Unlocked.pdf`);
                    showMsg('unlock-msg', false, 'Kunci berhasil dibuka! Dokumen disimpan ulang sebagai Visual PDF.');
                } catch (err) {
                    let errorMsg = err.message;
                    if (err.name === 'PasswordException') errorMsg = 'Kata sandi yang Anda masukkan SALAH.';
                    showMsg('unlock-msg', true, t('unlockErr') + '<br>' + errorMsg);
                }
                
                btn.disabled = false; btn.innerHTML = `<i data-lucide="unlock" class="w-4 h-4 mr-2"></i> ${t('unlockBtn')}`;
                lucide.createIcons();
            }
        };

        // ==========================================
        // 15. NEW: ENCRYPT MODULE (WASM REQUIRED - SHOWS ERROR)
        // ==========================================
        const EncryptModule = {
            file: null,
            init() {
                document.getElementById('encrypt-input').addEventListener('change', (e) => {
                    if(!e.target.files.length) return;
                    this.file = e.target.files[0];
                    this.render();
                    e.target.value = '';
                });
                document.getElementById('btn-process-encrypt').addEventListener('click', () => this.process());
            },
            reset() { this.file = null; document.getElementById('encrypt-password').value = ''; showMsg('encrypt-msg', false, ''); this.render(); },
            render() {
                if(!this.file) { document.getElementById('encrypt-upload-box').classList.remove('hidden'); document.getElementById('encrypt-active-box').classList.add('hidden'); }
                else { document.getElementById('encrypt-upload-box').classList.add('hidden'); document.getElementById('encrypt-active-box').classList.remove('hidden'); document.getElementById('encrypt-filename').innerText = this.file.name; }
            },
            async process() {
                if(!this.file) return;
                const pass = document.getElementById('encrypt-password').value;
                if(!pass) { showMsg('encrypt-msg', true, 'Kata sandi tidak boleh kosong.'); return; }
                
                showMsg('encrypt-msg', true, `
                    <div class="text-left">
                        <b class="text-sm">Peringatan Keterbatasan Browser Sandbox:</b><br><br>
                        Sayang sekali, library <i>qpdf-wasm</i> yang dihasilkan oleh AI Research sebelumnya terbukti <b>berhalusinasi</b> dan tidak tersedia di CDN publik (memicu error 404 pada Console Anda).<br><br>
                        JavaScript murni <b>TIDAK MAMPU</b> mengenkripsi PDF ke standar AES-256 tanpa modul C++ WebAssembly. Fitur ini sengaja di-sandbox untuk mencegah tabrakan sistem (crash).
                    </div>
                `);
            }
        };

        // ==========================================
        // 16. NEW: FLATTEN MODULE
        // ==========================================
        const FlattenModule = {
            file: null,
            init() {
                document.getElementById('flatten-input').addEventListener('change', (e) => {
                    if(!e.target.files.length || !libsLoaded) return;
                    this.file = e.target.files[0];
                    this.render();
                    e.target.value = '';
                });
                document.getElementById('btn-process-flatten').addEventListener('click', () => this.process());
            },
            reset() { this.file = null; showMsg('flatten-msg', false, ''); this.render(); },
            render() {
                if(!this.file) { document.getElementById('flatten-upload-box').classList.remove('hidden'); document.getElementById('flatten-active-box').classList.add('hidden'); }
                else { document.getElementById('flatten-upload-box').classList.add('hidden'); document.getElementById('flatten-active-box').classList.remove('hidden'); document.getElementById('flatten-filename').innerText = this.file.name; }
            },
            async process() {
                if(!this.file || !libsLoaded) return;
                const btn = document.getElementById('btn-process-flatten');
                btn.disabled = true; btn.innerHTML = t('processing'); showMsg('flatten-msg', false, '');

                try {
                    const arrayBuffer = await this.file.arrayBuffer();
                    const pdfDoc = await window.PDFLib.PDFDocument.load(arrayBuffer);
                    
                    // 1. Flatten Interactive Forms
                    const form = pdfDoc.getForm();
                    if(form) {
                        try { form.flatten(); } catch(e) {}
                    }

                    // 2. Remove all remaining annotations (Links, Highlights, Comments) to truly "Flatten"
                    const pages = pdfDoc.getPages();
                    pages.forEach(page => {
                        page.node.delete(window.PDFLib.PDFName.of('Annots'));
                    });
                    
                    const pdfBytes = await pdfDoc.save();
                    handleDownload(pdfBytes, `${this.file.name.replace('.pdf', '')}_Flattened.pdf`);
                    showMsg('flatten-msg', false, 'PDF berhasil diflatten (Form & Anotasi dihapus/dijadikan statis).');
                } catch (err) {
                    showMsg('flatten-msg', true, 'Gagal menstruktur ulang: ' + err.message);
                }
                
                btn.disabled = false; btn.innerHTML = `<i data-lucide="file-output" class="w-4 h-4 mr-2"></i> ${t('flattenBtn')}`;
                lucide.createIcons();
            }
        };

        // ==========================================
        // 17. NEW: REPAIR MODULE (HYBRID BEST EFFORT)
        // ==========================================
        const RepairModule = {
            file: null,
            init() {
                document.getElementById('repair-input').addEventListener('change', (e) => {
                    if(!e.target.files.length || !libsLoaded) return;
                    this.file = e.target.files[0];
                    this.render();
                    e.target.value = '';
                });
                document.getElementById('btn-process-repair').addEventListener('click', () => this.process());
            },
            reset() { this.file = null; showMsg('repair-msg', false, ''); this.render(); },
            render() {
                if(!this.file) { 
                    document.getElementById('repair-upload-box').classList.remove('hidden'); 
                    document.getElementById('repair-active-box').classList.add('hidden'); 
                } else { 
                    document.getElementById('repair-upload-box').classList.add('hidden'); 
                    document.getElementById('repair-active-box').classList.remove('hidden'); 
                    document.getElementById('repair-filename').innerText = this.file.name; 
                }
            },
            async process() {
                if(!this.file || !libsLoaded) return;
                const btn = document.getElementById('btn-process-repair');
                btn.disabled = true; btn.innerHTML = t('processing'); showMsg('repair-msg', false, '');

                try {
                    const arrayBuffer = await this.file.arrayBuffer();
                    let success = false;
                    
                    // ATTEMPT 1: Logical Repair using PDF-LIB (Ignores broken encryption/structures)
                    try {
                        const origPdf = await window.PDFLib.PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                        const newPdf = await window.PDFLib.PDFDocument.create();
                        const copiedPages = await newPdf.copyPages(origPdf, origPdf.getPageIndices());
                        copiedPages.forEach(p => newPdf.addPage(p));
                        const pdfBytes = await newPdf.save();
                        handleDownload(pdfBytes, `${this.file.name.replace('.pdf', '')}_Repaired.pdf`);
                        success = true;
                    } catch(e1) {
                        console.warn("Logical Repair Failed, Attempting Visual Recovery...");
                    }

                    // ATTEMPT 2: Visual Recovery using PDF.JS + Canvas (Best Effort Fallback)
                    if(!success && window.pdfjsLib) {
                        try {
                            const pdfJs = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                            const newPdf = await window.PDFLib.PDFDocument.create();
                            
                            for(let i=1; i<=pdfJs.numPages; i++) {
                                const page = await pdfJs.getPage(i);
                                const vp = page.getViewport({ scale: 1.5 }); // High-res recovery
                                const cvs = document.createElement('canvas');
                                cvs.width = vp.width; cvs.height = vp.height;
                                await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp }).promise;
                                
                                const imgData = cvs.toDataURL('image/jpeg', 0.9);
                                const imgObj = await newPdf.embedJpg(imgData);
                                const newPage = newPdf.addPage([vp.width, vp.height]);
                                newPage.drawImage(imgObj, { x: 0, y: 0, width: vp.width, height: vp.height });
                            }
                            
                            const pdfBytes = await newPdf.save();
                            handleDownload(pdfBytes, `${this.file.name.replace('.pdf', '')}_Recovered.pdf`);
                            success = true;
                        } catch(e2) {
                            throw new Error("Tingkat kerusakan dokumen terlalu parah. (Bahkan PDF.js gagal merender visualnya).");
                        }
                    }
                    
                    if (success) showMsg('repair-msg', false, 'Dokumen berhasil dipulihkan (Best-Effort). Anotasi dan form mungkin hilang.');
                } catch (err) {
                    showMsg('repair-msg', true, 'Gagal memperbaiki: ' + err.message);
                }
                
                btn.disabled = false; btn.innerHTML = `<i data-lucide="wrench" class="w-4 h-4 mr-2"></i> ${t('repairBtn')}`;
                lucide.createIcons();
            }
        };

        // ==========================================
        // 18. INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // SAFE FALLBACK: Inject worker directly so it won't crash in production
            if (window.pdfjsLib) {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                if(window.PDFLib && window.JSZip) libsLoaded = true;
            }

            if (theme === 'dark') document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').setAttribute('data-lucide', theme === 'light' ? 'moon' : 'sun');
            
            document.getElementById('btnToggleLang').addEventListener('click', () => {
                lang = lang === 'id' ? 'en' : 'id';
                localStorage.setItem('lang', lang);
                updateI18n();
            });
            document.getElementById('btnToggleTheme').addEventListener('click', toggleTheme);

            InfoModule.init();
            MergeModule.init();
            SplitModule.init();
            ArrangeModule.init();
            RotateModule.init();
            CompressModule.init();
            PngModule.init();
            ImgToPdfModule.init();
            ReformatModule.init();
            WatermarkModule.init();
            OcrModule.init();
            UrlModule.init();
            UnlockModule.init();
            EncryptModule.init();
            FlattenModule.init();
            RepairModule.init();

            // Memisahkan inisiasi modul verifikasi khusus jika tersedia
            if (typeof VerifySignModule !== 'undefined') VerifySignModule.init();

            updateI18n();
            switchView('home');
        });
    </script>
</body>
